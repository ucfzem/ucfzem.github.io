<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Page non trouvée - UcfZem</title>
<style>
  :root {
    --bg-brown: #2C1B18;
    --bg-brown-light: #3E2723;
    --text-cream: #FDFBF7;
    --text-gold: #D4AF37;
    --gold-primary: #D4AF37;
    --gold-dark: #B8860B;
    --gold-shadow: rgba(212, 175, 55, 0.3);
  }

  * { box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    text-align: center;
    padding: 20px;
    background-color: var(--bg-brown);
    color: var(--text-cream);
    margin: 0;
    overflow-x: hidden; 
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  h1 { 
    font-size: 2.5em; 
    color: var(--text-gold);
    margin-bottom: 10px; 
    letter-spacing: -0.5px;
  }
  
  p { 
    font-size: 1.1em; 
    color: var(--text-cream); 
    opacity: 0.9;
    margin-bottom: 40px; 
    max-width: 400px; 
    line-height: 1.6; 
  }
  
  #runaway-btn {
    padding: 16px 32px;
    font-size: 1.1em;
    font-weight: bold;
    background-color: var(--gold-primary);
    color: var(--bg-brown);
    border: 2px solid var(--gold-primary);
    border-radius: 50px;
    cursor: pointer;
    position: absolute;
    transition: all 0.2s ease-out;
    box-shadow: 0 4px 20px var(--gold-shadow);
    left: 50%;
    top: 60%;
    transform: translate(-50%, -50%);
    z-index: 10;
  }

  #runaway-btn:active { 
    transform: translate(-50%, -50%) scale(0.95); 
  }

  #runaway-btn.captured { 
    background-color: var(--bg-brown); 
    color: var(--text-gold);
    border-color: var(--text-gold);
    transform: translate(-50%, -50%);
    box-shadow: 0 0 25px var(--gold-shadow);
  }

  .fallback-links { 
    margin-top: 50vh; 
    font-size: 0.95em; 
    padding: 20px;
    color: var(--text-cream);
    opacity: 0.7;
  }
  
  .fallback-links a { 
    color: var(--text-gold); 
    text-decoration: none; 
    margin: 0 12px; 
    font-weight: bold; 
    display: inline-block;
    padding: 10px 0; 
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  
  .fallback-links a:hover {
    border-bottom-color: var(--text-gold);
    opacity: 1;
  }
</style>
</head>
<body>

  <h1>Oups ! Erreur 404</h1>
  <p>Cette page a pris la poudre d'escampette dans l'obscurité. <br>Mais pas de panique, essayez d'attraper le bouton doré pour rentrer à la maison !</p>
  
  <button id="runaway-btn" onclick="window.location.href='/'">Retour à l'accueil</button>

  <div class="fallback-links">
    <p>Trop rapide pour vous ? Voici des raccourcis :</p>
    <a href="/">🏠 Accueil</a> • 
    <a href="/microinvoice/">📄 MicroInvoice</a> •
    <a href="https://github.com/ucfzem">💻 GitHub</a>
  </div>

  <script>
    const btn = document.getElementById('runaway-btn');
    let moveCount = 0;
    const maxMoves = 5; 

    function moveButton(e) {
      if (e.type === 'touchstart') {
        e.preventDefault(); 
      }

      if (moveCount < maxMoves) {
        const maxX = window.innerWidth - 200;
        const maxY = window.innerHeight - 100;
        
        const x = Math.max(20, Math.random() * maxX);
        const y = Math.max(20, Math.random() * maxY);
        
        btn.style.transform = 'none';
        btn.style.left = `${x}px`;
        btn.style.top = `${y}px`;
        
        moveCount++;
        
        const messages = ["Trop lent !", "Presque !", "Encore raté !", "Insaisissable !", "Dernière chance !"];
        btn.innerText = messages[moveCount - 1];
      } else {
        btn.innerText = "Bravo, tu l'as eu !";
        btn.classList.add('captured');
        
        btn.removeEventListener('mouseover', moveButton);
        btn.removeEventListener('touchstart', moveButton);
      }
    }

    btn.addEventListener('mouseover', moveButton);
    btn.addEventListener('touchstart', moveButton, { passive: false });
  </script>

</body>
</html>
