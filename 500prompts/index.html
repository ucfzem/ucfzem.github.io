            { n:306, t:"Lead magnet irrésistible", p:"Accroche de vente pour un lead magnet gratuit sur [sujet]. Titre promettant un résultat rapide, points clés, image du lead magnet (décrite), formulaire simplifié." },
            { n:307, t:"Section FAQ pour une page de vente", p:"FAQ de 6 questions-réponses pour la page de vente de [produit]. Adresse les objections classiques : prix, temps, garantie, prérequis, public cible. Ton rassurant." },
            { n:308, t:"Témoignage client transformé en section de vente", p:"Transforme le témoignage brut [témoignage] en bloc de preuve sociale. Avant/après, résultats chiffrés, citation percutante, nom et photo (décrite)." },
            { n:309, t:"Page de vente pour un service de coaching", p:"Page de vente pour un programme de coaching [durée] sur [thématique]. Promesse, modules détaillés, bonus, prix, plan de paiement, garantie satisfait/remboursé." },
            { n:310, t:"Page de vente pour un SaaS avec essai gratuit", p:"Structure de landing page d'un logiciel [nom] : hero avec vidéo démo, bénéfices en 3 colonnes, 'Comment ça marche' en 3 étapes, tableau de prix, FAQ. CTA essai gratuit." },
            { n:311, t:"Page de vente 'Lettre de vente longue' (Sales Letter)", p:"Plan détaillé d'une lettre de vente longue (10 000 mots) pour un produit de développement personnel. Toutes les sections : pré-tête, headline, histoire, preuves, offre, etc." },
            { n:312, t:"Page de capture pour un webinar", p:"Contenu d'une page d'inscription à un webinaire gratuit sur [sujet]. Titre, promesse, date/heure, court paragraphe sur l'animateur, formulaire. Urgence 'Places limitées'." },
            { n:313, t:"Page de vente pour un produit physique avec cross-selling", p:"Page produit pour [produit physique] sur Shopify. Description bénéfices, spécifications, avis clients, section 'Fréquemment achetés ensemble' à prix réduit." },
            { n:314, t:"Page 'Qui suis-je' transformée en page de vente douce", p:"Page 'À propos' se lisant comme une lettre personnelle mais orientant subtilement vers les services de [consultant]. Valeurs, mission, comment tu peux aider. Formulaire contact." },
            { n:315, t:"Trame pour une page de vente avec vidéo de vente (VSL)", p:"Script d'une VSL de 5 minutes et la landing page autour. Player vidéo en haut, résumé des points, témoignages, bouton d'achat sous la vidéo." },
            { n:316, t:"Page d'atterrissage pour un lead magnet payant (Tripwire)", p:"Page de vente d'un produit d'appel (tripwire) à [prix bas] après téléchargement d'un lead magnet gratuit. Valeur exceptionnelle, offre unique, garantie." },
            { n:317, t:"Page de vente avec calculateur de ROI", p:"Intègre un calculateur de ROI dans la page de vente de [service B2B]. Texte d'accompagnement : 'Découvrez combien vous pouvez économiser'. Inputs et promesse." },
            { n:318, t:"Page de vente minimaliste pour un produit unique", p:"Page de vente épurée type 'One Product Store'. Hero shot du produit, un seul titre puissant, 3 bénéfices, bouton d'achat, section témoignages. Pas de navigation." },
            { n:319, t:"Offre de lancement avec compte à rebours", p:"Bloc d'urgence pour une page de vente : 'L'offre se termine dans [timer]'. Texte sur les bonus offerts uniquement pendant le lancement, hausse de prix après." },
            { n:320, t:"Page de vente avec comparaison de forfaits", p:"Tableau comparatif de 3 forfaits pour [service] : Basic, Pro, Premium. Fonctionnalités, prix, forfait recommandé mis en évidence. CTA distinct par forfait." },
            { n:321, t:"Page de vente de type 'Squeeze Page'", p:"Texte d'une squeeze page agressive dont le seul but est de capturer l'email. Headline promettant un cadeau, pas de menu ni liens sortants, formulaire et bouton." },
            { n:322, t:"Vente additionnelle (upsell) après panier", p:"Copy pour une page d'upsell (order bump) affichée après l'ajout au panier. Produit principal : [produit]. Upsell : [complément]. Réduction exclusive." },
            { n:323, t:"Page de vente pour un événement en présentiel", p:"Page de vente pour une conférence/mastermind. Thème, date, lieu, intervenants (photos décrites), programme, témoignages des éditions précédentes, early bird." },
            { n:324, t:"Page 'Devenir affilié'", p:"Page de vente pour recruter des affiliés pour ton produit. Produit, taux de commission, ressources fournies, processus d'inscription. Pourquoi c'est facile à vendre." },
            { n:325, t:"Page de remerciement après achat (upsell 2)", p:"Page de remerciement confirmant la commande ET proposant une offre spéciale de upsell en one-click. Message de remerciement et pitch de l'offre additionnelle." },
            { n:326, t:"Page de vente avec garantie 'Satisfait ou Remboursé'", p:"Certificat de garantie 100% satisfait ou remboursé pendant [durée]. Texte engageant levant le risque. Procédure simple de remboursement." },
            { n:327, t:"Page de vente pour une formation avec programme détaillé", p:"Pour la formation [nom], décris chaque module avec un titre vendeur et 3 points clés. Table des matières. Section bonus pour faire monter la valeur perçue." },
            { n:328, t:"Témoignages vidéo décrits pour page de vente", p:"Section 'Ils ont testé et approuvé' avec 3 témoignages fictifs mais crédibles, citations avec photos décrites et résultats chiffrés. Adapte au produit [produit]." },
            { n:329, t:"Appel à l'action (CTA) pour différentes étapes du tunnel", p:"7 variantes de bouton CTA pour un tunnel de vente : 'Je veux ma place', 'Oui, envoyez-moi le guide', 'Ajouter au panier', etc. Contexte d'utilisation." },
            { n:330, t:"Storytelling de marque pour une page 'Notre histoire'", p:"Page 'Notre histoire' émouvante pour [marque] se terminant par un appel à rejoindre l'aventure (acheter). Utilise l'archétype de marque [ex: l'Explorateur]." },
            { n:331, t:"Page de vente pour un service 'Done For You'", p:"Page de vente pour un service clé en main : 'Nous faisons [tâche] à votre place'. Points de douleur, pourquoi le faire soi-même est une erreur, processus, CTA appel." },
            { n:332, t:"Page de vente d'un template/kit numérique", p:"Vends un template [type, ex: Notion] sur une page. Captures d'écran décrites, fonctionnalités, bénéfices d'organisation, aperçu vidéo. Prix et achat immédiat." },
            { n:333, t:"Landing page post-clic pour une campagne Google Ads", p:"Page d'atterrissage ultra-ciblée pour le mot-clé [mot-clé] et l'annonce [texte]. Message parfaitement aligné. Éléments de confiance, un seul CTA, formulaire court." },
            { n:334, t:"Page de vente éphémère pour un produit saisonnier", p:"Page de vente avec un design évoquant [saison], par exemple Noël. Titre festif, section 'Pourquoi c'est le cadeau parfait', livraison garantie avant [date]." },
            { n:335, t:"Page de vente d'un abonnement récurrent", p:"Vends un abonnement mensuel à [service]. Valeur continue, nouveaux contenus chaque mois, flexibilité de résiliation, comparaison coût annuel vs mensuel." },
            { n:336, t:"Checkout page optimisée avec réassurance", p:"Éléments de réassurance à placer à côté du formulaire de paiement : icônes de sécurité, témoignage court, garantie, rappel des bénéfices, FAQ de dernière minute." },
            { n:337, t:"Page de vente type 'Livre blanc' B2B", p:"Landing page pour télécharger un livre blanc sur [sujet technique]. Expertise de l'entreprise, sujets couverts, données exclusives. Formulaire (nom, email, entreprise)." },
            { n:338, t:"Page de vente de formation en ligne avec accès vie", p:"Page pour une formation avec accès à vie. Capitalise sur la peur de manquer une mise à jour future. Programme, bonus, prix avec paiement en plusieurs fois." },
            { n:339, t:"Trame pour une page de vente vidéo uniquement", p:"Page de vente ne contenant qu'une vidéo, un titre et un bouton. La vidéo fait tout le travail de vente. Texte d'introduction autour du lecteur vidéo." },
            { n:340, t:"Page de vente d'un mastermind haut de gamme", p:"Vends un mastermind à [prix élevé] avec une page sobre. Lettre du fondateur, profil des participants recherchés, processus de candidature, témoignages." },

            // PILIER VENDRE - Cat 2: 341-380 (Séquences emails lancement/relance)
            { n:341, t:"Séquence d'e-mails de lancement de produit (PLF)", p:"Séquence complète de 12 emails pour un lancement selon la méthode Product Launch Formula. Répartition pré-lancement (4), lancement (5), post-lancement (3)." },
            { n:342, t:"Email 1 d'abandon de panier (1 heure après)", p:"Premier email de relance panier abandonné, envoyé 1 heure après. Rappel du produit avec son image, ton léger et serviable, lien direct vers le panier." },
            { n:343, t:"Email 2 d'abandon de panier avec preuve sociale (24h)", p:"Deuxième email de relance (24h après). Témoignage client sur la qualité, section FAQ (livraison, retours). Sentiment d'urgence léger." },
            { n:344, t:"Email 3 d'abandon de panier avec offre (48h)", p:"Dernier email (48h après) offrant un code de réduction de [X]% ou la livraison gratuite. 'On aimerait vraiment que vous essayiez ce produit'. Limite durée offre." },
            { n:345, t:"Séquence d'e-mails pour un lancement surprise (Flash Launch)", p:"Séquence de 3 emails sur 24h pour un lancement éclair. 1 : annonce offre exclusive. 2 : résultats d'un bêta-testeur. 3 : dernières heures et compteur." },
            { n:346, t:"Email de panier abandonné pour un produit cher", p:"Séquence pour un produit haut de gamme. Email 1 : propose un appel téléphonique. Email 2 : étude de cas détaillée. Email 3 : plan de financement." },
            { n:347, t:"Séquence de vente pour un service de consulting", p:"5 emails pour convertir un prospect en client de consulting. 1 : cas client. 2 : article approfondi. 3 : invitation webinaire. 4 : appel découverte. 5 : dernier suivi." },
            { n:348, t:"Email de relance pour un paiement refusé", p:"Email automatique informant le client que son paiement a été refusé (carte expirée). Texte poli et aidant, lien pour mettre à jour les informations de facturation." },
            { n:349, t:"Séquence d'upsell post-achat par email", p:"3 emails dans la semaine suivant un achat pour proposer des produits complémentaires. 1 : remerciement + guide. 2 : produit complémentaire. 3 : pack avec réduction." },
            { n:350, t:"Email pour un lancement avec une liste de prévenus (waitlist)", p:"Email pour les personnes sur la liste d'attente, annonçant que les portes sont ouvertes et qu'ils ont un accès anticipé. Lien avec code spécial. Excitation." },
            { n:351, t:"Séquence de réactivation pour panier abandonné depuis 7 jours", p:"Relance plus agressive après 7 jours. Rappelle ce qu'ils perdent, ajoute preuve sociale ('Rejoignez les X clients'), lien direct vers le paiement." },
            { n:352, t:"Email de lancement 'Les portes se ferment'", p:"Dernier email d'une séquence de lancement, annonçant la fermeture imminente des inscriptions. Ton d'urgence, compte à rebours, peur de manquer le bonus." },
            { n:353, t:"Séquence de bienvenue orientée vente pour un lead magnet", p:"Mini-séquence de vente d'un produit d'appel. Email 1 : livraison du lead magnet. Email 2 : histoire + problème. Email 3 : tripwire offer (offre spéciale)." },
            { n:354, t:"Email de lancement 'La méthode derrière le produit'", p:"Email storytelling pour une séquence de lancement expliquant la genèse et la méthode unique derrière le produit. Montre l'expertise et la recherche." },
            { n:355, t:"Relance panier abandonné via SMS (texte)", p:"Contenu d'un SMS de relance panier abandonné. Court, avec le nom du produit, un lien court, et un sentiment d'urgence discret." },
            { n:356, t:"Email de lancement 'Pourquoi ce produit est différent'", p:"Email qui différencie clairement le produit de la concurrence. 3 arguments percutants. Détruit les croyances limitantes du marché." },
            { n:357, t:"Séquence pour vendre une formation sans faire de webinaire", p:"Séquence email de 7 jours 'Automated Webinar' : chaque jour un email délivre du contenu de valeur, répond à une objection, et rapproche de la vente le jour 7." },
            { n:358, t:"Email pour récupérer les prospects ayant cliqué mais pas acheté", p:"Cible les personnes ayant cliqué sur le lien de vente plusieurs fois sans acheter. Email : 'Je vois que vous êtes intéressé... qu'est-ce qui vous retient ?'" },
            { n:359, t:"Séquence de lancement pour un produit SaaS", p:"Séquence de 5 emails pour le lancement d'une nouvelle fonctionnalité payante. Montre la valeur, le problème résolu, un aperçu, et une offre de mise à niveau." },
            { n:360, t:"Email pour annoncer une augmentation de prix prochaine", p:"Email prévenant d'une hausse de prix dans 48h. Justifie-la (améliorations, inflation) et invite à verrouiller l'ancien prix en achetant maintenant." },
            { n:361, t:"Relance de panier abandonné avec vidéo personnalisée", p:"Texte de l'email introduisant une mini-vidéo personnalisée : 'Je vous ai préparé un petit message'. Humanise la relance." },
            { n:362, t:"Email du fondateur expliquant pourquoi il a créé ce produit", p:"Email intime où le fondateur raconte une histoire personnelle qui l'a conduit à créer le produit. Connecte émotionnellement avant l'offre." },
            { n:363, t:"Séquence de nurturing pour préparer un lancement (Seed)", p:"4 emails de contenu pur, sans vente, pour nourrir la liste avant un lancement. Thèmes : éducation, inspiration, données, mythes. Teasers du lancement." },
            { n:364, t:"Email de panier abandonné pour un produit digital", p:"Email soulignant l'accès instantané et les résultats rapides. Aborde la peur de passer à l'action. Témoignage d'un client ayant eu peur au début." },
            { n:365, t:"Séquence de vente croisée pour les clients existants", p:"3 emails pour vendre une nouvelle formation à tes anciens élèves. Confiance établie : 'Tu as déjà fait X, voici la prochaine étape Y'. Offre de fidélité." },
            { n:366, t:"Relance de devis / proposition commerciale", p:"Email pour relancer un prospect à qui tu as envoyé un devis. Modèle 1 : suivi poli. Modèle 2 : ajout de valeur. Modèle 3 : rupture de contact." },
            { n:367, t:"Email 'Cassage d'objection' dans une séquence", p:"Identifie l'objection numéro 1 ('Trop cher', 'Pas le temps') et rédige un email entier qui la pulvérise avec logique, témoignages et calcul de ROI." },
            { n:368, t:"Séquence de vente pour un événement live payant", p:"Emails pour vendre des billets pour une conférence. Annonce, early bird, speaker reveal, atterrissage de dernière minute, et 'voir sur place'." },
            { n:369, t:"Email de bienvenue avec un 'cadeau' non dévoilé", p:"Premier email après inscription : offre un bonus surprise non annoncé sur la page de capture. Effet de surprise agréable qui renforce la confiance." },
            { n:370, t:"Campagne d'e-mailing pour écouler un stock", p:"Série de 3 emails pour liquidation de stock. Urgence 'Jusqu'à épuisement des stocks', remises progressives (Jour 1: -30%, Jour 2: -50%)." },
            { n:371, t:"Email suite à un essai gratuit qui expire bientôt", p:"Alerte 3 jours avant la fin d'un essai gratuit pour un SaaS. Rappelle les bénéfices utilisés, les fonctionnalités premium qu'ils vont perdre, lien direct." },
            { n:372, t:"Séquence de vente de produit d'affiliation par email", p:"5 emails pour promouvoir un produit affilié. Chaque email apporte une valeur unique : test produit, comparaison, bonus offert par toi, FAQ, dernière chance." },
            { n:373, t:"Email de relance après panier abandonné avec un bonus", p:"Ajoute un bonus exclusif (PDF, checklist) offert uniquement s'ils finalisent leur commande dans les 24h. Met en avant la valeur du bonus." },
            { n:374, t:"Séquence pour vendre un coaching de groupe", p:"Emails présentant le programme, les résultats des anciens, un appel découverte, et une offre limitée à [nombre] places." },
            { n:375, t:"Email pour un lancement avec un tirage au sort", p:"Encourage l'achat en offrant une chance de gagner un prix supplémentaire (consulting, produit) pour tout achat avant une certaine date." },
            { n:376, t:"Relance d'abandon de formulaire de paiement", p:"Email pour ceux ayant commencé à remplir le formulaire de paiement sans valider. 'Votre commande est en attente, un problème avec le paiement ?' Proposer de l'aide." },
            { n:377, t:"Séquence de vente pour un produit très cher (high-ticket)", p:"Approche plus consultative : emails invitant à un appel stratégique, études de cas, vidéos de présentation, proposition personnalisée. Moins d'urgence, plus de relation." },
            { n:378, t:"Email 'Dernière chance' pour un produit en édition limitée", p:"Annonce qu'il ne reste que X exemplaires (ou que l'offre se termine). Compteur, photos des stocks, liste des avantages. Urgence réelle." },
            { n:379, t:"Séquence de remerciement après un lancement", p:"3 emails après la fin du lancement. Remerciements, instructions pour commencer, création d'une communauté (groupe privé), et demande de feedback." },
            { n:380, t:"Email d'excuse pour un problème lors du paiement", p:"Si un bug a empêché l'achat, écris un email d'excuse avec une offre exclusive pour se faire pardonner. Rassure sur le fait que tout est réglé." },

            { n:382, t:"Description produit Shopify pour une marque de vêtements", p:"Description de produit pour la boutique Shopify de [marque] pour l'article [article]. Style : storytelling autour de l'inspiration, matières, conseils de taille, lookbook." },
            { n:383, t:"Fiche produit Etsy avec SEO longue traîne", p:"Annonce Etsy complète pour un produit fait main [produit]. Titre avec mots-clés longue traîne, description détaillée avec inspiration, dimensions, délai, politiques, 13 tags." },
            { n:384, t:"Description de produit pour un site de dropshipping", p:"Description engageante pour un produit [produit] en dropshipping. Copywriting émotionnel pour créer le désir. Section 'Caractéristiques' et 'Bénéfices'. Badge 'Livraison offerte'." },
            { n:385, t:"Optimisation d'une fiche produit existante (audit)", p:"Audite la fiche produit [texte] et propose une version améliorée. Renforce les bénéfices, ajoute de la preuve sociale, corrige le SEO title et meta description." },
            { n:386, t:"Description de produit pour un complément alimentaire", p:"Fiche produit pour [complément] en respectant les règles de conformité. Ingrédients, bienfaits prouvés, dosage, certifications. Avertissement et conseil d'utilisation." },
            { n:387, t:"Fiche produit pour un logiciel / SaaS (marketplace)", p:"Page produit pour la place de marché [ex: AppSumo]. Titre, sous-titre, description du problème résolu, fonctionnalités, cas d'usage, témoignages, offre spéciale avec prix." },
            { n:388, t:"Title et méta-description pour une collection Shopify", p:"Titre SEO et méta-description pour une page collection 'Robes d'été' sur Shopify. Cible '[mots-clés]', donne envie de cliquer. Max 60 car. titre, 160 car. méta." },
            { n:389, t:"Description de produit B2B avec fiche technique", p:"Fiche produit technique pour un acheteur professionnel. Résumé exécutif, spécifications techniques détaillées en tableau, normes, options de personnalisation, appel d'offre." },
            { n:390, t:"Fiche produit pour un bien immobilier de luxe", p:"Annonce immobilière pour une villa de luxe. Emplacement, style architectural, description pièce par pièce, prestations haut de gamme, vue. Ton exclusif." },
            { n:391, t:"Description de produit éco-responsable et durable", p:"Met l'accent sur la durabilité, les matériaux éco-responsables, et l'impact social/écologique pour le produit [produit]. Histoire de l'artisan ou fabrication éthique." },
            { n:392, t:"Contenu pour une boîte d'abonnement (box)", p:"Décris le concept de la box mensuelle [nom] : la surprise, la thématique du mois, la valeur totale des produits, les avantages de l'abonnement. Unboxing virtuel." },
            { n:393, t:"Fiche produit avec vidéo 360° (script et texte)", p:"Texte descriptif accompagnant une vue 360° du produit. Guide l'utilisateur sur ce qu'il voit, pointe les détails clés, suggère l'interaction." },
            { n:394, t:"Description pour un pack ou bundle de produits", p:"Vends un lot de [nombre] produits complémentaires. Synergie entre les produits, prix total vs prix du lot, pourquoi c'est le moment d'acheter le pack complet." },
            { n:395, t:"Produit personnalisable : guide de personnalisation", p:"Instructions et description d'un produit personnalisable (gravure, couleur). Processus de commande, champs à remplir, aperçus." },
            { n:396, t:"Fiche produit pour un livre / e-book", p:"Page de vente de ton livre [titre] sur une plateforme. Résumé accrocheur, biographie de l'auteur, critiques/avis, extrait. Bons mots-clés de catégorie." },
            { n:397, t:"Description pour un produit en précommande", p:"Fiche produit pour un article en précommande. Excitation : 'Soyez le premier à l'avoir', pourquoi le produit est spécial, date d'expédition, bonus early-bird." },
            { n:398, t:"Fiche produit pour un service de nettoyage/entretien", p:"Page de service pour un produit de service. Avant/Après, liste des tâches incluses, zone géographique, assurance, bouton 'Obtenir un devis'." },
            { n:399, t:"Liste de fonctionnalités transformée en bénéfices", p:"À partir de cette liste de caractéristiques [liste], réécris-les sous forme de bénéfices orientés client. Exemple : 'Batterie 5000 mAh' devient 'Profitez de 2 jours d'autonomie'." },
            { n:400, t:"Description de produit pour un objet connecté", p:"Explique simplement le fonctionnement et l'intégration du produit [objet connecté] avec les assistants vocaux, l'application mobile, et les scénarios d'usage." },
            { n:401, t:"Fiche produit de Noël en édition limitée", p:"Fiche pour un produit en édition limitée de Noël. Thème festif, packaging cadeau, rareté ('Seulement 500 pièces'), idée de cadeau pour qui." },
            { n:402, t:"Comparaison de deux variantes de produit", p:"Sur une même fiche, aide le client à choisir entre la version A et la version B. Tableau comparatif, conseil 'Pour qui ?', avis d'expert." },
            { n:403, t:"Fiche produit type 'Guide d'achat' intégré", p:"Fiche produit incluant un mini-guide d'achat pour la catégorie (ex: comment choisir la bonne taille de valise). Positionne la marque comme conseil." },
            { n:404, t:"Description de produit utilisant l'urgence de la saison", p:"Adapte le texte pour la saison en cours : été, rentrée scolaire, etc. Produit : [produit]. Offre saisonnière et arguments liés à la période." },
            { n:405, t:"Produit avec preuve sociale intégrée (avis vérifiés)", p:"Agrège et mets en forme 5 avis clients positifs dans une section 'Ce que disent nos clients', en respectant les étoiles et le prénom." },
            { n:406, t:"Fiche produit pour un article de sport / fitness", p:"Texte motivant pour un équipement de sport. Parle de performance, dépassement de soi, confort, et technologie. Conseils d'entraînement." },
            { n:407, t:"Description produit avec un focus sur le design et l'esthétique", p:"Pour un objet de décoration [objet], mets l'accent sur le style, le matériau, l'inspiration du designer, et comment il s'intègre dans différents intérieurs." },
            { n:408, t:"Fiche produit pour un jeu de société / jouet", p:"Décris le jeu : principe, nombre de joueurs, durée, âge, compétences développées, et un aperçu d'une partie. Donne envie de s'amuser en famille." },
            { n:409, t:"Description pour un article de papeterie premium", p:"Vends un carnet/stylo de luxe. Évoque le plaisir de l'écriture, la qualité du papier, le geste, et l'idée de cadeau pour un professionnel." },
            { n:410, t:"Fiche produit axée résolution de problème", p:"Identifie un problème quotidien précis ([problème]) et présente le produit comme la solution idéale. Structure : 'Vous en avez assez de... ?', présentation, fin du problème." },

        // ==================== ÉTAT GLOBAL ====================
        let currentLang = 'fr';
        let currentTheme = 'dark';

        // ==================== FONCTIONS ====================
        function getPromptsForRange(start, end) {
            return allPrompts.filter(p => p.n >= start && p.n <= end);
        }

        function buildPiliersData() {
            const ranges = [
                { catIdx: 0, start: 1, end: 40 },    // Coder cat 1
                { catIdx: 1, start: 41, end: 80 },   // Coder cat 2
                { catIdx: 2, start: 81, end: 120 },  // Coder cat 3
                { catIdx: 3, start: 121, end: 150 }, // Coder cat 4
                { catIdx: 4, start: 151, end: 190 }, // Créer cat 1
                { catIdx: 5, start: 191, end: 230 }, // Créer cat 2
                { catIdx: 6, start: 231, end: 265 }, // Créer cat 3 (note: j'ai mis 221-265 dans les données, ajustons)
                { catIdx: 7, start: 266, end: 300 }, // Créer cat 4
                { catIdx: 8, start: 301, end: 340 }, // Vendre cat 1
                { catIdx: 9, start: 341, end: 380 }, // Vendre cat 2
                { catIdx: 10, start: 381, end: 410 }, // Vendre cat 3
                { catIdx: 11, start: 411, end: 450 }, // Vendre cat 4
                { catIdx: 12, start: 451, end: 475 }, // Bonus cat 1
                { catIdx: 13, start: 476, end: 500 }  // Bonus cat 2
            ];

            // Mapping des catégories vers les piliers et indices
            const catMapping = [
                { pilier: 0, cat: 0 }, // Coder cat 1
                { pilier: 0, cat: 1 }, // Coder cat 2
                { pilier: 0, cat: 2 }, // Coder cat 3
                { pilier: 0, cat: 3 }, // Coder cat 4
                { pilier: 1, cat: 0 }, // Créer cat 1
                { pilier: 1, cat: 1 }, // Créer cat 2
                { pilier: 1, cat: 2 }, // Créer cat 3
                { pilier: 1, cat: 3 }, // Créer cat 4
                { pilier: 2, cat: 0 }, // Vendre cat 1
                { pilier: 2, cat: 1 }, // Vendre cat 2
                { pilier: 2, cat: 2 }, // Vendre cat 3
                { pilier: 2, cat: 3 }, // Vendre cat 4
                { pilier: 3, cat: 0 }, // Bonus cat 1
                { pilier: 3, cat: 1 }  // Bonus cat 2
            ];

            // Réinitialiser les prompts dans les catégories
            for (const lang in promptsData) {
                for (const pilier of promptsData[lang].piliers) {
                    for (const cat of pilier.categories) {
                        cat.prompts = [];
                    }
                }
            }

            // Remplir avec les vrais prompts
            for (let i = 0; i < ranges.length; i++) {
                const r = ranges[i];
                const prompts = getPromptsForRange(r.start, r.end);
                const mapping = catMapping[i];
                
                for (const lang in promptsData) {
                    promptsData[lang].piliers[mapping.pilier].categories[mapping.cat].prompts = [...prompts];
                }
            }
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function highlightVariables(text) {
            // Remplacer les [variables] par des spans
            return text.replace(/\[([^\]]+)\]/g, '<span class="variable">[$1]</span>');
        }

        function buildHTML(lang) {
            const data = promptsData[lang];
            let html = '';

            for (const pilier of data.piliers) {
                html += `
                <section class="pilier-section" id="${pilier.id}">
                    <h2 class="pilier-title">
                        <span class="pilier-icon">${pilier.icon}</span>${pilier.title}
                    </h2>
                    <p class="pilier-subtitle">${pilier.subtitle}</p>`;

                for (const cat of pilier.categories) {
                    html += `
                    <div class="categorie" id="${cat.id}">
                        <h3 class="categorie-title">
                            ${cat.title}
                            <span class="categorie-range">${cat.range}</span>
                        </h3>`;

                    for (const prompt of cat.prompts) {
                        html += `
                        <div class="prompt-card" data-prompt-id="${prompt.n}">
                            <div class="prompt-number">#${prompt.n}</div>
                            <div class="prompt-title">${escapeHTML(prompt.t)}</div>
                            <div class="prompt-text">${highlightVariables(prompt.p)}</div>
                            <button class="copy-btn" onclick="copyPrompt(this, '${escapeHTML(prompt.p).replace(/'/g, "\\'")}')">📋 Copier</button>
                        </div>`;
                    }

                    html += `</div>`;
                }

                html += `</section>`;
            }

            return html;
        }

        function copyPrompt(btn, text) {
            // Décoder le texte pour le copier proprement
            const textarea = document.createElement('textarea');
            textarea.value = text.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/&quot;/g, '"').replace(/&#039;/g, "'");
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            
            btn.textContent = '✓ Copié !';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = '📋 Copier';
                btn.classList.remove('copied');
            }, 2000);
        }

        function renderPage() {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = buildHTML(currentLang);
            
            // Mettre à jour le héros
            const data = promptsData[currentLang];
            document.querySelector('.hero h1').textContent = data.heroTitle;
            document.querySelector('.hero .subtitle').textContent = data.heroSubtitle;
            
            // Mettre à jour les liens de navigation des piliers
            const navLinks = document.querySelectorAll('.pilier-nav-link');
            const piliers = data.piliers;
            navLinks.forEach((link, index) => {
                if (piliers[index]) {
                    link.href = `#${piliers[index].id}`;
                    link.innerHTML = `${piliers[index].icon} ${piliers[index].title.split(' ').slice(0, 2).join(' ')} (${piliers[index].categories[0].range.split('-')[0]}-${piliers[index].categories[piliers[index].categories.length - 1].range.split('-')[1]})`;
                }
            });
        }

        function switchLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            renderPage();
            // Scroll en haut
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);
            
            const iconDark = document.querySelector('.theme-icon-dark');
            const iconLight = document.querySelector('.theme-icon-light');
            if (currentTheme === 'light') {
                iconDark.style.display = 'none';
                iconLight.style.display = 'inline';
            } else {
                iconDark.style.display = 'inline';
                iconLight.style.display = 'none';
            }
            
            localStorage.setItem('theme', currentTheme);
        }

        // ==================== INITIALISATION ====================
        function init() {
            buildPiliersData();
            
            // Charger le thème sauvegardé
            const savedTheme = localStorage.getItem('theme') || 'dark';
            currentTheme = savedTheme;
            document.documentElement.setAttribute('data-theme', currentTheme);
            const iconDark = document.querySelector('.theme-icon-dark');
            const iconLight = document.querySelector('.theme-icon-light');
            if (currentTheme === 'light') {
                iconDark.style.display = 'none';
                iconLight.style.display = 'inline';
            } else {
                iconDark.style.display = 'inline';
                iconLight.style.display = 'none';
            }
            
            renderPage();
            
            // Écouteurs d'événements pour les boutons de langue
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => switchLang(btn.dataset.lang));
            });
            
            // Écouteur pour le bouton de thème
            document.querySelector('.theme-btn').addEventListener('click', toggleTheme);
            
            // Navigation fluide pour les liens d'ancrage
            document.addEventListener('click', (e) => {
                if (e.target.matches('a[href^="#"]')) {
                    e.preventDefault();
                    const target = document.querySelector(e.target.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth' });
                    }
                }
            });
            
            // Mise à jour des liens actifs dans la navigation au scroll
            window.addEventListener('scroll', () => {
                const sections = document.querySelectorAll('.pilier-section');
                const navLinks = document.querySelectorAll('.pilier-nav-link');
                let currentSection = '';
                
                sections.forEach(section => {
                    const sectionTop = section.offsetTop - 180;
                    if (window.scrollY >= sectionTop) {
                        currentSection = section.getAttribute('id');
                    }
                });
                
                navLinks.forEach(link => {
                    link.classList.toggle('active', link.getAttribute('href') === `#${currentSection}`);
                });
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
