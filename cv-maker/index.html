<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV-Maker — Créez votre CV professionnel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #F0C866;
  --gold-dark: #A88830;
  --brown-50: #FAF3E8;
  --brown-100: #F0E6D3;
  --brown-200: #E0D5C0;
  --brown-300: #C4B69A;
  --brown-400: #A89878;
  --brown-500: #8B7355;
  --brown-600: #5C4A2E;
  --brown-700: #3D2E1A;
  --brown-800: #2C1A06;
  --brown-900: #1A1208;
  --white: #FFFFFF;
  --bg-body: var(--brown-50);
  --bg-panel: var(--white);
  --bg-card: var(--brown-50);
  --bg-input: var(--white);
  --bg-section: var(--white);
  --text-primary: var(--brown-800);
  --text-secondary: var(--brown-600);
  --text-muted: var(--brown-400);
  --border: var(--brown-200);
  --border-focus: var(--gold);
  --accent: var(--gold);
  --accent-bg: rgba(201,168,76,0.1);
  --accent-hover: var(--gold-dark);
  --shadow: rgba(44,26,6,0.1);
  --preview-bg: var(--brown-100);
  --header-bg: rgba(255,255,255,0.85);
  --font-sans: 'Inter', system-ui, sans-serif;
  --font-display: 'Plus Jakarta Sans', sans-serif;
}

[data-theme="dark"] {
  --bg-body: var(--brown-900);
  --bg-panel: var(--brown-800);
  --bg-card: var(--brown-700);
  --bg-input: var(--brown-700);
  --bg-section: var(--brown-800);
  --text-primary: #F5ECD7;
  --text-secondary: #D4C4A8;
  --text-muted: #A89878;
  --border: var(--brown-600);
  --shadow: rgba(0,0,0,0.3);
  --preview-bg: var(--brown-800);
  --header-bg: rgba(44,26,6,0.92);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font-sans);
  background: var(--bg-body);
  color: var(--text-primary);
  overflow: hidden; height: 100vh;
  transition: background .3s, color .3s;
}

.header {
  height: 56px;
  background: var(--header-bg);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 50; position: relative;
}

.logo {
  display: flex; align-items: center; gap: 8px;
  text-decoration: none;
}
.logo-text {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 800;
  color: var(--text-primary);
}
.logo-text span { color: var(--gold); }

.header-actions {
  display: flex; align-items: center; gap: 8px;
}

.lang-switcher {
  display: flex; gap: 2px;
  background: var(--bg-card);
  padding: 3px; border-radius: 10px;
  border: 1px solid var(--border);
}
.lang-btn {
  background: none; border: none;
  padding: 4px 8px; border-radius: 7px;
  cursor: pointer; font-size: 13px;
  transition: all .2s;
  color: var(--text-muted);
  font-family: var(--font-sans);
}
.lang-btn.active {
  background: var(--accent);
  color: var(--brown-800);
  font-weight: 600;
}
.lang-btn:hover:not(.active) {
  background: var(--accent-bg);
  color: var(--gold);
}

.theme-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-card);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all .2s;
  color: var(--text-muted);
}
.theme-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.btn {
  padding: 8px 14px; border-radius: 10px;
  font-size: 13px; font-weight: 600;
  cursor: pointer; border: none;
  transition: all .2s;
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-sans);
  white-space: nowrap;
}
.btn-outline {
  background: var(--bg-panel);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-outline:hover {
  background: var(--bg-card);
  border-color: var(--brown-400);
}
.btn-primary {
  background: var(--gold);
  color: var(--brown-800);
  box-shadow: 0 1px 3px rgba(201,168,76,0.3);
}
.btn-primary:hover {
  background: var(--gold-light);
}
.btn-demo {
  background: var(--accent-bg);
  color: var(--gold);
  border: 1px solid rgba(201,168,76,0.3);
}
.btn-demo:hover {
  background: var(--gold);
  color: var(--brown-800);
}

.save-status {
  font-size: 12px;
  color: var(--text-muted);
  display: flex; align-items: center; gap: 6px;
}
.save-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
}
.save-dot.unsaved {
  background: #F59E0B;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.main-container {
  display: flex;
  height: calc(100vh - 56px);
}

.left-panel {
  width: 480px; min-width: 320px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}

.section-tabs {
  display: flex; flex-wrap: wrap;
  gap: 6px; padding: 14px;
  border-bottom: 1px solid var(--border);
}
.section-tab {
  padding: 7px 12px; border-radius: 9px;
  font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border);
  background: var(--bg-panel);
  color: var(--text-muted);
  transition: all .15s;
  display: flex; align-items: center; gap: 5px;
  white-space: nowrap;
  font-family: var(--font-sans);
}
.section-tab:hover {
  border-color: var(--gold);
  color: var(--gold);
}
.section-tab.active {
  background: var(--accent-bg);
  color: var(--gold);
  border-color: var(--gold);
  font-weight: 600;
}

.form-content {
  flex: 1;
  overflow-y: auto;
  padding: 18px;
}
.form-section { display: none; }
.form-section.active { display: block; }

.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 12px; font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.form-input {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 9px;
  font-size: 13px;
  font-family: var(--font-sans);
  transition: all .15s;
  outline: none;
  background: var(--bg-input);
  color: var(--text-primary);
}
.form-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
}
.form-input::placeholder { color: var(--text-muted); opacity: .7; }
textarea.form-input {
  resize: vertical;
  min-height: 70px;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.entry-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 14px;
  margin-bottom: 10px;
  position: relative;
}
.entry-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.entry-card-title {
  font-size: 13px; font-weight: 600;
  color: var(--text-secondary);
}
.entry-card-actions { display: flex; gap: 4px; }
.icon-btn {
  width: 28px; height: 28px;
  border-radius: 7px;
  border: none;
  background: transparent;
  cursor: pointer;
  color: var(--text-muted);
  display: flex;
  align-items: center; justify-content: center;
  transition: all .15s;
  font-size: 14px;
}
.icon-btn:hover { background: var(--border); color: #EF4444; }
.icon-btn.add-inside-btn:hover { color: var(--gold); background: var(--accent-bg); }

.right-panel {
  flex: 1;
  background: var(--preview-bg);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px;
  overflow-y: auto;
}

.preview-container {
  width: 794px;
  max-width: 100%;
}

.template-selector {
  display: flex; gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.template-btn {
  padding: 7px 14px;
  border-radius: 9px;
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  color: var(--text-muted);
  transition: all .2s;
  font-family: var(--font-sans);
}
.template-btn.active {
  background: var(--accent);
  color: var(--brown-800);
  border-color: var(--gold);
  font-weight: 600;
}
.template-btn:hover:not(.active) {
  border-color: var(--gold);
  color: var(--gold);
}

.a4-preview {
  background: var(--white);
  box-shadow: 0 4px 20px var(--shadow);
  width: 794px;
  min-height: 1123px;
  border-radius: 4px;
}

/* Échelle contrôlée de la preview pour correspondre à l'affichage écran sans casser les polices du PDF final */
.a4-inner {
  padding: 40px 50px;
  font-size: 14px;
  line-height: 1.5;
  color: #1a1a1a;
}
.a4-inner h1 { font-size: 26px; margin-bottom: 4px; font-family: var(--font-display); }
.a4-inner h2 { font-size: 18px; color: #555; margin-bottom: 10px; }
.a4-inner .section-title {
  font-size: 14px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--gold);
  border-bottom: 2px solid var(--gold);
  padding-bottom: 4px;
  margin: 20px 0 12px;
}
.a4-inner .entry-title { font-size: 14px; font-weight: 600; }
.a4-inner .entry-sub { font-size: 13px; color: #666; }
.a4-inner .entry-desc { font-size: 13px; color: #444; margin-top: 4px; }
.a4-inner .contact-line { font-size: 13px; color: #555; margin-bottom: 12px; }
.a4-inner .skill-tag {
  display: inline-block;
  background: rgba(201,168,76,0.15);
  color: var(--gold-dark);
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 12px;
  margin: 2px;
}
.a4-inner p { margin-bottom: 8px; }
.a4-empty {
  display: flex; align-items: center; justify-content: center;
  height: 500px;
  color: #bbb;
  font-size: 16px;
}

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-panel);
  border-radius: 16px;
  padding: 28px;
  width: 420px; max-width: 90vw;
  box-shadow: 0 8px 32px var(--shadow);
}
.modal h3 {
  font-family: var(--font-display);
  font-size: 18px;
  margin-bottom: 6px;
  color: var(--text-primary);
}
.modal p {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 18px;
}
.modal-actions {
  display: flex; gap: 10px;
  flex-wrap: wrap;
}
.quality-btn {
  flex: 1; min-width: 100px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  cursor: pointer;
  text-align: center;
  transition: all .2s;
  font-family: var(--font-sans);
}
.quality-btn:hover {
  border-color: var(--gold);
  background: var(--accent-bg);
}
.quality-btn .qlabel {
  font-size: 14px; font-weight: 600;
  color: var(--text-primary);
  display: block;
}
.quality-btn .qdesc {
  font-size: 11px;
  color: var(--text-muted);
}

/* Mobile preview */
.mobile-preview-btn {
  display: none;
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  padding: 12px 24px;
  border-radius: 14px;
  border: none;
  background: var(--gold);
  color: var(--brown-800);
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(201,168,76,0.4);
  font-family: var(--font-sans);
}
.close-preview-btn {
  display: none;
  position: fixed;
  top: 12px; right: 12px;
  z-index: 200;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: none;
  background: var(--bg-panel);
  color: var(--text-primary);
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 2px 12px var(--shadow);
}

/* RESPONSIVE */
@media (max-width: 480px) {
  .header { padding: 0 10px; }
  .header-actions { gap: 4px; }
  .lang-btn { padding: 3px 5px; font-size: 11px; }
  .btn { padding: 6px 10px; font-size: 12px; }
  .logo-text { font-size: 16px; }
  .left-panel { width: 100%; min-width: 0; }
  .section-tabs { padding: 10px; gap: 4px; }
  .section-tab { font-size: 11px; padding: 5px 8px; }
  .form-content { padding: 12px; }
  .form-row { grid-template-columns: 1fr; }
  .right-panel { display: none; padding: 12px; }
  .right-panel.open { display: flex; position: fixed; inset: 0; z-index: 150; background: var(--bg-body); padding-top: 56px; }
  .mobile-preview-btn { display: flex; }
  .close-preview-btn.open { display: flex; }
  .preview-container { width: 100%; }
}

@media (min-width: 481px) and (max-width: 767px) {
  .left-panel { width: 100%; min-width: 0; }
  .right-panel { display: none; }
  .right-panel.open { display: flex; position: fixed; inset: 0; z-index: 150; background: var(--bg-body); padding-top: 56px; }
  .mobile-preview-btn { display: flex; }
  .close-preview-btn.open { display: flex; }
  .preview-container { width: 100%; }
}

@media (min-width: 768px) and (max-width: 1023px) {
  .left-panel { width: 360px; min-width: 300px; }
  .right-panel { padding: 16px; }
  .preview-container { width: 100%; }
}

@media (min-width: 1024px) and (max-width: 1439px) {
  .left-panel { width: 420px; }
}

@media (min-width: 1440px) {
  .left-panel { width: 520px; }
  .header { padding: 0 28px; }
  .right-panel { padding: 32px; }
}

@media (min-width: 1920px) {
  .left-panel { width: 580px; }
  .header { padding: 0 40px; }
  .right-panel { padding: 40px; }
  .logo-text { font-size: 24px; }
  .form-content { padding: 24px; }
  .section-tabs { padding: 18px; gap: 8px; }
  .section-tab { font-size: 13px; padding: 9px 16px; }
}

@media print {
  body { overflow: visible; height: auto; background: white; }
  .header, .left-panel, .mobile-preview-btn, .close-preview-btn, .template-selector { display: none !important; }
  .main-container { display: block; height: auto; }
  .right-panel { display: block; padding: 0; overflow: visible; background: white; }
  .a4-preview { box-shadow: none; border-radius: 0; width: 100%; min-height: auto; }
  .preview-container { width: 100%; max-width: 100%; }
  .a4-preview { page-break-after: always; }
}
</style>
</head>
<body data-theme="dark">

<header class="header">
  <a class="logo" href="#">
    <span class="logo-text">CV<span>-Maker</span></span>
  </a>
  <div class="header-actions">
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="fr" title="Français">🇫🇷</button>
      <button class="lang-btn" data-lang="en" title="English">🇬🇧</button>
      <button class="lang-btn" data-lang="es" title="Español">🇪🇸</button>
      <button class="lang-btn" data-lang="ar" title="العربية">🇲🇦</button>
    </div>
    <button class="theme-btn" id="themeToggle">🌙</button>
    <button class="btn btn-demo" id="demoBtn">🎲 Demo</button>
    <span class="save-status" id="saveStatus"><span class="save-dot"></span> <span id="saveLabel">Auto-save</span></span>
    <button class="btn btn-primary" id="downloadBtn">📥 PDF</button>
  </div>
</header>

<div class="main-container">
  <div class="left-panel">
    <div class="section-tabs" id="sectionTabs">
      <button class="section-tab active" data-section="personal">👤 <span data-i18n="tab_personal">Personal</span></button>
      <button class="section-tab" data-section="experience">💼 <span data-i18n="tab_experience">Experience</span></button>
      <button class="section-tab" data-section="education">🎓 <span data-i18n="tab_education">Education</span></button>
      <button class="section-tab" data-section="skills">⚡ <span data-i18n="tab_skills">Skills</span></button>
      <button class="section-tab" data-section="languages">🌐 <span data-i18n="tab_languages">Languages</span></button>
      <button class="section-tab" data-section="custom">📎 <span data-i18n="tab_custom">Custom</span></button>
    </div>

    <div class="form-content" id="formContent">
      <div class="form-section active" id="section-personal">
        <div class="form-group">
          <label class="form-label" data-i18n="lbl_fullname">Full Name *</label>
          <input class="form-input" id="fullName" placeholder="John Doe" oninput="updateCV()">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="lbl_title">Professional Title *</label>
          <input class="form-input" id="title" placeholder="Software Engineer" oninput="updateCV()">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" data-i18n="lbl_email">Email</label>
            <input class="form-input" id="email" type="email" placeholder="john@example.com" oninput="updateCV()">
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="lbl_phone">Phone</label>
            <input class="form-input" id="phone" type="tel" placeholder="+1 234 567 890" oninput="updateCV()">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" data-i18n="lbl_location">Location</label>
            <input class="form-input" id="location" placeholder="City, Country" oninput="updateCV()">
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="lbl_website">Website</label>
            <input class="form-input" id="website" type="url" placeholder="linkedin.com/in/..." oninput="updateCV()">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="lbl_summary">Professional Summary</label>
          <textarea class="form-input" id="summary" rows="4" placeholder="Brief overview of your experience..." oninput="updateCV()"></textarea>
        </div>
      </div>

      <div class="form-section" id="section-experience">
        <button class="btn btn-outline" onclick="addExperience(false)" style="width:100%;margin-bottom:12px;justify-content:center;">+ <span data-i18n="add_experience">Add Work Experience</span></button>
        <div id="experienceList"></div>
      </div>

      <div class="form-section" id="section-education">
        <button class="btn btn-outline" onclick="addEducation(false)" style="width:100%;margin-bottom:12px;justify-content:center;">+ <span data-i18n="add_education">Add Education</span></button>
        <div id="educationList"></div>
      </div>

      <div class="form-section" id="section-skills">
        <button class="btn btn-outline" onclick="addSkillCategory(false)" style="width:100%;margin-bottom:12px;justify-content:center;">+ <span data-i18n="add_skill">Add Skill Category</span></button>
        <div id="skillsList"></div>
      </div>

      <div class="form-section" id="section-languages">
        <button class="btn btn-outline" onclick="addLanguage(false)" style="width:100%;margin-bottom:12px;justify-content:center;">+ <span data-i18n="add_language">Add Language</span></button>
        <div id="languagesList"></div>
      </div>

      <div class="form-section" id="section-custom">
        <button class="btn btn-outline" onclick="addCustomSection(false)" style="width:100%;margin-bottom:12px;justify-content:center;">+ <span data-i18n="add_custom">Add Custom Section</span></button>
        <div id="customList"></div>
      </div>
    </div>
  </div>

  <div class="right-panel" id="rightPanel">
    <div class="preview-container">
      <div class="template-selector">
        <button class="template-btn active" onclick="selectTemplate('modern',this)" data-i18n="tmpl_modern">Modern</button>
        <button class="template-btn" onclick="selectTemplate('classic',this)" data-i18n="tmpl_classic">Classic</button>
        <button class="template-btn" onclick="selectTemplate('minimal',this)" data-i18n="tmpl_minimal">Minimal</button>
      </div>
      <div class="a4-preview" id="a4Preview">
        <div class="a4-inner" id="a4Content">
          <div class="a4-empty" data-i18n="empty_preview">Your CV preview will appear here</div>
        </div>
      </div>
    </div>
  </div>
</div>

<button class="mobile-preview-btn" id="mobilePreviewBtn">👁️ <span data-i18n="preview">Preview</span></button>
<button class="close-preview-btn" id="closePreviewBtn">✕</button>

<div class="modal-overlay" id="downloadModal">
  <div class="modal">
    <h3 data-i18n="export_title">Export CV as PDF</h3>
    <p data-i18n="export_desc">Choose your export quality</p>
    <div class="modal-actions">
      <button class="quality-btn" onclick="downloadPDF('high')">
        <span class="qlabel" data-i18n="high">High</span>
        <span class="qdesc" data-i18n="high_desc">Best quality, larger file</span>
      </button>

let currentLang = localStorage.getItem('cvmaker_lang') || 'fr';
let currentTheme = localStorage.getItem('cvmaker_theme') || 'dark';
let curTemplate = 'modern';
let dirty = false;
let saveTimer = null;

const t = key => {
  const lang = I18N[currentLang] || I18N.fr;
  return lang[key] !== undefined ? lang[key] : I18N.fr[key] || key;
};

function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('cvmaker_lang', lang);
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  updateSaveStatus();
}

function applyTheme(theme) {
  currentTheme = theme;
  document.body.setAttribute('data-theme', theme);
  document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('cvmaker_theme', theme);
}

document.querySelectorAll('.lang-btn').forEach(b => {
  b.addEventListener('click', () => applyLang(b.dataset.lang));
});
document.getElementById('themeToggle').addEventListener('click', () => {
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
});

applyLang(currentLang);
applyTheme(currentTheme);

// Data model
let cvData = loadFromLocalStorage() || { personal: {}, experiences: [], education: [], skillCategories: [], languages: [], customSections: [] };
let itemIdCounter = Date.now();
const uid = () => ++itemIdCounter;

function escapeHTML(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(str) {
  return String(str||'').replace(/"/g,'&quot;').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function loadFromLocalStorage() {
  try {
    const d = JSON.parse(localStorage.getItem('cvmaker-data'));
    if (d && d.experiences) return d;
  } catch(e) {}
  return null;
}

function saveToLocalStorage() {
  try {
    localStorage.setItem('cvmaker-data', JSON.stringify(cvData));
    localStorage.setItem('cvmaker-template', curTemplate);
  } catch(e) {}
}

function markDirty() {
  dirty = true;
  updateSaveStatus();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveToLocalStorage();
    dirty = false;
    updateSaveStatus();
    showToast(t('auto_saved'));
  }, 2000);
}

function updateSaveStatus() {
  const dot = document.querySelector('.save-dot');
  const label = document.getElementById('saveLabel');
  if (dirty) {
    dot.classList.add('unsaved');
    label.textContent = t('unsaved');
  } else {
    dot.classList.remove('unsaved');
    label.textContent = t('saved');
  }
}

// Personal fields
function updateCV() {
  cvData.personal = {
    fullName: document.getElementById('fullName').value,
    title: document.getElementById('title').value,
    email: document.getElementById('email').value,
    phone: document.getElementById('phone').value,
    location: document.getElementById('location').value,
    website: document.getElementById('website').value,
    summary: document.getElementById('summary').value
  };
  markDirty();
  updatePreview();
}

function loadFormFromData() {
  const p = cvData.personal || {};
  document.getElementById('fullName').value = p.fullName || '';
  document.getElementById('title').value = p.title || '';
  document.getElementById('email').value = p.email || '';
  document.getElementById('phone').value = p.phone || '';
  document.getElementById('location').value = p.location || '';
  document.getElementById('website').value = p.website || '';
  document.getElementById('summary').value = p.summary || '';
  renderAllEntries();
  updatePreview();
}

// Section tabs
document.querySelectorAll('.section-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('section-' + tab.dataset.section).classList.add('active');
  });
});

// Experience
cvData.experiences = cvData.experiences || [];
function addExperience(silent) {
  cvData.experiences.push({ id: uid(), company: '', position: '', startDate: '', endDate: '', description: '', highlights: [''] });
  renderExperiences();
  if (!silent) { markDirty(); updatePreview(); }
}
function removeExperience(id) {
  cvData.experiences = cvData.experiences.filter(e => e.id !== id);
  renderExperiences(); markDirty(); updatePreview();
}
function updateExpField(id, field, value) {
  const e = cvData.experiences.find(x => x.id === id);
  if (e) { e[field] = value; markDirty(); updatePreview(); }
}
function renderExperiences() {
  document.getElementById('experienceList').innerHTML = cvData.experiences.map(e => `
    <div class="entry-card">
      <div class="entry-card-header">
        <span class="entry-card-title">${escapeHTML(e.position || e.company || t('add_experience'))}</span>
        <div class="entry-card-actions">
          <button class="icon-btn" onclick="removeExperience(${e.id})" title="${t('remove')}">✕</button>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><input class="form-input" placeholder="${t('lbl_title')}" value="${escapeAttr(e.position)}" oninput="updateExpField(${e.id},'position',this.value)"></div>
        <div class="form-group"><input class="form-input" placeholder="Company" value="${escapeAttr(e.company)}" oninput="updateExpField(${e.id},'company',this.value)"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><input class="form-input" type="month" value="${escapeAttr(e.startDate)}" oninput="updateExpField(${e.id},'startDate',this.value)"></div>
        <div class="form-group"><input class="form-input" type="month" value="${escapeAttr(e.endDate)}" oninput="updateExpField(${e.id},'endDate',this.value)"></div>
      </div>
      <div class="form-group"><textarea class="form-input" rows="3" placeholder="Description" oninput="updateExpField(${e.id},'description',this.value)">${escapeHTML(e.description)}</textarea></div>
    </div>
  `).join('');
}

// Skills
cvData.skillCategories = cvData.skillCategories || [];
function addSkillCategory(silent) {
  cvData.skillCategories.push({ id: uid(), name: '', skills: [] });
  renderSkills();
  if (!silent) { markDirty(); updatePreview(); }
}
function removeSkillCategory(id) {
  cvData.skillCategories = cvData.skillCategories.filter(s => s.id !== id);
  renderSkills(); markDirty(); updatePreview();
}
function updateSkillCatField(id, field, value) {
  const s = cvData.skillCategories.find(x => x.id === id);
  if (s) { s[field] = value; markDirty(); updatePreview(); }
}
function addSkill(catId) {
  const cat = cvData.skillCategories.find(s => s.id === catId);
  if (cat) { cat.skills.push({ name: '', level: 'Intermediate' }); renderSkills(); markDirty(); updatePreview(); }
}
function removeSkill(catId, idx) {
  const cat = cvData.skillCategories.find(s => s.id === catId);
  if (cat) { cat.skills.splice(idx,1); renderSkills(); markDirty(); updatePreview(); }
}
function updateSkillField(catId, idx, field, value) {
  const cat = cvData.skillCategories.find(s => s.id === catId);
  if (cat && cat.skills[idx]) { cat.skills[idx][field] = value; markDirty(); updatePreview(); }
}
const SKILL_LEVELS = ['Beginner','Intermediate','Advanced','Expert'];
function renderSkills() {
  document.getElementById('skillsList').innerHTML = cvData.skillCategories.map(cat => `
    <div class="entry-card">
      <div class="entry-card-header">
        <input class="form-input" style="font-weight:600;font-size:13px;width:auto;flex:1;margin-right:8px;" value="${escapeAttr(cat.name)}" oninput="updateSkillCatField(${cat.id},'name',this.value)" placeholder="${t('add_skill')}">
        <div class="entry-card-actions">
          <button class="icon-btn add-inside-btn" onclick="addSkill(${cat.id})" title="${t('add')}">+</button>
          <button class="icon-btn" onclick="removeSkillCategory(${cat.id})" title="${t('remove')}">✕</button>
        </div>
      </div>
      ${cat.skills.map((sk,i) => `
        <div style="display:flex;gap:6px;margin-bottom:6px;align-items:center;">
          <input class="form-input" style="flex:1;" value="${escapeAttr(sk.name)}" placeholder="Skill" oninput="updateSkillField(${cat.id},${i},'name',this.value)">
          <select class="form-input" style="width:auto;min-width:110px;" onchange="updateSkillField(${cat.id},${i},'level',this.value)">
            ${SKILL_LEVELS.map(l => `<option value="${l}" ${sk.level===l?'selected':''}>${t('skill_'+l.toLowerCase())||l}</option>`).join('')}
          </select>
          <button class="icon-btn" onclick="removeSkill(${cat.id},${i})">✕</button>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function addCustomSection(silent) {
  cvData.customSections.push({ id: uid(), title: '', items: [] });

}
function removeCustomSection(id) {
  cvData.customSections = cvData.customSections.filter(s => s.id !== id);
  renderCustomSections(); markDirty(); updatePreview();

function updateCustomSectionField(id, field, value) {
  const s = cvData.customSections.find(x => x.id === id);
  if (s) { s[field] = value; markDirty(); updatePreview(); }

function addCustomItem(sectionId) {
  const s = cvData.customSections.find(x => x.id === sectionId);
  if (s) { s.items.push({ id: uid(), title: '', subtitle: '', description: '' }); renderCustomSections(); markDirty(); updatePreview(); }

function removeCustomItem(sectionId, itemId) {
  const s = cvData.customSections.find(x => x.id === sectionId);
  if (s) { s.items = s.items.filter(i => i.id !== itemId); renderCustomSections(); markDirty(); updatePreview(); }
}
function updateCustomItemField(sectionId, itemId, field, value) {
  const s = cvData.customSections.find(x => x.id === sectionId);

function updatePreview() {
  const p = cvData.personal || {};
  const hasData = p.fullName || p.title || cvData.experiences.some(e => e.company) || cvData.education.some(e => e.institution);
  if (!hasData) {
    document.getElementById('a4Content').innerHTML = `<div class="a4-empty">${t('empty_preview')}</div>`;
    return;
  }
  let html = '';
  if (curTemplate === 'modern') html = renderModern();
  else if (curTemplate === 'classic') html = renderClassic();
  else html = renderMinimal();
  document.getElementById('a4Content').innerHTML = html;
}

function formatDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  if (parts.length < 2) return d;
  const months = t('months') || ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const m = parseInt(parts[1]) - 1;
  return months[m] + ' ' + parts[0];
}

function getSkillDots(level) {
  const map = { 'Expert': 4, 'Advanced': 3, 'Intermediate': 2, 'Beginner': 1 };
  const n = map[level] || 0;
  let dots = '<div style="display:flex;gap:4px;align-items:center;">';
  for (let i = 0; i < 4; i++) {
    dots += `<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${i < n ? GOLD : '#D4C4A8'}"></span>`;
  }
  dots += '</div>';
  return dots;
}

async function downloadPDF(quality) {
  closeDownloadModal();

  const previewContent = document.getElementById('a4Content');
  if (!previewContent || previewContent.querySelector('.a4-empty')) {
    showToast('⚠️ ' + t('empty_state'));
    return;
  }

  showToast('⏳ ' + t('generating'));
  await document.fonts.ready;

  const p = cvData.personal || {};
  const fileName = (p.fullName ? p.fullName.trim().replace(/\s+/g, '_') : t('pdf_name')) + '.pdf';

  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:fixed;left:0;top:0;width:794px;height:1123px;border:none;opacity:0;pointer-events:none;z-index:-1;';
  document.body.appendChild(iframe);

  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      * { margin:0; padding:0; box-sizing:border-box; }
      body { width:794px; height:1123px; background:#fff; color:#1a1a1a; overflow:hidden; }
    </style>
  </head><body>${previewContent.innerHTML}</body></html>`);
  doc.close();

  await new Promise(r => setTimeout(r, 800));

  const scaleMap = { high: 3, medium: 2, low: 1 };
  const scale = scaleMap[quality] || 2;

  const opt = {
    margin: 0,
    filename: fileName,
    image: { type: 'jpeg', quality: quality === 'high' ? 0.98 : quality === 'medium' ? 0.85 : 0.7 },
    html2canvas: {
      scale,
      useCORS: true,
      allowTaint: true,
      letterRendering: true,
      backgroundColor: '#ffffff',
      logging: false,
      width: 794,
      height: 1123,
      scrollX: 0,
      scrollY: 0
    },
    jsPDF: { unit: 'px', format: [794, 1123], orientation: 'portrait' }
  };

  html2pdf()
    .set(opt)
    .from(doc.body)
    .save()
    .then(() => {
      document.body.removeChild(iframe);
      showToast('✅ PDF ' + t('saved'));
    })
    .catch(err => {
      console.error('PDF error:', err);
      if (iframe.parentNode) document.body.removeChild(iframe);
      showToast('❌ ' + t('pdf_error'));
    });
}

// Toast
function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;background:var(--bg-panel);color:var(--text-primary);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;box-shadow:0 4px 20px var(--shadow);transition:opacity .3s,transform .3s;opacity:0;font-family:var(--font-sans);';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  toast.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) translateY(10px)';
  }, 2500);
}

// Mobile preview
document.getElementById('mobilePreviewBtn').addEventListener('click', () => {
  document.getElementById('rightPanel').classList.add('open');
  document.getElementById('closePreviewBtn').classList.add('open');
});
document.getElementById('closePreviewBtn').addEventListener('click', () => {
  document.getElementById('rightPanel').classList.remove('open');
  document.getElementById('closePreviewBtn').classList.remove('open');
});

// Active tab helper
function activeTab(name) {
  document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
  const tab = document.querySelector(`.section-tab[data-section="${name}"]`);
  if (tab) tab.classList.add('active');
  const sec = document.getElementById('section-' + name);
  if (sec) sec.classList.add('active');
}

// Init
function init() {
  const savedTmpl = localStorage.getItem('cvmaker-template');
  if (savedTmpl) curTemplate = savedTmpl;

  document.querySelectorAll('.template-btn').forEach(b => {
    b.classList.remove('active');
    const tmpl = b.getAttribute('onclick')?.match(/selectTemplate\('(\w+)'/);
    if (tmpl && tmpl[1] === curTemplate) b.classList.add('active');
  });

  if (cvData.experiences.length === 0) addExperience(true);
  if (cvData.education.length === 0) addEducation(true);
  if (cvData.skillCategories.length === 0) addSkillCategory(true);
  if (cvData.languages.length === 0) addLanguage(true);

  loadFormFromData();
  updateSaveStatus();
  updatePreview();
}
init();
</script>
