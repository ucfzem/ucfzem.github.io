<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Collecteur d'Emails</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#f8fafc;min-height:100dvh;padding:2rem 1rem}
  .wrap{max-width:900px;margin:0 auto}
  h1{font-size:1.5rem;font-weight:700;margin-bottom:.25rem}
  .sub{color:#64748b;font-size:.875rem;margin-bottom:2rem}
  .login{background:#1e293b;border-radius:1rem;padding:2rem;max-width:400px;margin:4rem auto;text-align:center}
  .login h2{font-size:1.125rem;margin-bottom:1rem}
  .login input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:.75rem;padding:.75rem 1rem;font-size:.875rem;color:#f8fafc;outline:none;margin-bottom:.75rem}
  .login input:focus{border-color:#6366f1}
  .login .er{color:#f87171;font-size:.8125rem;margin-top:.5rem}
  .btn{width:100%;border:none;border-radius:.75rem;padding:.75rem;font-size:.875rem;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;transition:all .2s}
  .btn:hover{opacity:.9;transform:translateY(-1px)}
  .stats{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
  .stat{background:#1e293b;border-radius:.75rem;padding:1rem 1.5rem;flex:1;min-width:120px}
  .stat .n{font-size:1.5rem;font-weight:700;color:#818cf8}
  .stat .l{font-size:.75rem;color:#64748b;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
  table{width:100%;border-collapse:collapse;font-size:.8125rem}
  th{background:#1e293b;padding:.625rem .75rem;text-align:left;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;font-size:.6875rem;border-bottom:2px solid #334155}
  td{padding:.625rem .75rem;border-bottom:1px solid #1e293b;color:#cbd5e1;vertical-align:middle}
  tr:hover td{background:rgba(99,102,241,.05)}
  .badge{display:inline-block;font-size:.6875rem;padding:.125rem .5rem;border-radius:.25rem;background:rgba(5,150,105,.15);color:#34d399}
  .empty{text-align:center;padding:3rem;color:#475569}
  .empty svg{width:40px;height:40px;margin-bottom:.75rem;color:#334155}
  .date{color:#64748b;font-size:.75rem}
  .ref{text-align:center;margin-top:2rem;font-size:.75rem;color:#334155}
  .ref a{color:#64748b;text-decoration:none}
  .ref a:hover{color:#94a3b8}
  .logout{display:inline-block;margin-top:1rem;font-size:.75rem;color:#475569;cursor:pointer;text-decoration:underline}
  .logout:hover{color:#94a3b8}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:.5rem}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
  .search input{background:#0f172a;border:1px solid #334155;border-radius:.5rem;padding:.5rem .75rem;font-size:.8125rem;color:#f8fafc;outline:none;width:200px}
  .search input:focus{border-color:#6366f1}
  .search input::placeholder{color:#475569}
  @media(max-width:600px){td:nth-child(4),th:nth-child(4){display:none}}
</style>
</head>
<body>
<div class="wrap">
  <div id="login" class="login">
    <h2>🔐 Accès Admin</h2>
    <input type="password" id="password" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">Se connecter</button>
    <div id="loginErr" class="er"></div>
  </div>
  <div id="dashboard" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem">
      <div>
        <h1>📬 Collecteur d'Emails</h1>
        <p class="sub" id="subtitle">Chargement...</p>
      </div>
      <span class="logout" onclick="logout()">Déconnexion</span>
    </div>
    <div class="stats" id="stats"></div>
    <div class="toolbar">
      <div class="search"><input type="text" id="search" placeholder="Rechercher..." oninput="filterTable()"></div>
      <button class="btn" style="width:auto;padding:.5rem 1rem;font-size:.75rem" onclick="exportCSV()">📥 Exporter CSV</button>
    </div>
    <div id="tableWrap" style="background:#1e293b;border-radius:.75rem;overflow:hidden;overflow-x:auto"></div>
  </div>
  <p class="ref"><a href="https://ucfzem.github.io">Ucf Zem</a></p>
</div>
<script>
  const WORKER = 'https://email-collector.ucfzem.workers.dev'
  let data = []

  function login() {
    const pw = document.getElementById('password').value
    if (!pw) return
    document.getElementById('loginErr').textContent = ''
    fetchEmails(pw)
  }

  function logout() {
    data = []
    document.getElementById('dashboard').style.display = 'none'
    document.getElementById('login').style.display = 'block'
    document.getElementById('password').value = ''
  }

  async function fetchEmails(pw) {
    document.getElementById('login').querySelector('.btn').disabled = true
    document.getElementById('login').querySelector('.btn').innerHTML = '<span class="spinner"></span>'
    try {
      const r = await fetch(WORKER + '/admin?password=' + encodeURIComponent(pw))
      const d = await r.json()
      if (r.ok) {
        data = d.entries
        document.getElementById('login').style.display = 'none'
        document.getElementById('dashboard').style.display = 'block'
        render()
      } else {
        document.getElementById('loginErr').textContent = d.error === 'Unauthorized' ? 'Mot de passe incorrect' : (d.error || 'Erreur')
      }
    } catch(e) {
      document.getElementById('loginErr').textContent = 'Erreur réseau. Worker déployé ?'
    }
    document.getElementById('login').querySelector('.btn').disabled = false
    document.getElementById('login').querySelector('.btn').innerHTML = 'Se connecter'
  }

  function render() {
    document.getElementById('subtitle').textContent = data.length + ' inscription' + (data.length > 1 ? 's' : '')
    const today = new Date()
    const todayStr = today.toISOString().slice(0,10)
    const todayCount = data.filter(e => new Date(e.ts).toISOString().slice(0,10) === todayStr).length
    const unique = new Set(data.map(e => e.email)).size
    const last = data.length > 0 ? new Date(data[0].ts).toLocaleDateString('fr-FR') : '-'
    document.getElementById('stats').innerHTML =
      '<div class="stat"><div class="n">' + data.length + '</div><div class="l">Total</div></div>' +
      '<div class="stat"><div class="n">' + todayCount + '</div><div class="l">Aujourd\'hui</div></div>' +
      '<div class="stat"><div class="n">' + unique + '</div><div class="l">Uniques</div></div>' +
      '<div class="stat"><div class="n">' + last + '</div><div class="l">Dernier</div></div>'
    renderTable(data)
  }

  function renderTable(entries) {
    if (entries.length === 0) {
      document.getElementById('tableWrap').innerHTML = '<div class="empty"><div>📭</div><p>Aucune inscription pour le moment</p></div>'
      return
    }
    let html = '<table><thead><tr><th>Nom</th><th>Email</th><th>Date</th><th>IP</th></tr></thead><tbody>'
    for (const e of entries) {
      const d = new Date(e.ts).toLocaleDateString('fr-FR', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})
      html += '<tr><td><strong>' + esc(e.name) + '</strong></td><td>' + esc(e.email) + '</td><td class="date">' + d + '</td><td style="color:#64748b;font-size:.75rem">' + esc(e.ip) + '</td></tr>'
    }
    html += '</tbody></table>'
    document.getElementById('tableWrap').innerHTML = html
  }

  function filterTable() {
    const q = document.getElementById('search').value.toLowerCase()
    if (!q) return renderTable(data)
    renderTable(data.filter(e => e.name.toLowerCase().includes(q) || e.email.toLowerCase().includes(q)))
  }

  function exportCSV() {
    let csv = 'Nom,Email,Date,IP\n'
    for (const e of data) {
      const d = new Date(e.ts).toISOString()
      csv += '"' + e.name + '","' + e.email + '","' + d + '","' + e.ip + '"\n'
    }
    const blob = new Blob([csv], { type: 'text/csv' })
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob)
    a.download = 'emails-' + new Date().toISOString().slice(0,10) + '.csv'
    a.click()
    URL.revokeObjectURL(a.href)
  }

  function esc(s) { return s.replace(/[&<>"]/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m] }) }
</script>
</body>
</html>
