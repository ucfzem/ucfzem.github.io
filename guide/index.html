<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Guide Ultime du Freelance — UCF ZEM</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter','Cairo',sans-serif;background:#0f172a;color:#f8fafc;overflow-x:hidden;line-height:1.6}
  .bg-glow{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
  .bg-glow div{position:absolute;border-radius:50%;filter:blur(100px)}
  .bg-glow .g1{width:400px;height:400px;background:rgba(59,130,246,.15);top:-100px;left:-100px}
  .bg-glow .g2{width:400px;height:400px;background:rgba(139,92,246,.15);bottom:-100px;right:-100px}
  .bg-glow .g3{width:300px;height:300px;background:rgba(236,72,153,.08);top:50%;left:50%;transform:translate(-50%,-50%)}
  .content{position:relative;z-index:1}

  .lang-toggle{position:fixed;top:1rem;right:1rem;z-index:50;display:flex;gap:.5rem}
  .lang-toggle button{padding:.5rem 1rem;border-radius:.5rem;font-weight:700;font-size:.8rem;border:none;cursor:pointer;transition:all .2s;background:#1e293b;color:#64748b}
  .lang-toggle button.active{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff}

  .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:6rem 1rem 2rem;position:relative}
  .hero .logo-wrap{width:80px;height:80px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:1rem;display:flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:1.5rem;box-shadow:0 8px 32px rgba(59,130,246,.25)}
  .hero h1{font-size:clamp(2.5rem,7vw,4.5rem);font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem;line-height:1.1}
  .hero .sub{font-size:clamp(1rem,3vw,1.5rem);color:#94a3b8;margin-bottom:2rem;max-width:600px}
  .hero .badge{display:inline-block;background:linear-gradient(135deg,#3b82f6,#8b5cf6);padding:.75rem 2rem;border-radius:1rem;font-weight:700;font-size:1rem;margin-bottom:3rem;box-shadow:0 4px 20px rgba(59,130,246,.3)}
  .hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;max-width:500px;width:100%}
  .hero-grid .item{background:rgba(30,41,59,.5);border:1px solid #334155;border-radius:.75rem;padding:1rem;backdrop-filter:blur(8px);transition:all .2s}
  .hero-grid .item:hover{border-color:rgba(59,130,246,.5)}
  .hero-grid .item .ico{font-size:1.5rem;margin-bottom:.25rem}
  .hero-grid .item .lb{font-size:.75rem;color:#94a3b8;font-weight:600}

  .sec{padding:4rem 1rem;max-width:1100px;margin:0 auto}
  .sec-header{display:flex;align-items:center;gap:1rem;margin-bottom:2.5rem}
  .sec-header .svg-wrap{flex-shrink:0;width:80px;height:80px}
  .sec-header .svg-wrap svg{width:100%;height:100%}
  .sec-header h2{font-size:clamp(1.5rem,4vw,2.5rem);font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .sec-header p{color:#64748b;font-size:.9rem;margin-top:.25rem}

  .card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem}
  .card{background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid #334155;border-radius:1rem;padding:1.5rem;transition:all .2s}
  .card:hover{border-color:rgba(59,130,246,.4)}
  .card h3{font-size:1.1rem;font-weight:700;color:#60a5fa;margin-bottom:.25rem}
  .card .exp{font-size:.8rem;color:#475569;margin-bottom:.75rem}
  .card ul{list-style:none}
  .card ul li{font-size:.82rem;color:#94a3b8;padding:.35rem 0;display:flex;align-items:flex-start;gap:.5rem}
  .card ul li::before{content:'→';color:#3b82f6}

  .email-stack{display:flex;flex-direction:column;gap:1rem}
  .email-full{background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(59,130,246,.05));border:1px solid rgba(139,92,246,.2);border-radius:1rem;padding:1.5rem;transition:all .2s}
  .email-full:hover{border-color:rgba(139,92,246,.4)}
  .email-full .hdr{display:flex;gap:.5rem;align-items:center;margin-bottom:.75rem;flex-wrap:wrap}
  .email-full .num{background:linear-gradient(135deg,#8b5cf6,#3b82f6);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;flex-shrink:0}
  .email-full .type{font-weight:700;color:#a78bfa}
  .email-full .target{font-size:.75rem;color:#475569;background:#1e293b;padding:.2rem .6rem;border-radius:1rem}
  .email-full .subject{font-size:.8rem;color:#94a3b8;margin-bottom:.75rem;padding:.5rem .75rem;background:rgba(0,0,0,.2);border-radius:.5rem;border-left:2px solid #8b5cf6}
  .email-full .body{font-size:.82rem;color:#cbd5e1;line-height:1.7;white-space:pre-wrap}
  .email-full .body .sig{color:#475569;margin-top:.5rem;display:block}

  .obj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1rem}
  .obj-card{background:linear-gradient(135deg,rgba(249,115,22,.08),rgba(239,68,68,.05));border:1px solid rgba(249,115,22,.2);border-radius:1rem;padding:1.5rem;transition:all .2s}
  .obj-card:hover{border-color:rgba(249,115,22,.4)}
  .obj-card .obj{font-size:.9rem;font-weight:700;color:#fb923c;margin-bottom:.5rem}
  .obj-card .rep{font-size:.82rem;color:#94a3b8}
  .obj-card .rep::before{content:'→ ';color:#f97316}

  .resource-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.75rem}
  .resource-card{background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(5,150,105,.05));border:1px solid rgba(16,185,129,.2);border-radius:.75rem;padding:1.25rem;transition:all .2s;text-align:center}
  .resource-card:hover{border-color:rgba(16,185,129,.4)}
  .resource-card .ico{font-size:1.5rem;margin-bottom:.5rem}
  .resource-card h4{font-size:.9rem;font-weight:700;color:#6ee7b7;margin-bottom:.25rem}
  .resource-card p{font-size:.75rem;color:#64748b}

  .legal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem}
  .legal-card{background:linear-gradient(135deg,rgba(6,182,212,.08),rgba(59,130,246,.05));border:1px solid rgba(6,182,212,.2);border-radius:1rem;padding:1.5rem;transition:all .2s}
  .legal-card:hover{border-color:rgba(6,182,212,.4)}
  .legal-card h3{font-size:1rem;font-weight:700;color:#67e8f9;margin-bottom:.75rem}
  .legal-card ul{list-style:none}
  .legal-card ul li{font-size:.82rem;color:#94a3b8;padding:.35rem 0;display:flex;gap:.5rem}
  .legal-card ul li::before{content:'•';color:#22d3ee}

  .timeline{display:flex;flex-direction:column;gap:1rem}
  .tl-item{display:flex;gap:1rem;align-items:flex-start}
  .tl-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;margin-top:.2rem}
  .tl-dot.s1{background:rgba(16,185,129,.2);color:#34d399}
  .tl-dot.s2{background:rgba(59,130,246,.2);color:#60a5fa}
  .tl-dot.s3{background:rgba(139,92,246,.2);color:#a78bfa}
  .tl-dot.s4{background:rgba(249,115,22,.2);color:#fb923c}
  .tl-content{flex:1;background:#1e293b;border-radius:.75rem;padding:1rem;border:1px solid #334155}
  .tl-content h4{font-size:.9rem;font-weight:700;color:#f8fafc;margin-bottom:.25rem}
  .tl-content p{font-size:.8rem;color:#94a3b8}

  .routine-list{display:flex;flex-direction:column;gap:.75rem}
  .routine-item{background:linear-gradient(135deg,rgba(236,72,153,.08),rgba(239,68,68,.05));border:1px solid rgba(236,72,153,.2);border-radius:.75rem;padding:1.25rem;transition:all .2s}
  .routine-item:hover{border-color:rgba(236,72,153,.4)}
  .routine-item .time{font-size:1.1rem;font-weight:700;color:#f472b6;margin-bottom:.25rem}
  .routine-item .lb{font-size:.85rem;color:#64748b;margin-bottom:.5rem}
  .routine-item .tags{display:flex;flex-wrap:wrap;gap:.35rem}
  .routine-item .tags span{font-size:.7rem;background:rgba(236,72,153,.15);color:#f9a8d4;padding:.25rem .6rem;border-radius:1rem}

  .check-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:.75rem}
  .check-card{border-radius:.75rem;padding:1.25rem;border:1px solid;transition:all .2s}
  .check-card:hover{border-color:currentColor}
  .check-card.w1{background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(5,150,105,.05));border-color:rgba(16,185,129,.25);color:#34d399}
  .check-card.w2{background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(6,182,212,.05));border-color:rgba(59,130,246,.25);color:#60a5fa}
  .check-card.w3{background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(236,72,153,.05));border-color:rgba(139,92,246,.25);color:#a78bfa}
  .check-card.w4{background:linear-gradient(135deg,rgba(249,115,22,.08),rgba(239,68,68,.05));border-color:rgba(249,115,22,.25);color:#fb923c}
  .check-card h4{font-weight:700;color:#f8fafc;margin-bottom:.25rem}
  .check-card .sub{font-size:.8rem;color:currentColor;margin-bottom:.75rem;opacity:.7}
  .check-card ul{list-style:none}
  .check-card ul li{font-size:.8rem;color:#94a3b8;padding:.3rem 0;display:flex;align-items:flex-start;gap:.5rem}
  .check-card ul li::before{content:'✓';color:currentColor;font-weight:700}

  .cta-section{text-align:center;padding:4rem 2rem;max-width:600px;margin:0 auto}
  .cta-section h2{font-size:2rem;font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
  .cta-section p{color:#94a3b8;margin-bottom:2rem;font-size:.9rem}
  .cta-btn{display:inline-block;padding:1rem 2.5rem;border-radius:1rem;font-weight:700;font-size:1rem;text-decoration:none;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;transition:all .2s;box-shadow:0 8px 32px rgba(59,130,246,.3)}
  .cta-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(59,130,246,.4)}

  footer{text-align:center;padding:3rem 1rem;border-top:1px solid #1e293b;color:#475569;font-size:.85rem}
  footer a{color:#818cf8;text-decoration:underline;text-underline-offset:2px}

  .ar{font-family:'Cairo',sans-serif;direction:rtl;text-align:right}
  .ar .card ul li::before{content:'→'}
  .ar .check-card ul li::before{content:'✓'}
  .ar .obj-card .rep::before{content:'→ '}
  .ar .legal-card ul li::before{content:'•'}

  @media print{body{background:#fff!important}.lang-toggle{display:none!important}.hero{min-height:auto!important;padding:2rem 1rem!important}.sec{padding:2rem 1rem!important;page-break-inside:avoid}.card:hover,.routine-item:hover,.email-full:hover{border-color:inherit!important}.hero-grid{page-break-after:always}}
  @media(max-width:640px){.hero-grid{grid-template-columns:1fr 1fr}.tl-item{flex-direction:column;gap:.5rem}.tl-dot{margin:0}}
</style>
</head>
<body>
<div class="bg-glow"><div class="g1"></div><div class="g2"></div><div class="g3"></div></div>
<div class="lang-toggle" id="langToggle">
  <button class="active" data-lang="fr" onclick="setLang('fr')">FR</button>
  <button data-lang="ar" onclick="setLang('ar')">AR</button>
</div>
<div class="content" id="app"></div>

<script>
const DATA = {
  fr: {
    hero: { title: 'Le Guide Ultime du Freelance', sub: 'Passer de 0€ à 5.000€/mois en 30 jours — stratégies, templates et routines des freelances qui réussissent.', badge: '🎁 OFFERT', grid: ['💰 Tarifs', '📧 Prospection', '⏰ Routine', '🛡️ Objections', '⚖️ Légal', '📈 Croissance'] },
    s1: { title: '💰 Grille Tarifaire', desc: 'Fixer ses prix avec confiance selon son niveau', cards: [
      { level:'🏗 Débutant', exp:'< 6 mois — vous apprenez encore', items:[
        'Landing page one-page: 300-500€',
        'Site vitrine 3-5 pages: 600-1.200€',
        'Intégration HTML/CSS: 200-400€',
        'Audit technique: 100-200€',
        'Correction bugs: 30-50€/h',
        'Maintenance base: 100-200€/mois'
      ]},
      { level:'📈 Intermédiaire', exp:'6-18 mois — vous maîtrisez', items:[
        'React/Next.js: 350-450€/jour',
        'API REST/Node.js: 300-400€/jour',
        'Refonte complète: 2.500-5.000€',
        'CMS custom: 400-600€/jour',
        'Maintenance pro: 200-400€/mois',
        'Formation dev: 300-500€/jour'
      ]},
      { level:'⭐ Confirmé', exp:'18+ mois — vous conseillez', items:[
        'Architecture technique: 500-700€/jour',
        'Lead tech / CTO freelance: 600-900€/jour',
        'SaaS clé en main: 10.000-30.000€',
        'Audit sécurité: 400-600€/jour',
        'Formation entreprise: 600-1.000€/jour',
        'Consulting stratégique: 800-1.200€/jour'
      ]}
    ]},
    s2: { title: '📧 5 Emails de Prospection', desc: 'Des templates qui convertissent, validés par des freelances à 5k€/mois', emails: [
      { num:'1', type:'Email Froid', target:'Directeur technique / fondateur', subject:'Une idée simple pour [Site]',
        body:'Bonjour [Prénom],\n\nJe suis développeur freelance spécialisé en [React/Next.js/PHP].\n\nJe suis tombé sur [Site] et j\'ai repéré [point faible précis: lenteur, UI datée, page produit].\n\nJ\'ai une idée concrète pour améliorer ça : [proposition en 1 phrase].\n\nÇa vous dit qu\'on en parle 10 min cette semaine ?\n\nBien cordialement,\n[Prénom] — [Nom]\n[Lien portfolio]',
        tag:'🎯 Contact initial — 30-40% taux d\'ouverture'},
      { num:'2', type:'Email Agence', target:'Directeur d\'agence', subject:'Prestation dev — disponibilité [Mois]',
        body:'Bonjour [Prénom],\n\nJe suis développeur freelance disponible à partir de [date].\n\nJe travaille sur [stack] et j\'ai déjà collaboré avec des agences sur [type de projets]. Je peux intervenir en renfort sur vos projets quand vous débordez.\n\nTarif : [prix]€/jour. Je m\'adapte à vos méthodes (Slack, Notion, Jira).\n\nUne piste à explorer pour soulager votre équipe ?\n\nCordialement,\n[Prénom]',
        tag:'🏢 Agences — relation long terme'},
      { num:'3', type:'Relance J+7', target:'Prospect non-répondant', subject:'RE: Une idée simple pour [Site]',
        body:'Bonjour [Prénom],\n\nJe me permets de relancer mon précédent message.\n\nSi le timing n\'est pas bon, pas de souci — je repasse dans 2-3 mois.\n\nMais si le sujet vous intéresse, 10 min suffisent pour que je vous montre concrètement ce que je propose.\n\nBonne semaine !\n\n[Prénom]',
        tag:'🔄 70% des deals se font après relance'},
      { num:'4', type:'Recommandation', target:'Ancien collègue / client', subject:'Suivi — content de [Projet] ?',
        body:'Salut [Prénom],\n\nJ\'espère que tout va bien depuis [projet].\n\nJe voulais prendre des nouvelles : est-ce que [Projet] tient la route ?\n\nSi tu connais quelqu\'un qui cherche un freelance en [stack], je suis preneur — je préfère bosser avec des gens de confiance.\n\nEt si je peux t\'aider sur autre chose, n\'hésite pas.\n\nÀ bientôt,\n[Prénom]',
        tag:'🤝 80% des freelances à 5k+ viennent du réseau'},
      { num:'5', type:'Audit + Proposition', target:'Prospect qualifié', subject:'Audit rapide de [Site] — 3 pistes d\'amélioration',
        body:'Bonjour [Prénom],\n\nJ\'ai pris 30 min pour analyser [Site]. Voici ce que j\'ai trouvé :\n\n1️⃣ [Problème 1 + impact]\n2️⃣ [Problème 2 + impact]\n3️⃣ [Opportunité]\n\nJe peux corriger les points 1 et 2 en [X jours]. Pour le point 3, je propose [solution].\n\nInvestissement : [prix]€.\n\nJe suis disponible cette semaine pour en discuter. Vous préférez appel ou email ?\n\nCordialement,\n[Prénom]',
        tag:'📊 Audit offert — taux de conversion > 50%'}
    ]},
    s3: { title: '🛡️ Gérer les Objections', desc: 'Les réponses qui retournent un « non » en « oui »', objections: [
      { obj:'"C\'est trop cher"', rep:'Proposez 3 formules (basique/standard/premium). Le client choisit souvent la standard. Vous montrez que vous vous adaptez à son budget tout en restant professionnel.' },
      { obj:'"Je dois en parler à mon associé"', rep:'Proposez un call à 3. Vous contrôlez la conversation au lieu d\'attendre. Préparation : anticipez leurs questions.' },
      { obj:'"Je n\'ai pas le budget maintenant"', rep:'Proposez un paiement en 2-3 fois ou un scope réduit. Un petit projet maintenant = un gros projet plus tard.' },
      { obj:'"On a déjà un freelance"', rep:'Félicitez-les. Puis : "Si jamais vous avez besoin d\'un second avis ou d\'un renfort sur un projet précis, je suis là."' },
      { obj:'"Je peux le faire moi-même"', rep:'"Vous pouvez, mais est-ce que c\'est le meilleur usage de votre temps ? Un pro le fait en X jours, vous prendrez X semaines. Le calcul est vite fait."' },
      { obj:'"Envoyez-moi un devis"', rep:'Ne jamais envoyer un devis sans appel. Le devis seul = comparaison par le prix. L\'appel = comparaison par la valeur. Obtenez d\'abord un "oui" qualitatif.' }
    ]},
    s4: { title: '⚖️ Légal & Administration', desc: 'Les bases pour être en règle sans se ruiner', legal: [
      { title:'📝 Statuts', items:['France: auto-entrepreneur (micro-entreprise) jusqu\'à 77.700€/an', 'Maroc: auto-entrepreneur via le site auto-entrepreneur.ma', 'Tunisie: personne physiquement assujettie ( PPA )', 'SASU/EURL: quand vous dépassez les plafonds', 'Comparatif: AE = 22% CA, SASU = ~45% (mais déductions)'] },
      { title:'📄 Devis & Factures', items:['Toujours faire signer un devis avant de commencer', 'Facture obligatoire dans les 30 jours', 'Mentionner: numéro SIRET/SIREN, TVA si applicable', 'Pénalités de retard obligatoires sur les factures', 'Conserver les devis signés = preuve juridique'] },
      { title:'💰 Fiscalité', items:['Option versement libératoire: payez l\'impôt en même temps que les cotisations', 'TVA: franchise en base jusqu\'à 36.800€ (prestations)', 'Déclaration mensuelle/trimestrielle selon option', 'CFE (Cotisation Foncière) : ~200-500€/an selon commune', 'Urssaf: déclaration à faire même si 0€ de CA'] },
      { title:'🔒 Protection', items:['Assurance RC Pro: 100-300€/an (obligatoire pour missions en agence)', 'Contrat de prestation: protège vos livrables', 'CGV: conditions générales de vente obligatoires', 'Clause de confidentialité: pour vos process techniques', 'Droit d\'auteur: protégez vos créations (code, designs)'] }
    ]},
    s5: { title: '🧰 Outils & Ressources', desc: 'La stack des freelances qui tiennent la distance', resources: [
      { ico:'💼', title:'Portfolio', desc:'Vercel + domaine en .com (10€/an)' },
      { ico:'📊', title:'Compta', desc:'QuickBooks ou Indy — 15€/mois, tout inclus' },
      { ico:'🤝', title:'CRM', desc:'Less Annoying CRM — simple, 10$/' },
      { ico:'📝', title:'Contrats', desc:'Legalstart.de — devis et contrats en ligne' },
      { ico:'⏱️', title:'Temps', desc:'Toggl Track — gratuit, tracking par projet' },
      { ico:'💳', title:'Paiements', desc:'Stripe ou PayPal — encaissements pros' },
      { ico:'📧', title:'Emails', desc:'Resend + votre domaine — emails transactionnels' },
      { ico:'🔗', title:'Veille', desc:'TLDR Newsletter — résumé quotidien tech' },
      { ico:'🎯', title:'Freelances', desc:'Malt, Comet, Codeur — plateformes selon niveau' },
      { ico:'📚', title:'Prospection', desc:'LinkedIn Sales Navigator — 80€/mois' }
    ]},
    s6: { title: '📈 Plan Croissance Post-5k', desc: 'Quand vous atteignez 5.000€/mois, visez plus haut', timeline: [
      { stage:'1', cls:'s1', title:'Stabiliser', desc:'Automatisez la compta, déléquez le design (Fiverr/Upwork), mettez en place des templates de prospection. Votre objectif : libérer 5h/semaine.' },
      { stage:'2', cls:'s2', title:'Augmenter les prix', desc:'+15-20% sur chaque nouveau client. Si vous perdez un prospect à cause du prix, vous étiez en dessous du marché.' },
      { stage:'3', cls:'s3', title:'Produitiser', desc:'Créez un audit standardisé (500€) ou un template SaaS. Un produit se vend 24h/24, votre temps non.' },
      { stage:'4', cls:'s4', title:'Sous-traiter', desc:'Prenez un junior à 200€/jour, facturez 500€/jour. Vous passez de maker à manager. C\'est le vrai passage à l\'échelle.' },
      { stage:'5', cls:'s1', title:'Recurring Revenue', desc:'Maintenance + hébergement = 200-400€/mois/client. 10 clients = 3.000€/mois sans travailler. Le Graal du freelance.' },
      { stage:'6', cls:'s2', title:'Quitter le freelancing', desc:'Créez un produit SaaS, embauchez, devenez agence. Le freelancing est un tremplin, pas une destination.' }
    ]},
    s7: { title: '⏰ Routine Quotidienne', desc: 'Le planning des freelances qui tiennent sur la durée', blocks: [

function render(lang) {
  const d = DATA[lang]
  const isAr = lang === 'ar'
  document.documentElement.dir = isAr ? 'rtl' : 'ltr'
  document.documentElement.lang = lang
  document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang))

  let html = ''

  // Hero
  html += `<section class="hero"><div class="logo-wrap">✦</div><h1>${d.hero.title}</h1><p class="sub">${d.hero.sub}</p><div class="badge">${d.hero.badge}</div><div class="hero-grid">`
  d.hero.grid.forEach(g => { html += `<div class="item"><div class="ico">${g.split(' ')[0]}</div><div class="lb">${g}</div></div>` })
  html += `</div></section>`

  // Section 1 — Pricing
  html += `<section class="sec"><div class="sec-header"><div class="svg-wrap"><svg viewBox="0 0 80 80"><rect x="16" y="12" width="48" height="56" rx="4" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity=".3"/><rect x="20" y="20" width="40" height="40" rx="3" fill="#3b82f6" opacity=".15"/><text x="40" y="44" font-size="20" font-weight="bold" text-anchor="middle" fill="#3b82f6">€</text></svg></div><div><h2>${d.s1.title}</h2><p>${d.s1.desc}</p></div></div><div class="card-grid">`
  d.s1.cards.forEach(c => {
    html += `<div class="card"><h3>${c.level}</h3><p class="exp">${c.exp}</p><ul>`
    c.items.forEach(i => { html += `<li>${i}</li>` })
    html += `</ul></div>`
  })
  html += `</div></section>`

  // Section 2 — Emails
  html += `<section class="sec"><div class="sec-header"><div class="svg-wrap"><svg viewBox="0 0 80 80"><rect x="12" y="20" width="56" height="40" rx="4" fill="none" stroke="#8b5cf6" stroke-width="1.5"/><path d="M12 20 L40 40 L68 20" fill="none" stroke="#8b5cf6" stroke-width="1.5"/></svg></div><div><h2>${d.s2.title}</h2><p>${d.s2.desc}</p></div></div><div class="email-stack">`
  d.s2.emails.forEach(e => {
    html += `<div class="email-full"><div class="hdr"><span class="num">${e.num}</span><span class="type">${e.type}</span><span class="target">${e.target}</span></div><div class="subject">📌 ${e.subject}</div><div class="body">${e.body}</div><div style="margin-top:.75rem;font-size:.75rem;color:#475569">${e.tag}</div></div>`
  })
  html += `</div></section>`

  // Section 3 — Objections
  html += `<section class="sec"><div class="sec-header"><div class="svg-wrap"><svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="24" fill="none" stroke="#f97316" stroke-width="1.5"/><line x1="28" y1="28" x2="52" y2="52" stroke="#f97316" stroke-width="2"/><line x1="52" y1="28" x2="28" y2="52" stroke="#f97316" stroke-width="2"/></svg></div><div><h2>${d.s3.title}</h2><p>${d.s3.desc}</p></div></div><div class="obj-grid">`
  d.s3.objections.forEach(o => {
    html += `<div class="obj-card"><div class="obj">${o.obj}</div><div class="rep">${o.rep}</div></div>`
  })
  html += `</div></section>`

  // Section 4 — Legal
  html += `<section class="sec"><div class="sec-header"><div class="svg-wrap"><svg viewBox="0 0 80 80"><rect x="28" y="12" width="24" height="56" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.5"/><line x1="16" y1="24" x2="64" y2="24" stroke="#22d3ee" stroke-width="1.5"/></svg></div><div><h2>${d.s4.title}</h2><p>${d.s4.desc}</p></div></div><div class="legal-grid">`
  d.s4.legal.forEach(l => {
    html += `<div class="legal-card"><h3>${l.title}</h3><ul>`
    l.items.forEach(i => { html += `<li>${i}</li>` })
    html += `</ul></div>`
  })
  html += `</div></section>`

  // Section 5 — Tools
  html += `<section class="sec"><div class="sec-header"><div class="svg-wrap"><svg viewBox="0 0 80 80"><rect x="16" y="20" width="48" height="40" rx="4" fill="none" stroke="#10b981" stroke-width="1.5"/><circle cx="40" cy="40" r="6" fill="none" stroke="#10b981" stroke-width="1.5"/><line x1="40" y1="26" x2="40" y2="34" stroke="#10b981" stroke-width="1.5"/></svg></div><div><h2>${d.s5.title}</h2><p>${d.s5.desc}</p></div></div><div class="resource-grid">`
  d.s5.resources.forEach(r => {
    html += `<div class="resource-card"><div class="ico">${r.ico}</div><h4>${r.title}</h4><p>${r.desc}</p></div>`
  })
  html += `</div></section>`

  // Section 6 — Growth
  html += `<section class="sec"><div class="sec-header"><div class="svg-wrap"><svg viewBox="0 0 80 80"><polyline points="16,56 32,40 48,44 64,24" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="16" cy="56" r="4" fill="#a78bfa"/><circle cx="32" cy="40" r="4" fill="#a78bfa"/><circle cx="48" cy="44" r="4" fill="#a78bfa"/><circle cx="64" cy="24" r="4" fill="#a78bfa"/></svg></div><div><h2>${d.s6.title}</h2><p>${d.s6.desc}</p></div></div><div class="timeline">`
  d.s6.timeline.forEach(t => {
    html += `<div class="tl-item"><div class="tl-dot ${t.cls}">${t.stage}</div><div class="tl-content"><h4>${t.title}</h4><p>${t.desc}</p></div></div>`
  })
  html += `</div></section>`

  // Section 7 — Routine
  html += `<section class="sec"><div class="sec-header"><div class="svg-wrap"><svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="28" fill="none" stroke="#ec4899" stroke-width="1.5"/><line x1="40" y1="20" x2="40" y2="32" stroke="#ec4899" stroke-width="2"/><line x1="40" y1="40" x2="56" y2="40" stroke="#ec4899" stroke-width="2"/><circle cx="40" cy="40" r="3" fill="#ec4899"/></svg></div><div><h2>${d.s7.title}</h2><p>${d.s7.desc}</p></div></div><div class="routine-list">`
  d.s7.blocks.forEach(b => {
    html += `<div class="routine-item"><div class="time">${b.time}</div><div class="lb">${b.lb}</div><div class="tags">`
    b.tags.forEach(t => { html += `<span>${t}</span>` })
    html += `</div></div>`
  })
  html += `</div></section>`

  // Section 8 — Checklist
  html += `<section class="sec"><div class="sec-header"><div class="svg-wrap"><svg viewBox="0 0 80 80"><rect x="16" y="12" width="48" height="56" rx="4" fill="none" stroke="#34d399" stroke-width="1.5"/><path d="M24 24 L32 32 L40 20" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div><h2>${d.s8.title}</h2><p>${d.s8.desc}</p></div></div><div class="check-grid">`
  d.s8.weeks.forEach(w => {
    html += `<div class="check-card ${w.cls}"><h4>${w.w}</h4><p class="sub">${w.t}</p><ul>`
    w.items.forEach(i => { html += `<li>${i}</li>` })
    html += `</ul></div>`
  })
  html += `</div></section>`

  // CTA
  html += `<div class="cta-section"><h2>${d.cta.title}</h2><p>${d.cta.desc}</p><a class="cta-btn" href="${d.cta.url}" target="_blank" rel="noopener">${d.cta.btn}</a></div>`

  // Footer
  html += `<footer><p>${d.footer}</p><p style="margin-top:.5rem"><a href="https://ucfzem.github.io">ucfzem.github.io</a></p></footer>`

  document.getElementById('app').innerHTML = html
}

function setLang(l) { render(l) }

// Print styles
const ps = document.createElement('style')
ps.textContent = `@media print{.sec{page-break-inside:avoid}.hero{page-break-after:always}.email-full{break-inside:avoid}}`
document.head.appendChild(ps)

render('fr')
</script>
</body>
</html>
