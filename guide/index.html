function sendEmail(email, btnId, msgId, btnText) {
  const btn = document.getElementById(btnId)
  const msg = document.getElementById(msgId)
  btn.disabled = true
  btn.textContent = '⏳'
  msg.className = ''
  msg.textContent = ''
  fetch(WORKER, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({email, source:'guide'})
  }).then(r => {
    if (r.ok) {
      msg.className = 'success'
      msg.innerHTML = `✅ Merci !<br><a href="${PDF}" download class="btn-download">📄 Télécharge ton PDF ici →</a>`
      btn.textContent = '✅'
    } else { throw new Error() }
  }).catch(() => {
    msg.className = 'error'
      msg.innerHTML = `<a href="${PDF}" download class="btn-download">⚠️ Télécharge directement le PDF</a>`
    btn.textContent = btnText
    btn.disabled = false
  })
}

function submitTop(e) { e.preventDefault(); sendEmail(document.getElementById('topEmail').value, 'topBtn', 'topMsg', DATA[document.documentElement.lang]?.hero?.btn || 'Get the PDF →') }
function submitBottom(e) { e.preventDefault(); sendEmail(document.getElementById('btmEmail').value, 'btmBtn', 'btmMsg', DATA[document.documentElement.lang]?.email?.b || 'Get the PDF →') }
