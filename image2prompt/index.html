<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurionary Arts - AI Prompt Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1116;
      --card: rgba(20, 31, 39, 0.9);
      --text: #f2f6f8;
      --text-muted: #909ea9;
      --cyan: #3bbfce;
      --red: #ef5350;
      --border: #4a5a67;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:var(--bg);color:var(--text);
      font-family:'Open Sans','Helvetica Neue',sans-serif;
      -webkit-font-smoothing:antialiased;
      min-height:100vh;padding:20px;
      display:flex;flex-direction:column;align-items:center
    }
    .container{max-width:800px;width:100%;display:flex;flex-direction:column;gap:30px}
    .glass{background:var(--card);border-radius:12px;padding:24px;border:1px solid rgba(255,255,255,0.05);box-shadow:0 4px 15px rgba(0,0,0,0.4)}
    h2{font-size:1.1rem;font-weight:400;color:var(--cyan);margin-bottom:20px}

    .header{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
    .logo-area{display:flex;align-items:center;gap:10px}
    .logo-icon{font-size:1.8rem;color:var(--cyan);line-height:1}
    .logo-text{font-size:1.2rem;font-weight:300;letter-spacing:0.5px;color:var(--text)}
    .header-title h1{font-size:1.25rem;font-weight:300;line-height:1.3;text-align:right}

    .upload-area{
      border:2px dashed var(--border);border-radius:10px;
      text-align:center;padding:40px 20px;cursor:pointer;
      transition:background 0.3s, border-color 0.3s
    }
    .upload-area.drag-over{border-color:var(--cyan);background:rgba(59,191,206,0.05)}
    .upload-area:hover{background:rgba(255,255,255,0.02)}
    .upload-icon{display:block;margin:0 auto 15px;width:60px;height:60px;color:var(--text-muted)}
    .upload-instruction{font-size:1.1rem;margin-bottom:5px;pointer-events:none}
    .browse-link{color:var(--cyan);text-decoration:none;font-weight:600;cursor:pointer}
    .upload-limit{font-size:0.9rem;color:var(--text-muted);pointer-events:none}

    .preview-area{position:relative;display:flex;flex-direction:column;gap:30px}
    .preview-area .glass{min-height:200px}
    .card-header{display:flex;justify-content:space-between;align-items:center}
    .remove-btn{background:none;border:none;color:var(--red);font-size:1rem;cursor:pointer;text-decoration:underline}
    .remove-btn:hover{filter:brightness(1.2)}
    .image-frame{display:block;background:rgba(255,255,255,0.05);border-radius:8px;padding:8px;margin-top:0}
    .preview-image{display:block;width:100%;max-height:50vh;object-fit:contain;border-radius:4px}
    .preview-empty{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--text-muted);font-size:0.95rem}

    .controls-row{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:16px}
    .control-group{flex:1;min-width:180px}
    .control-group label{display:block;font-size:0.85rem;color:var(--text-muted);margin-bottom:6px}
    .control-group select,.control-group input{
      width:100%;padding:10px 12px;border-radius:8px;
      background:rgba(255,255,255,0.03);border:1px solid var(--border);
      color:var(--text);font-size:0.9rem;outline:none;transition:border-color 0.2s
    }
    .control-group select:focus,.control-group input:focus{border-color:var(--cyan)}
    .control-group select option{background:var(--bg);color:var(--text)}
    .control-group input[type=range]{padding:0;border:none;background:none}
    .range-labels{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-muted);margin-top:4px}

    .generate-btn{
      width:100%;padding:14px;border:none;border-radius:10px;
      background:linear-gradient(135deg,var(--cyan),#2a8a99);
      color:#0b1116;font-size:1rem;font-weight:600;cursor:pointer;
      transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:8px
    }
    .generate-btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
    .generate-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}

    .prompt-overlay{
      position:relative;margin-top:0;
      background:rgba(14,21,26,0.97);border-radius:12px;padding:20px 24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.05)
    }
    .prompt-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .prompt-header h3{color:var(--cyan);font-size:0.85rem;font-weight:600;letter-spacing:0.05em}
    .header-actions{display:flex;gap:8px}
    .icon-btn{
      background:rgba(255,255,255,0.02);color:var(--text-muted);
      border:1px solid var(--border);border-radius:6px;
      padding:6px 14px;font-size:0.8rem;cursor:pointer;transition:all 0.3s
    }
    .icon-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(59,191,206,0.05)}
    .prompt-text{font-size:0.9rem;line-height:1.6;max-height:100px;overflow-y:auto;color:var(--text)}
    .prompt-placeholder{color:var(--text-muted);font-style:italic}
    .prompt-error{color:#ef5350}

    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin 1s linear infinite}

    @media(max-width:600px){
      .header{flex-direction:column;gap:12px;align-items:flex-start}
      .header-title h1{text-align:left}
      .controls-row{flex-direction:column}
      .control-group{min-width:100%}
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo-area">
        <span class="logo-icon">✦</span>
        <span class="logo-text">Aurionary Arts</span>
      </div>
      <div class="header-title">
        <h1>AI Structured Prompt<br>Generator</h1>
      </div>
    </header>

    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <section class="glass">
      <h2>Upload Image</h2>
      <div id="dropZone" class="upload-area">
        <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <p class="upload-instruction">Drag & drop or <span class="browse-link" id="browseLink">browse</span></p>
        <p class="upload-limit">PNG, JPG, WEBP up to 10MB</p>
      </div>
    </section>

    <section class="glass">
      <h2>Settings</h2>
      <div class="controls-row">
        <div class="control-group">
          <label>Art Style</label>
          <select id="styleSelect">
            <option>Digital Painting</option><option>Photorealistic</option>
            <option>Anime</option><option>Oil Painting</option>
            <option>Sketch</option><option>3D Render</option>
            <option>Watercolor</option><option>Pixel Art</option>
          </select>
        </div>
        <div class="control-group">
          <label>Medium</label>
          <select id="mediumSelect">
            <option>Digital Art</option><option>Oil on Canvas</option>
            <option>Pencil Drawing</option><option>Ink</option>
            <option>Charcoal</option><option>Photography</option><option>Vector</option>
          </select>
        </div>
      </div>
      <div class="controls-row">
        <div class="control-group">
          <label>Level of Detail: <span id="detailValue">High</span></label>
          <input type="range" id="detailSlider" min="1" max="3" value="3" style="width:100%">
          <div class="range-labels"><span>Low</span><span>Medium</span><span>High</span></div>
        </div>
        <div class="control-group">
          <label>Mood / Atmosphere</label>
          <input type="text" id="moodInput" placeholder="e.g., serene, dramatic, futuristic">
        </div>
      </div>
      <button id="generateBtn" class="generate-btn" disabled>
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        Generate Prompt
      </button>
    </section>

    <section class="preview-area">
      <div class="glass">
        <div class="card-header">
          <h2>Preview</h2>
          <button id="removeImageBtn" class="remove-btn" style="display:none">Remove</button>
        </div>
        <div id="previewEmpty" class="preview-empty">No image uploaded</div>
        <div id="previewContent" class="image-frame" style="display:none">
          <img id="previewImage" src="" alt="Preview" class="preview-image">
        </div>
      </div>

      <div class="prompt-overlay">
        <div class="prompt-header">
          <h3>GENERATED PROMPT</h3>
          <div class="header-actions">
            <button id="copyBtn" class="icon-btn">Copy</button>
            <button id="downloadBtn" class="icon-btn">Download</button>
          </div>
        </div>
        <div id="promptDisplay" class="prompt-text">
          <span class="prompt-placeholder">Your AI prompt will appear here...</span>
        </div>
      </div>
    </section>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const browseLink = document.getElementById('browseLink');
    const previewEmpty = document.getElementById('previewEmpty');
    const previewContent = document.getElementById('previewContent');
    const previewImage = document.getElementById('previewImage');
    const removeBtn = document.getElementById('removeImageBtn');
    const generateBtn = document.getElementById('generateBtn');
    const detailSlider = document.getElementById('detailSlider');
    const detailValue = document.getElementById('detailValue');
    const styleSelect = document.getElementById('styleSelect');
    const mediumSelect = document.getElementById('mediumSelect');
    const moodInput = document.getElementById('moodInput');
    const promptDisplay = document.getElementById('promptDisplay');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    let uploadedFile = null;
    const detailLabels = ['Low', 'Medium', 'High'];

    detailSlider.addEventListener('input', () => {
      detailValue.textContent = detailLabels[detailSlider.value - 1];
    });

    browseLink.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        alert('Only image files are supported (PNG, JPG, WEBP).');
        return;
      }
      uploadedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImage.src = e.target.result;
        previewEmpty.style.display = 'none';
        previewContent.style.display = 'inline-block';
        removeBtn.style.display = '';
        generateBtn.disabled = false;
        previewImage.closest('.glass').scrollIntoView({ behavior: 'smooth', block: 'center' });
      };
      reader.readAsDataURL(file);
    }

    removeBtn.addEventListener('click', () => {
      uploadedFile = null;
      previewImage.src = '';
      previewEmpty.style.display = '';
      previewContent.style.display = 'none';
      removeBtn.style.display = 'none';
      fileInput.value = '';
      generateBtn.disabled = true;
      promptDisplay.innerHTML = '<span class="prompt-placeholder">Your AI prompt will appear here...</span>';
    });

    generateBtn.addEventListener('click', async () => {
      if (!uploadedFile) return;
      const style = styleSelect.value;
      const medium = mediumSelect.value;
      const detailLevel = detailLabels[detailSlider.value - 1];
      const mood = moodInput.value.trim() || 'neutral';
      const image = previewImage.src;

      generateBtn.disabled = true;
      generateBtn.innerHTML = '<svg width="18" height="18" class="spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Generating...';
      promptDisplay.textContent = 'Analyzing image with Groq AI...';

      try {
        const res = await fetch('/api/groq-vision', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image, style, medium, detail: detailLevel, mood })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'API error');
        promptDisplay.textContent = data.prompt;
      } catch (err) {
        promptDisplay.innerHTML = `<span class="prompt-error">Error: ${err.message}</span>`;
      } finally {
        generateBtn.disabled = false;
        generateBtn.innerHTML = '<svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg> Generate Prompt';
      }
    });

    copyBtn.addEventListener('click', async () => {
      const text = promptDisplay.textContent.trim();
      if (!text || text.startsWith('Your AI prompt') || text.startsWith('Analyzing')) return;
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy', 2000);
      } catch { alert('Failed to copy'); }
    });

    downloadBtn.addEventListener('click', () => {
      const text = promptDisplay.textContent.trim();
      if (!text || text.startsWith('Your AI prompt') || text.startsWith('Analyzing')) return;
      const blob = new Blob([text], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'prompt.txt';
      a.click();
    });
  </script>
</body>
</html>
