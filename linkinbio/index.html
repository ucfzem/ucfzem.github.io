<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alexandre Dupont — Link in Bio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.344.0/font/Lucide.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: { DEFAULT: '#4f46e5', hover: '#6366f1' },
            surface: '#1e293b',
            'surface-2': '#334155',
          }
        }
      }
    }
  </script>
  <style>
    body { min-height: 100dvh; display: flex; align-items: center; justify-content: center; }
    .icon { display: inline-flex; width: 1.25rem; height: 1.25rem; }
    .icon svg { width: 100%; height: 100%; }
    .btn-link { transition: all 0.2s ease; }
    .btn-link:hover { transform: translateY(-1px); box-shadow: 0 8px 25px -5px rgba(79,70,229,0.3); }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-950 text-slate-50 p-4 font-sans antialiased">
  <div id="app" class="w-full max-w-md mx-auto space-y-6"></div>

  <script>
    const state = { submitted: false, loading: false, skipped: false }

    const data = {
      name: 'Alexandre Dupont',
      bio: "J'aide les freelances à doubler leurs revenus en 90 jours.",
      avatar: 'https://i.pravatar.cc/150?img=11',
      leadMagnet: 'Le Guide Ultime du Freelance (PDF)',
      links: [
        { title: 'Réserver un appel découverte', url: '#', icon: 'Calendar' },
        { title: 'Mon site web', url: '#', icon: 'Globe' },
        { title: 'Me suivre sur LinkedIn', url: '#', icon: 'Linkedin' },
      ]
    }

    const icons = {
      Calendar: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
      Globe: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
      Linkedin: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>',
      Sparkles: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/><path d="M19 3v4"/><path d="M21 5h-4"/></svg>',
      Mail: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>',
      Check: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
      ExternalLink: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'
    }

    function render() {
      const app = document.getElementById('app')
      const showLinks = state.submitted || state.skipped

      app.innerHTML = `
        <div class="text-center space-y-3 fade-in">
          <img src="${data.avatar}" alt="${data.name}" class="w-24 h-24 rounded-full mx-auto border-2 border-slate-700 object-cover shadow-lg">
          <h1 class="text-xl font-bold text-slate-50">${data.name}</h1>
          <p class="text-sm text-slate-400 max-w-xs mx-auto">${data.bio}</p>
        </div>

        ${showLinks ? renderLinks() : renderLeadGate()}

        <footer class="text-center text-xs text-slate-600 pt-4 fade-in" style="animation-delay:0.3s">
          Propulsé par <a href="#" class="text-indigo-400 hover:text-indigo-300 underline underline-offset-2">LeadLink</a>
        </footer>
      `
    }

    function renderLeadGate() {
      return `
        <div class="bg-surface rounded-2xl p-6 border border-slate-800 shadow-xl fade-in space-y-4" style="animation-delay:0.1s">
          <div class="flex items-center gap-3">
            <span class="icon text-2xl text-indigo-400">${icons.Sparkles}</span>
            <h2 class="text-lg font-semibold text-slate-50">🎁 Télécharge ma Checklist Gratuite</h2>
          </div>
          <p class="text-sm text-slate-400">${data.leadMagnet} — un condensé d'actions concrètes pour booster tes revenus.</p>
          ${state.loading ? `
            <div class="flex items-center justify-center gap-2 py-4 text-indigo-300 text-sm">
              <span class="spinner"></span>
              <span>Envoi en cours...</span>
            </div>
          ` : state.submitted ? '' : `
            <form onsubmit="handleSubmit(event)" class="space-y-3">
              <div class="relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 icon">${icons.Mail}</span>
                <input type="email" id="emailInput" required placeholder="ton@email.com" class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-10 pr-4 text-sm text-slate-50 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
              </div>
              <button type="submit" class="btn-link w-full bg-accent hover:bg-accent-hover text-white font-medium py-3 rounded-xl shadow-lg shadow-indigo-500/20 text-sm transition">
                Recevoir le cadeau →
              </button>
            </form>
            <button onclick="handleSkip()" class="w-full text-center text-xs text-slate-600 hover:text-slate-400 transition py-1">Passer pour l'instant</button>
          `}
          <p class="text-xs text-slate-600 text-center">Pas de spam, promis. Désabonnement en 1 clic.</p>
        </div>
      `
    }

    function renderLinks() {
      return `
        <div class="space-y-3 fade-in" style="animation-delay:0.15s">
          ${state.submitted ? `
            <div class="bg-surface rounded-2xl p-6 border border-emerald-900/50 text-center space-y-2 fade-in">
              <span class="icon text-3xl text-emerald-400">${icons.Check}</span>
              <p class="text-emerald-300 font-medium">Merci ! Vérifie tes emails 📩</p>
              <p class="text-xs text-slate-500">Le guide arrive dans ta boîte sous 1 min.</p>
            </div>
          ` : ''}
          <p class="text-xs text-slate-500 uppercase tracking-widest text-center font-medium">Mes liens</p>
          ${data.links.map(l => `
            <a href="${l.url}" target="_blank" rel="noopener" class="btn-link flex items-center gap-3 bg-surface hover:bg-surface-2 border border-slate-800 rounded-xl px-5 py-4 text-slate-50 font-medium text-sm shadow-lg group">
              <span class="icon text-indigo-400 group-hover:text-indigo-300 transition">${icons[l.icon] || icons.ExternalLink}</span>
              <span class="flex-1">${l.title}</span>
              <span class="icon text-slate-600 group-hover:text-slate-400 transition">${icons.ExternalLink}</span>
            </a>
          `).join('')}
        </div>
      `
    }

    function handleSubmit(e) {
      e.preventDefault()
      const email = document.getElementById('emailInput').value
      if (!email) return
      state.loading = true
      render()
      setTimeout(() => {
        state.loading = false
        state.submitted = true
        render()
      }, 1000)
    }

    function handleSkip() {
      state.skipped = true
      render()
    }

    render()
  </script>
</body>
</html>
