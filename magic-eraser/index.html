<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Magic Eraser — Remove Objects from Photos</title>
<meta name="description" content="Remove unwanted objects, people, text, and defects from photos for free. AI-powered object remover using Hugging Face.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://ucfzem.github.io/magic-eraser/">
<meta property="og:title" content="Magic Eraser — Free AI Object Remover">
<meta property="og:description" content="Remove unwanted objects from photos for free.">
<meta property="og:url" content="https://ucfzem.github.io/magic-eraser/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c28;
  --border: #2a2a3a;
  --accent: #7c6aff;
  --accent2: #ff6a9b;
  --text: #f0eff8;
  --muted: #7a7a9a;
  --gold: #ffcc55;
  --radius: 16px;
  --radius-sm: 10px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden; }
.bg-mesh {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,106,255,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 80%, rgba(255,106,155,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 60% 10%, rgba(106,255,240,0.07) 0%, transparent 70%); }
header {
  position: relative; z-index: 10;
  padding: 20px 20px 0;
  display: flex; align-items: center; justify-content: space-between; }
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 1.4rem;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; }
.badge {
  font-size: 0.65rem; font-weight: 700;
  background: var(--gold); color: #1a1000;
  padding: 3px 10px; border-radius: 20px;
  letter-spacing: 0.08em; text-transform: uppercase; }
.container {
  position: relative; z-index: 10;
  max-width: 800px; margin: 0 auto;
  padding: 16px 20px 40px; }
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 48px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .3s, background .3s;
  background: var(--surface); }
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--accent);
  background: rgba(124,106,255,0.05); }
.upload-zone .icon { font-size: 3rem; margin-bottom: 12px; }
.upload-zone p { color: var(--muted); font-size: 0.9rem; }
.upload-zone .btn {
  display: inline-block;
  margin-top: 12px;
  padding: 10px 24px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 40px;
  color: #fff; font-weight: 600; font-size: 0.9rem;
  cursor: pointer; }
.upload-zone input[type=file] { display: none; }
.editor {
  display: none;
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border); }
.canvas-wrap {
  position: relative;
  width: 100%;
  background: #000;
  min-height: 300px;
  display: flex;
  align-items: center;
  justify-content: center; }
.canvas-wrap canvas {
  display: block;
  width: 100%;
  max-height: 60vh;
  object-fit: contain;
  touch-action: none; }
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 12px 16px;
  align-items: center;
  border-top: 1px solid var(--border);
  background: var(--surface2); }
.toolbar .group {
  display: flex;
  align-items: center;
  gap: 6px; }
.toolbar label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
.toolbar input[type=range] {
  width: 80px;
  accent-color: var(--accent);
  background: transparent; }
.tool-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap; }
.tool-btn:hover { border-color: var(--accent); }
.tool-btn.active {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-color: transparent;
  color: #fff; }
.tool-btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-color: transparent;
  color: #fff;
  font-weight: 700; }
.tool-btn.primary:disabled { opacity: 0.4; cursor: not-allowed; }
.separator { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
.size-display { font-size: 0.75rem; color: var(--muted); min-width: 24px; text-align: center; }
.result-area {
  display: none;
  margin-top: 16px;
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border); }
.result-area img {
  display: block;
  width: 100%;
  max-height: 60vh;
  object-fit: contain; }
.result-actions {
  display: flex;
  gap: 10px;
  padding: 12px 16px;
  border-top: 1px solid var(--border); }
.result-actions .tool-btn { flex: 1; text-align: center; }
.loading {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 20;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius); }
.loading.show { display: flex; }
.spinner {
  width: 48px; height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { margin-top: 16px; font-size: 0.9rem; color: var(--text); }
.loading .hint { font-size: 0.75rem; color: var(--muted); margin-top: 8px; }
.api-section {
  margin-top: 12px;
  padding: 12px 16px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px; }
.api-section label { font-size: 0.8rem; color: var(--muted); }
.api-section input {
  flex: 1;
  min-width: 120px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-size: 0.85rem;
  outline: none; }
.api-section input:focus { border-color: var(--accent); }
.api-section .tool-btn { font-size: 0.75rem; padding: 6px 12px; }
.api-section a {
  color: var(--accent);
  font-size: 0.75rem;
  text-decoration: none; }
.api-section a:hover { text-decoration: underline; }
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  z-index: 999;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none; }
.toast.show { opacity: 1; }
.error-msg {
  color: var(--accent2);
  font-size: 0.85rem;
  margin-top: 8px;
  display: none; }
@media (max-width: 500px) {
  .toolbar { flex-direction: column; align-items: stretch; }
  .toolbar .group { justify-content: center; }
  .separator { display: none; } }
</style>
</head>
<body>
<div class="bg-mesh"></div>
<header>
  <div class="logo">Magic Eraser ✦</div>
  <span class="badge">100% Gratuit</span>
</header>
<div class="container">
  <div class="upload-zone" id="uploadZone">
    <div class="icon">🖼️</div>
    <p>Drop your photo here or tap to browse</p>
    <button class="btn" id="uploadBtn">Choose Photo</button>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div class="editor" id="editor">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="mainCanvas"></canvas>
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p id="loadingText">Processing...</p>
        <p class="hint">First load may take 30-60 sec</p>
      </div>
    </div>
    <div class="toolbar">
      <div class="group">
        <label>Mode:</label>
        <button class="tool-btn active" id="drawMode" data-mode="draw">✏️ Draw</button>
        <button class="tool-btn" id="eraseMode" data-mode="erase">🧹 Erase</button>
      </div>
      <div class="separator"></div>
      <div class="group">
        <label>Size:</label>
        <input type="range" id="brushSize" min="5" max="100" value="30">
        <span class="size-display" id="sizeDisplay">30</span>
      </div>
      <div class="separator"></div>
      <div class="group">
        <button class="tool-btn" id="undoBtn">↩ Undo</button>
        <button class="tool-btn" id="resetBtn">✕ Clear Mask</button>
      </div>
      <div class="group" style="margin-left:auto">
        <button class="tool-btn primary" id="processBtn">✨ Erase Object</button>
      </div>
    </div>
    <div class="api-section">
      <label>🔑 HF Token:</label>
      <input type="password" id="hfToken" placeholder="hf_xxxxxxxx...">
      <button class="tool-btn" id="saveTokenBtn">Save</button>
      <a href="https://huggingface.co/settings/tokens" target="_blank">Get free token</a>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="result-area" id="resultArea">
    <img id="resultImg" alt="Result">
    <div class="result-actions">
      <button class="tool-btn" id="downloadBtn">⬇ Download</button>
      <button class="tool-btn" id="retryBtn">↻ Try Again</button>
      <button class="tool-btn" id="newBtn">🖼 New Photo</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const uploadZone = $('uploadZone');
const fileInput = $('fileInput');
const uploadBtn = $('uploadBtn');
const editor = $('editor');
const canvas = $('mainCanvas');
const ctx = canvas.getContext('2d');
const processBtn = $('processBtn');
const loading = $('loading');
const loadingText = $('loadingText');
const resultArea = $('resultArea');
const resultImg = $('resultImg');
const drawMode = $('drawMode');
const eraseMode = $('eraseMode');
const brushSize = $('brushSize');
const sizeDisplay = $('sizeDisplay');
const undoBtn = $('undoBtn');
const resetBtn = $('resetBtn');
const downloadBtn = $('downloadBtn');
const retryBtn = $('retryBtn');
const newBtn = $('newBtn');
const hfToken = $('hfToken');
const saveTokenBtn = $('saveTokenBtn');
const errorMsg = $('errorMsg');
const toast = $('toast');

let originalImage = null;
let imageData = null;
let maskCanvas = null;
let maskCtx = null;
let isDrawing = false;
let history = [];
let currentStep = -1;
let brushMode = 'draw';

hfToken.value = localStorage.getItem('me_hf_token') || '';

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000); }

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block'; }

function hideError() { errorMsg.style.display = 'none'; }

function initMask() {
  maskCanvas = document.createElement('canvas');
  maskCanvas.width = canvas.width;
  maskCanvas.height = canvas.height;
  maskCtx = maskCanvas.getContext('2d');
  maskCtx.fillStyle = '#000';
  maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
  history = [];
  currentStep = -1;
  saveState(); }

function saveState() {
  const data = maskCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height);
  currentStep++;
  history[currentStep] = data;
  history.length = currentStep + 1; }

function undo() {
  if (currentStep <= 0) return;
  currentStep--;
  maskCtx.putImageData(history[currentStep], 0, 0);
  renderCombined(); }

function clearMask() {
  if (!maskCtx) return;
  maskCtx.fillStyle = '#000';
  maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
  saveState();
  renderCombined(); }

uploadBtn.onclick = () => fileInput.click();
uploadZone.onclick = () => fileInput.click();

uploadZone.addEventListener('dragover', e => {
  e.preventDefault();
  uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => {
  uploadZone.classList.remove('dragover'); });
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]); });

fileInput.onchange = () => {
  if (fileInput.files.length) loadImage(fileInput.files[0]); };

function loadImage(file) {
  if (!file.type.startsWith('image/')) { showError('Please select an image file'); return; }
  hideError();
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      originalImage = img;
      const maxW = 1024;
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      imageData = ctx.getImageData(0, 0, w, h);
      initMask();
      renderCombined();
      uploadZone.style.display = 'none';
      editor.style.display = 'block';
      resultArea.style.display = 'none';
      processBtn.disabled = false; };
    img.src = e.target.result; };
  reader.readAsDataURL(file); }

function renderCombined() {
  if (!imageData || !maskCanvas) return;
  const imgData = new ImageData(new Uint8ClampedArray(imageData.data), imageData.width, imageData.height);
  const d = imgData.data;
  const md = maskCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height).data;
  for (let i = 0; i < d.length; i += 4) {
    if (md[i] > 128) {
      d[i] = d[i] * 0.3 + 255 * 0.7;
      d[i+1] = d[i+1] * 0.3 + 100 * 0.7;
      d[i+2] = d[i+2] * 0.3 + 100 * 0.7; } }
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = canvas.width;
  tempCanvas.height = canvas.height;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.putImageData(imgData, 0, 0);
  ctx.drawImage(tempCanvas, 0, 0); }

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const t = e.touches ? e.touches[0] : e;
  return {
    x: (t.clientX - rect.left) * scaleX,
    y: (t.clientY - rect.top) * scaleY }; }

function startDraw(e) {
  e.preventDefault();
  if (!maskCtx) return;
  isDrawing = true;
  const pos = getCanvasPos(e);
  maskCtx.beginPath();
  maskCtx.moveTo(pos.x, pos.y);
  maskCtx.lineCap = 'round';
  maskCtx.lineJoin = 'round';
  const size = parseInt(brushSize.value);
  if (brushMode === 'draw') {
    maskCtx.strokeStyle = '#fff';
    maskCtx.fillStyle = '#fff'; }
  else {
    maskCtx.strokeStyle = '#000';
    maskCtx.fillStyle = '#000'; }
  maskCtx.lineWidth = size;
  maskCtx.arc(pos.x, pos.y, size/2, 0, Math.PI*2);
  maskCtx.fill(); }

function draw(e) {
  e.preventDefault();
  if (!isDrawing || !maskCtx) return;
  const pos = getCanvasPos(e);
  const size = parseInt(brushSize.value);
  maskCtx.lineWidth = size;
  maskCtx.lineTo(pos.x, pos.y);
  maskCtx.stroke();
  renderCombined(); }

function endDraw(e) {
  e.preventDefault();
  if (!isDrawing) return;
  isDrawing = false;
  saveState(); }

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', draw, { passive: false });
canvas.addEventListener('touchend', endDraw, { passive: false });

drawMode.onclick = () => {
  brushMode = 'draw';
  drawMode.classList.add('active');
  eraseMode.classList.remove('active'); };
eraseMode.onclick = () => {
  brushMode = 'erase';
  eraseMode.classList.add('active');
  drawMode.classList.remove('active'); };

brushSize.oninput = () => { sizeDisplay.textContent = brushSize.value; };

undoBtn.onclick = undo;
resetBtn.onclick = clearMask;

saveTokenBtn.onclick = () => {
  const token = hfToken.value.trim();
  if (!token) { showError('Enter your HF token'); return; }
  localStorage.setItem('me_hf_token', token);
  hideError();
  showToast('✅ Token saved'); };

processBtn.onclick = processImage;

async function processImage() {
  hideError();
  const token = hfToken.value.trim() || localStorage.getItem('me_hf_token');
  if (!token) { showError('Enter your Hugging Face token first (get one free at huggingface.co/settings/tokens)'); return; }

  const maskData = maskCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height);
  let hasMask = false;
  for (let i = 0; i < maskData.data.length; i += 4) {
    if (maskData.data[i] > 128) { hasMask = true; break; } }
  if (!hasMask) { showError('Draw on the area you want to remove first'); return; }

  processBtn.disabled = true;
  loading.classList.add('show');
  loadingText.textContent = 'AI is removing the object...';
  resultArea.style.display = 'none';

  try {
    const formData = new FormData();
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    formData.append('image', blob, 'image.png');
    const maskBlob = await new Promise(resolve => maskCanvas.toBlob(resolve, 'image/png'));
    formData.append('mask', maskBlob, 'mask.png');

    const response = await fetch('https://api-inference.huggingface.co/models/stable-diffusion-v1-5/stable-diffusion-inpainting', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      body: formData });

    if (!response.ok) {
      const err = await response.text();
      let msg;
      try { const j = JSON.parse(err); msg = j.error || j[0]?.error || err; } catch { msg = err; }
      if (response.status === 503) {
        msg = '⏳ Model is loading (cold start). Please wait 30-60s and try again.';
        loadingText.textContent = '⏳ Model is loading...'; }
      if (response.status === 403) msg = 'Invalid HF token. Check your token at huggingface.co/settings/tokens';
      throw new Error(msg); }

    const resultBlob = await response.blob();
    const url = URL.createObjectURL(resultBlob);
    resultImg.src = url;
    resultArea.style.display = 'block';
    loading.classList.remove('show');
    showToast('✅ Object removed!');
  } catch (err) {
    loading.classList.remove('show');
    showError(err.message);
    processBtn.disabled = false; } }

downloadBtn.onclick = () => {
  const a = document.createElement('a');
  a.href = resultImg.src;
  a.download = 'magic-eraser-result.png';
  a.click(); };

retryBtn.onclick = () => {
  resultArea.style.display = 'none';
  processBtn.disabled = false; };

newBtn.onclick = () => {
  resultArea.style.display = 'none';
  editor.style.display = 'none';
  uploadZone.style.display = 'block';
  fileInput.value = '';
  originalImage = null;
  imageData = null;
  processBtn.disabled = false; };

showToast('✨ Upload a photo to start');
</script>
</body>
</html>
