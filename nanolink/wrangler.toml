name = "nanolink"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"
database_name = "nanolink"
database_id = ""

# ── Étape 1 ──
# wrangler d1 create nanolink
#   → copier database_id ci-dessus

# ── Étape 2 ──
# wrangler d1 execute nanolink --file=d1-schema.sql

# ── Étape 3 ──
# wrangler pages deploy . --project-name=nanolink
