<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>PixellApp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#111;--panel:rgba(20,20,24,.95);--border:#333;--text:#eee;--text2:#888;--accent:#6c5ce7}

body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;overflow:hidden;height:100dvh;display:flex;flex-direction:column}

/* TOP BAR */
.topbar{height:40px;background:var(--panel);display:flex;align-items:center;padding:0 8px;gap:4px;border-bottom:1px solid var(--border);z-index:10;flex-shrink:0}
.topbar .logo{font-weight:700;font-size:13px;color:var(--accent);margin-right:4px}
.tb-btn{width:34px;height:34px;border:none;background:0 0;color:var(--text2);border-radius:6px;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.tb-btn:active{background:var(--accent);color:#fff}
.tb-btn.hide-mb{display:none}
.topbar .spacer{flex:1}
.export-btn{background:var(--accent);color:#fff;border:none;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}

/* CANVAS */
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#1a1a1e;touch-action:none;display:flex;align-items:center;justify-content:center}
canvas#mainCanvas{box-shadow:0 2px 16px rgba(0,0,0,.4);display:block;touch-action:none;max-width:100%;max-height:100%}
#zoomBadge{position:absolute;bottom:60px;left:8px;font-size:10px;color:var(--text2);background:rgba(0,0,0,.5);padding:2px 6px;border-radius:3px;pointer-events:none}

/* BOTTOM TOOLS */
.bar{display:flex;background:var(--panel);border-top:1px solid var(--border);padding:2px 4px;gap:1px;overflow-x:auto;overflow-y:hidden;flex-shrink:0;height:48px;align-items:center;-webkit-overflow-scrolling:touch}
.bar::-webkit-scrollbar{display:none}
.bar-btn{min-width:42px;height:42px;border:none;background:0 0;color:var(--text2);font-size:18px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;gap:1px;padding:0 6px;position:relative}
.bar-btn:active{background:var(--accent22)}
.bar-btn.active{color:var(--accent)}
.bar-btn .lbl{font-size:8px;color:var(--text2);letter-spacing:.3px}
.bar-sep{width:1px;height:28px;background:var(--border);flex-shrink:0;margin:0 2px}

/* BOTTOM SHEET */
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(20,20,24,.98);border-top:1px solid var(--border);transform:translateY(100%);transition:transform .25s;max-height:55dvh;overflow-y:auto;backdrop-filter:blur(12px)}
.sheet.open{transform:translateY(0)}
.sheet .hd{padding:10px 14px;font-size:12px;font-weight:600;color:var(--text2);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;background:inherit;z-index:2}
.sheet .hd button{background:0 0;border:none;color:var(--accent);font-size:13px;cursor:pointer;padding:4px 8px}
.sheet .bd{padding:10px 14px 60px}
.sheet .bd .grp{margin-bottom:12px}
.sheet .bd .gl{font-size:10px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.row{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.row .lbl{font-size:11px;color:var(--text2);min-width:36px}
.row input,.row select{background:#1e1e24;border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-size:12px;outline:0;flex:1;min-height:32px}
.row input[type=color]{width:36px;flex:none;padding:2px;height:32px}
.row input[type=range]{flex:1;padding:0;height:28px}
.row .val{font-size:10px;color:var(--text2);min-width:24px;text-align:right}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{background:#1e1e24;border:1px solid var(--border);border-radius:5px;padding:5px 10px;font-size:11px;cursor:pointer;color:var(--text)}
.chip:active{background:var(--accent);color:#fff}

/* LAYER LIST */
.ly{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:5px;cursor:pointer;font-size:12px;background:0 0;margin-bottom:2px}
.ly:active{background:var(--border)}
.ly.act{background:var(--accent);color:#fff}
.ly .l-eye{font-size:13px;width:24px;text-align:center;cursor:pointer}
.ly .l-nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:13px;line-height:1.6}
.empty .big{font-size:48px;margin-bottom:12px}

/* HIDDEN */
.hidden{display:none!important}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">PX</span>
  <span style="font-size:10px;color:var(--text2)" id="zoomLbl">100%</span>
  <div class="spacer"></div>
  <button class="tb-btn hide-mb" onclick="undo()" title="Annuler">↩</button>
  <button class="tb-btn hide-mb" onclick="redo()" title="Rétablir">↪</button>
  <button class="tb-btn" onclick="fit()" title="Ajuster">⊡</button>
  <button class="export-btn" onclick="showExport()">⬇</button>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="mainCanvas"></canvas>
  <div id="zoomBadge"></div>
</div>

<div class="bar" id="toolBar">
  <button class="bar-btn active" data-t="select"><span style="font-size:18px">➤</span><span class="lbl">Sélect</span></button>
  <button class="bar-btn" data-t="bg"><span style="font-size:18px">🖼</span><span class="lbl">Fond</span></button>
  <button class="bar-btn" data-t="text"><span style="font-size:18px">T</span><span class="lbl">Texte</span></button>
  <button class="bar-btn" data-t="shape"><span style="font-size:18px">◇</span><span class="lbl">Forme</span></button>
  <div class="bar-sep"></div>
  <button class="bar-btn" data-t="layers"><span style="font-size:16px">☰</span><span class="lbl">Calques</span></button>
  <button class="bar-btn" data-t="move"><span style="font-size:18px">✋</span><span class="lbl">Déplacer</span></button>
</div>

<!-- IMAGE INPUT -->
<input type="file" id="imgInput" accept="image/*" style="display:none">
<input type="file" id="bgInput" accept="image/*" style="display:none">

<!-- SHEET: Text -->
<div class="sheet" id="textSheet">
  <div class="hd">Texte <button onclick="closeSheet('textSheet')">✓</button></div>
  <div class="bd">
    <div class="row"><span class="lbl">Texte</span><input id="sText" placeholder="Écris ici..." style="flex:1"></div>
    <div class="row"><span class="lbl">Police</span><select id="sFont"><option>Arial</option><option>Georgia</option><option>Times New Roman</option><option>Courier New</option><option>Verdana</option><option>Trebuchet MS</option><option>Impact</option></select></div>
    <div class="row"><span class="lbl">Taille</span><input type="range" id="sSize" min="12" max="200" value="40"><span class="val" id="sSizeVal">40</span></div>
    <div class="row"><span class="lbl">Couleur</span><input type="color" id="sColor" value="#ffffff"><span class="lbl">Ombre</span><input type="color" id="sShadow" value="#000000"></div>
    <div class="row"><span class="lbl">Style</span>
      <button class="chip" id="sBold" style="font-weight:700">B</button>
      <button class="chip" id="sItalic" style="font-style:italic">I</button>
    </div>
  </div>
</div>

<!-- SHEET: Shape -->
<div class="sheet" id="shapeSheet">
  <div class="hd">Forme <button onclick="closeSheet('shapeSheet')">✓</button></div>
  <div class="bd">
    <div class="chips" style="margin-bottom:10px">
      <button class="chip active" data-shape="rect">▬</button>
      <button class="chip" data-shape="circle">⬤</button>
      <button class="chip" data-shape="triangle">△</button>
      <button class="chip" data-shape="star">★</button>
      <button class="chip" data-shape="line">╱</button>
    </div>
    <div class="row"><span class="lbl">Remplir</span><input type="color" id="sFill" value="#6c5ce7"></div>
    <div class="row"><span class="lbl">Contour</span><input type="color" id="sStroke" value="#ffffff"></div>
    <div class="row"><span class="lbl">Épais</span><input type="range" id="sLW" min="0" max="20" value="2"><span class="val" id="sLWVal">2</span></div>
  </div>
</div>

<!-- SHEET: Layers/Properties -->
<div class="sheet" id="layerSheet">
  <div class="hd">Calques <button onclick="closeSheet('layerSheet')">✓</button></div>
  <div class="bd" id="layerBody">
    <div id="layerList"></div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button class="chip" onclick="addLayer()" style="flex:1;text-align:center">+ Ajouter</button>
      <button class="chip" onclick="deleteLayer()" style="flex:1;text-align:center;color:#ff4757">Supprimer</button>
    </div>
    <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
      <div class="gl">Propriétés</div>
      <div id="selProps">Sélectionne un élément</div>
    </div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="sheet" id="exportSheet" style="z-index:60">
  <div class="hd">Exporter <button onclick="closeSheet('exportSheet')">✕</button></div>
  <div class="bd">
    <div class="row"><span class="lbl">Format</span><select id="expFmt"><option value="png">PNG</option><option value="jpeg">JPEG</option><option value="webp">WebP</option></select></div>
    <div class="row"><span class="lbl">Qualité</span><input type="range" id="expQ" min="10" max="100" value="95"><span class="val" id="expQVal">95%</span></div>
    <button class="chip" onclick="doExport()" style="width:100%;text-align:center;background:var(--accent);color:#fff">⬇ Télécharger</button>
  </div>
</div>

<script>
// ========== STATE ==========
const canvas=document.getElementById('mainCanvas');
const ctx=canvas.getContext('2d');
let W=320, H=480;
let zoom=1, panX=0, panY=0;
let layers=[], activeIdx=-1;
let isDrag=false, isPan=false, isResize=false, isRotate=false;
let dragOff={x:0,y:0}, shapeStart=null, resHdl=-1, rotStart=0;
let undoStack=[], redoStack=[];

// ========== LAYER CLASS ==========
class Layer{
  constructor(type,o={}){
    this.id=Date.now()+Math.random();
    this.type=type; this.name=o.name||type;
    this.x=o.x||0; this.y=o.y||0; this.w=o.w||80; this.h=o.h||80;
    this.rot=o.rot||0; this.op=o.op!==void 0?o.op:1;
    this.vis=true; this.fill=o.fill||'#6c5ce7';
    this.stroke=o.stroke||'transparent'; this.lw=o.lw||0;
    // text
    this.txt=o.txt||'Texte'; this.fSize=o.fSize||32; this.fFam=o.fFam||'Arial';
    this.bold=o.bold||false; this.italic=o.italic||false;
    this.txtCol=o.txtCol||'#ffffff'; this.shadow=o.shadow||'#000000';
    // shape
    this.shape=o.shape||'rect';
    // image
    this.img=o.img||null;
    this.imgSrc=o.imgSrc||'';
  }
  get cx(){return this.x+this.w/2}
  get cy(){return this.y+this.h/2}
  hit(px,py){
    if(!this.vis) return false;
    const cx=this.cx,cy=this.cy;
    const cos=Math.cos(-this.rot*Math.PI/180), sin=Math.sin(-this.rot*Math.PI/180);
    const dx=px-cx, dy=py-cy;
    const rx=dx*cos-dy*sin+cx, ry=dx*sin+dy*cos+cy;
    return rx>=this.x-6&&rx<=this.x+this.w+6&&ry>=this.y-6&&ry<=this.y+this.h+6;
  }
  draw(c){
    if(!this.vis) return;
    c.save(); c.globalAlpha=this.op;
    if(this.type!=='bg'){
      c.translate(this.cx,this.cy); c.rotate(this.rot*Math.PI/180); c.translate(-this.cx,-this.cy);
    }
    if(this.type==='bg'&&this.img){c.drawImage(this.img,this.x,this.y,this.w,this.h)}
    else if(this.type==='image'&&this.img){c.drawImage(this.img,this.x,this.y,this.w,this.h)}
    else if(this.type==='text'){
      c.font=(this.bold?'bold ':'')+(this.italic?'italic ':'')+Math.round(this.fSize)+'px '+this.fFam;
      c.fillStyle=this.txtCol; c.textAlign='center'; c.textBaseline='middle';
      c.shadowColor=this.shadow; c.shadowBlur=2; c.shadowOffsetX=1; c.shadowOffsetY=1;
      const lines=this.txt.split('\n');
      lines.forEach((l,i)=>c.fillText(l,this.cx,this.y+this.fSize/2+i*this.fSize*1.3));
      c.shadowColor='transparent';
    }
    else if(this.type==='shape'){
      c.fillStyle=this.fill; c.strokeStyle=this.stroke; c.lineWidth=this.lw;
      const s=this.shape;
      if(s==='rect'){c.fillRect(this.x,this.y,this.w,this.h);if(this.lw)c.strokeRect(this.x,this.y,this.w,this.h)}
      else if(s==='circle'){c.beginPath();c.ellipse(this.cx,this.cy,Math.abs(this.w/2),Math.abs(this.h/2),0,0,Math.PI*2);c.fill();if(this.lw)c.stroke()}
      else if(s==='triangle'){c.beginPath();c.moveTo(this.cx,this.y);c.lineTo(this.x+this.w,this.y+this.h);c.lineTo(this.x,this.y+this.h);c.closePath();c.fill();if(this.lw)c.stroke()}
      else if(s==='star'){c.beginPath();for(let i=0;i<10;i++){const r=i%2?Math.min(this.w,this.h)/4:Math.min(this.w,this.h)/2;const a=Math.PI*i/5-Math.PI/2;c[i?'lineTo':'moveTo'](this.cx+r*Math.cos(a),this.cy+r*Math.sin(a))}c.closePath();c.fill();if(this.lw)c.stroke()}
      else if(s==='line'){c.beginPath();c.moveTo(this.x,this.y);c.lineTo(this.x+this.w,this.y+this.h);c.strokeStyle=this.fill;c.lineWidth=Math.max(1,this.lw);c.stroke()}
    }
    c.restore();
  }
  getHandles(){
    if(!this.vis) return [];
    const s=6/zoom;
    return[
      {x:this.x-s,y:this.y-s,h:0},{x:this.cx,y:this.y-s,h:1},{x:this.x+this.w+s,y:this.y-s,h:2},
      {x:this.x+this.w+s,y:this.cy,h:3},{x:this.x+this.w+s,y:this.y+this.h+s,h:4},
      {x:this.cx,y:this.y+this.h+s,h:5},{x:this.x-s,y:this.y+this.h+s,h:6},{x:this.x-s,y:this.cy,h:7}
    ];
  }
}

// ========== CANVAS ==========
function resizeCanvas(){
  const wr=document.getElementById('canvasWrap');
  W=Math.min(800,wr.clientWidth-12); H=Math.min(600,wr.clientHeight-12);
  document.getElementById('zoomBadge').textContent=W+'×'+H;
  fit(); render();
}
function render(){
  canvas.width=W; canvas.height=H;
  ctx.fillStyle='#1a1a1e'; ctx.fillRect(0,0,W,H);
  // checkerboard if no bg
  if(!layers.some(l=>l.type==='bg'&&l.img)){
    ctx.fillStyle='#222'; for(let y=0;y<H;y+=20){for(let x=0;x<W;x+=20){if((x/20+y/20)%2)ctx.fillRect(x,y,20,20)}}
  }
  ctx.save(); ctx.translate(panX,panY); ctx.scale(zoom,zoom);
  layers.forEach(l=>l.draw(ctx));
  ctx.restore();
  if(activeIdx>=0&&layers[activeIdx]) drawSel(layers[activeIdx]);
  updateLayers();
}
function drawSel(l){
  ctx.save(); ctx.translate(panX,panY); ctx.scale(zoom,zoom);
  ctx.strokeStyle='#6c5ce7'; ctx.lineWidth=1/zoom; ctx.setLineDash([4/zoom,4/zoom]);
  ctx.strokeRect(l.x,l.y,l.w,l.h); ctx.setLineDash([]);
  l.getHandles().forEach(h=>{ctx.beginPath();ctx.arc(h.x,h.y,4/zoom,0,Math.PI*2);ctx.fillStyle='#6c5ce7';ctx.fill()});
  // rot handle
  ctx.beginPath(); ctx.arc(l.cx,l.y-16/zoom,4/zoom,0,Math.PI*2); ctx.fillStyle='#ff4757'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(l.cx,l.y); ctx.lineTo(l.cx,l.y-12/zoom); ctx.stroke();
  ctx.restore();
}

// ========== TOUCH / MOUSE ==========
function wPos(e){
  const r=canvas.getBoundingClientRect();
  const x=('touches' in e)?e.touches[0].clientX:e.clientX;
  const y=('touches' in e)?e.touches[0].clientY:e.clientY;
  return {x:(x-r.left-panX)/zoom, y:(y-r.top-panY)/zoom};
}

function onDown(e){
  e.preventDefault();
  const wp=wPos(e); activeIdx=-1;
  for(let i=layers.length-1;i>=0;i--){
    if(layers[i].hit(wp.x,wp.y)&&layers[i].vis){activeIdx=i;break}
  }
  if(activeIdx>=0){
    isDrag=true; const l=layers[activeIdx];
    dragOff={x:wp.x-l.x,y:wp.y-l.y};
    saveUndo(); updateProps(); render(); return;
  }
  // start pan
  isPan=true; const t=e.touches?e.touches[0]:e;
  dragOff={x:t.clientX-panX,y:t.clientY-panY};
}

function onMove(e){
  e.preventDefault();
  const wp=wPos(e);
  if(isDrag&&activeIdx>=0){
    const l=layers[activeIdx];
    l.x=wp.x-dragOff.x; l.y=wp.y-dragOff.y;
    render(); return;
  }
  if(isPan){
    const t=e.touches?e.touches[0]:e;
    panX=t.clientX-dragOff.x; panY=t.clientY-dragOff.y;
    document.getElementById('zoomLbl').textContent=Math.round(zoom*100)+'%';
    render();
  }
}

function onUp(e){
  e.preventDefault();
  isDrag=false; isPan=false; isResize=false; isRotate=false;
}

canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('mouseleave',onUp);
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('touchend',onUp,{passive:false});
canvas.addEventListener('touchcancel',onUp,{passive:false});

// ========== ZOOM (scroll + pinch) ==========
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const wx=(e.clientX-r.left-panX)/zoom, wy=(e.clientY-r.top-panY)/zoom;
  zoom=Math.max(0.1,Math.min(10,zoom*(e.deltaY>0?0.9:1.1)));
  panX=e.clientX-r.left-wx*zoom; panY=e.clientY-r.top-wy*zoom;
  document.getElementById('zoomLbl').textContent=Math.round(zoom*100)+'%';
  render();
},{passive:false});

let pinchDist=0;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    isPan=false; isDrag=false;
  }
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    e.preventDefault();
    const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(pinchDist>0){
      const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
      const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
      const r=canvas.getBoundingClientRect();
      const wx=(cx-r.left-panX)/zoom, wy=(cy-r.top-panY)/zoom;
      zoom=Math.max(0.1,Math.min(10,zoom*nd/pinchDist));
      panX=cx-r.left-wx*zoom; panY=cy-r.top-wy*zoom;
      document.getElementById('zoomLbl').textContent=Math.round(zoom*100)+'%';
      render();
    }
    pinchDist=nd;
  }
},{passive:false});

function fit(){
  const ca=document.getElementById('canvasWrap');
  zoom=Math.min((ca.clientWidth-16)/W,(ca.clientHeight-16)/H)*0.95;
  panX=(ca.clientWidth-W*zoom)/2; panY=(ca.clientHeight-H*zoom)/2;
  document.getElementById('zoomLbl').textContent=Math.round(zoom*100)+'%';
  render();
}

// ========== TOOLS ==========
let curTool='select';
document.querySelectorAll('.bar-btn[data-t]').forEach(b=>{
  b.addEventListener('click',()=>{
    const t=b.dataset.t;
    if(t==='bg'){document.getElementById('bgInput').click();return}
    if(t==='text'){openSheet('textSheet');return}
    if(t==='shape'){openSheet('shapeSheet');return}
    if(t==='layers'){openSheet('layerSheet');updateLayers();return}
    curTool=t;
    document.querySelectorAll('.bar-btn').forEach(x=>x.classList.toggle('active',x.dataset.t===t));
    if(t==='select'){activeIdx=-1;updateProps();render()}
  });
});

// ========== SHEETS ==========
function openSheet(id){document.getElementById(id).classList.add('open')}
function closeSheet(id){document.getElementById(id).classList.remove('open')}

// ========== TEXT TOOL ==========
document.getElementById('sText').addEventListener('input',()=>{
  if(activeIdx<0||layers[activeIdx].type!=='text') return;
  saveUndo(); layers[activeIdx].txt=document.getElementById('sText').value; render();
});
document.getElementById('sFont').addEventListener('change',()=>{if(activeIdx>=0&&layers[activeIdx].type==='text'){saveUndo();layers[activeIdx].fFam=document.getElementById('sFont').value;render()}});
document.getElementById('sSize').addEventListener('input',()=>{const v=+document.getElementById('sSize').value;document.getElementById('sSizeVal').textContent=v;if(activeIdx>=0&&layers[activeIdx].type==='text'){saveUndo();layers[activeIdx].fSize=v;render()}});
document.getElementById('sColor').addEventListener('input',()=>{if(activeIdx>=0&&layers[activeIdx].type==='text'){saveUndo();layers[activeIdx].txtCol=document.getElementById('sColor').value;render()}});
document.getElementById('sShadow').addEventListener('input',()=>{if(activeIdx>=0&&layers[activeIdx].type==='text'){saveUndo();layers[activeIdx].shadow=document.getElementById('sShadow').value;render()}});
document.getElementById('sBold').addEventListener('click',function(){if(activeIdx<0||layers[activeIdx].type!=='text')return;saveUndo();layers[activeIdx].bold=!layers[activeIdx].bold;this.style.background=layers[activeIdx].bold?'var(--accent)':'';render()});
document.getElementById('sItalic').addEventListener('click',function(){if(activeIdx<0||layers[activeIdx].type!=='text')return;saveUndo();layers[activeIdx].italic=!layers[activeIdx].italic;this.style.background=layers[activeIdx].italic?'var(--accent)':'';render()});

// add text at center
function addTextToCanvas(){
  saveUndo();
  const l=new Layer('text',{txt:'Texte',fSize:36,fFam:'Arial',txtCol:'#ffffff',x:W/2-60,y:H/2-20,w:120,h:40});
  layers.push(l); activeIdx=layers.length-1;
  document.getElementById('sText').value=l.txt;
  document.getElementById('sFont').value=l.fFam;
  document.getElementById('sSize').value=l.fSize; document.getElementById('sSizeVal').textContent=l.fSize;
  document.getElementById('sColor').value=l.txtCol;
  closeSheet('textSheet');
  curTool='select'; document.querySelectorAll('.bar-btn').forEach(x=>x.classList.toggle('active',x.dataset.t==='select'));
  updateProps(); render();
}
// add text button in sheet
document.querySelector('#textSheet .bd').innerHTML += '<button class="chip" onclick="addTextToCanvas()" style="width:100%;text-align:center;background:var(--accent);color:#fff;margin-top:8px">+ Ajouter le texte</button>';

// ========== SHAPE TOOL ==========
document.querySelectorAll('[data-shape]').forEach(b=>{
  b.addEventListener('click',function(){
    document.querySelectorAll('[data-shape]').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
  });
});
function addShapeToCanvas(){
  saveUndo();
  const sh=document.querySelector('[data-shape].active')?.dataset.shape||'rect';
  const fill=document.getElementById('sFill').value;
  const stroke=document.getElementById('sStroke').value;
  const lw=+document.getElementById('sLW').value;
  const l=new Layer('shape',{shape:sh,fill,stroke,lw,x:W/2-50,y:H/2-50,w:100,h:100});
  layers.push(l); activeIdx=layers.length-1;
  closeSheet('shapeSheet');
  curTool='select'; document.querySelectorAll('.bar-btn').forEach(x=>x.classList.toggle('active',x.dataset.t==='select'));
  updateProps(); render();
}
document.querySelector('#shapeSheet .bd').innerHTML += '<button class="chip" onclick="addShapeToCanvas()" style="width:100%;text-align:center;background:var(--accent);color:#fff;margin-top:8px">+ Ajouter la forme</button>';

// ========== IMAGE / BACKGROUND ==========
document.getElementById('bgInput').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const img=new Image();
  img.onload=()=>{
    // remove existing bg
    for(let i=layers.length-1;i>=0;i--){if(layers[i].type==='bg')layers.splice(i,1)}
    saveUndo();
    const l=new Layer('bg',{img,x:0,y:0,w:W,h:H});
    // fit bg to canvas
    const r=Math.min(W/img.width,H/img.height);
    l.w=img.width*r; l.h=img.height*r;
    l.x=(W-l.w)/2; l.y=(H-l.h)/2;
    layers.unshift(l);
    render();
  };
  img.src=URL.createObjectURL(f); e.target.value='';
};

document.getElementById('imgInput').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const img=new Image();
  img.onload=()=>{
    saveUndo();
    const r=Math.min(W/2/img.width,H/2/img.height);
    const l=new Layer('image',{img,x:(W-img.width*r)/2,y:(H-img.height*r)/2,w:img.width*r,h:img.height*r});
    layers.push(l); activeIdx=layers.length-1;
    updateProps(); render();
  };
  img.src=URL.createObjectURL(f); e.target.value='';
};

// ========== LAYERS ==========
function updateLayers(){
  const el=document.getElementById('layerList'); el.innerHTML='';
  layers.forEach((l,i)=>{
    const d=document.createElement('div');
    d.className='ly'+(i===activeIdx?' act':'');
    d.innerHTML='<span class="l-eye">'+(l.vis?'👁':'🚫')+'</span><span class="l-nm">'+l.name+'</span>';
    d.querySelector('.l-eye').onclick=e=>{e.stopPropagation();l.vis=!l.vis;render()};
    d.onclick=()=>{activeIdx=i;updateProps();render();updateLayers()};
    el.appendChild(d);
  });
}
function addLayer(){
  saveUndo();
  const l=new Layer('shape',{name:'Calque',shape:'rect',fill:'#'+Math.floor(Math.random()*16777215).toString(16),x:W/2-30,y:H/2-30,w:60,h:60});
  layers.push(l); activeIdx=layers.length-1; updateProps(); render(); updateLayers();
}
function deleteLayer(){
  if(activeIdx<0) return;
  saveUndo(); layers.splice(activeIdx,1); activeIdx=Math.min(activeIdx,layers.length-1);
  updateProps(); render(); updateLayers();
}

// ========== PROPERTIES ==========
function updateProps(){
  const el=document.getElementById('selProps');
  if(activeIdx<0||!layers[activeIdx]){el.innerHTML='<span style="color:var(--text2);font-size:11px">Sélectionne un élément</span>';return}
  const l=layers[activeIdx];
  let html='<div class="row"><span class="lbl">X</span><input type="number" id="pX" value="'+Math.round(l.x)+'" style="flex:1">';
  html+='<span class="lbl">Y</span><input type="number" id="pY" value="'+Math.round(l.y)+'" style="flex:1"></div>';
  html+='<div class="row"><span class="lbl">L</span><input type="number" id="pW" value="'+Math.round(l.w)+'" style="flex:1">';
  html+='<span class="lbl">H</span><input type="number" id="pH" value="'+Math.round(l.h)+'" style="flex:1"></div>';
  html+='<div class="row"><span class="lbl">Rotation</span><input type="range" id="pRot" min="0" max="360" value="'+l.rot+'"><span class="val">'+l.rot+'°</span></div>';
  html+='<div class="row"><span class="lbl">Opacité</span><input type="range" id="pOp" min="0" max="100" value="'+Math.round(l.op*100)+'"><span class="val">'+Math.round(l.op*100)+'%</span></div>';
  el.innerHTML=html;
  el.querySelector('#pX')?.addEventListener('input',function(){saveUndo();l.x=+this.value;render()});
  el.querySelector('#pY')?.addEventListener('input',function(){saveUndo();l.y=+this.value;render()});
  el.querySelector('#pW')?.addEventListener('input',function(){saveUndo();l.w=+this.value;render()});
  el.querySelector('#pH')?.addEventListener('input',function(){saveUndo();l.h=+this.value;render()});
  el.querySelector('#pRot')?.addEventListener('input',function(){l.rot=+this.value;this.nextElementSibling.textContent=l.rot+'°';render()});
  el.querySelector('#pOp')?.addEventListener('input',function(){l.op=+this.value/100;this.nextElementSibling.textContent=this.value+'%';render()});
}

// ========== UNDO / REDO ==========
function saveUndo(){undoStack.push(JSON.parse(JSON.stringify(layers)));if(undoStack.length>30)undoStack.shift();redoStack=[]}
function undo(){if(undoStack.length){redoStack.push(JSON.parse(JSON.stringify(layers)));layers=undoStack.pop();render();updateLayers();updateProps()}}
function redo(){if(redoStack.length){undoStack.push(JSON.parse(JSON.stringify(layers)));layers=redoStack.pop();render();updateLayers();updateProps()}}

// ========== EXPORT ==========
function showExport(){document.getElementById('exportSheet').classList.add('open')}
document.getElementById('expQ').addEventListener('input',function(){document.getElementById('expQVal').textContent=this.value+'%'});
function doExport(){
  const fmt=document.getElementById('expFmt').value;
  const q=+document.getElementById('expQ').value/100;
  const ec=document.createElement('canvas'); ec.width=W; ec.height=H;
  const ectx=ec.getContext('2d');
  ectx.fillStyle='#1a1a1e'; ectx.fillRect(0,0,W,H);
  layers.forEach(l=>{if(l.vis)l.draw(ectx)});
  const a=document.createElement('a');
  a.download='pixellapp.'+fmt;
  a.href=ec.toDataURL('image/'+fmt,q);
  a.click();
  document.getElementById('exportSheet').classList.remove('open');
}

// ========== KEYBOARD ==========
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo()}
  if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo()}
  if(e.key==='Delete'&&activeIdx>=0){deleteLayer()}
});

// ========== INIT ==========
window.addEventListener('resize',resizeCanvas);
setTimeout(resizeCanvas,50);
render();
</script>
</body>
</html>
