<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>PixellApp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0a07; --panel:rgba(20,16,12,.98); --panel2:#1e1814;
  --gold:#c9a84c; --gold2:#f0c866; --gold3:rgba(201,168,76,.15);
  --text:#e8e0d0; --text2:#8a7a5a; --text3:#5a4e38;
  --border:#2a2218; --danger:#d4451a; --radius:8px;
  --bar-h:48px; --top-h:40px;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;overflow:hidden;height:100dvh;display:flex;flex-direction:column}
::selection{background:var(--gold3);color:var(--gold)}

/* TOP BAR */
.topbar{height:var(--top-h);background:var(--panel);display:flex;align-items:center;padding:0 8px;gap:3px;border-bottom:1px solid var(--border);z-index:10;flex-shrink:0;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
.topbar .logo{font-weight:800;font-size:14px;color:var(--gold);letter-spacing:1px;margin-right:2px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tb{width:32px;height:32px;border:none;background:0 0;color:var(--text2);border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.tb:active{background:var(--gold3);color:var(--gold);transform:scale(.92)}
.tb.hm{display:none}
.topbar .sp{flex:1}
.ebtn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0d0a07;border:none;padding:5px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
.ebtn:active{transform:scale(.95);opacity:.9}
#zoomLbl{font-size:10px;color:var(--text2);min-width:32px;text-align:center}

/* CANVAS */
.cw{flex:1;position:relative;overflow:hidden;background:#1a1410;touch-action:none}
canvas#c{display:block;margin:auto;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 4px 30px rgba(0,0,0,.5);border-radius:4px;touch-action:none}
#zBadge{position:absolute;bottom:calc(var(--bar-h) + 8px);left:8px;font-size:9px;color:var(--text3);background:rgba(0,0,0,.6);padding:2px 6px;border-radius:3px;pointer-events:none;backdrop-filter:blur(4px)}

/* BOTTOM BAR */
.br{display:flex;background:var(--panel);border-top:1px solid var(--border);padding:2px 2px;gap:0;overflow-x:auto;overflow-y:hidden;flex-shrink:0;height:var(--bar-h);align-items:center;-webkit-overflow-scrolling:touch;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
.br::-webkit-scrollbar{display:none}
.bb{min-width:44px;height:44px;border:none;background:0 0;color:var(--text2);font-size:16px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;gap:0;padding:0 8px;position:relative;transition:all .1s}
.bb:active{background:var(--gold3)}
.bb.act{color:var(--gold)}
.bb.act::after{content:'';position:absolute;bottom:3px;left:30%;right:30%;height:2px;background:var(--gold);border-radius:1px}
.bb .l{font-size:7px;color:var(--text3);margin-top:1px;letter-spacing:.5px;text-transform:uppercase;font-weight:600}
.bs{width:1px;height:26px;background:var(--border);flex-shrink:0;margin:0 2px}

/* SHEETS */
.sh{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--panel);border-top:1px solid var(--border);transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:60dvh;overflow-y:auto;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-radius:16px 16px 0 0}
.sh.open{transform:translateY(0)}
.sh .hd{padding:12px 16px 8px;font-size:11px;font-weight:700;color:var(--text2);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:2;text-transform:uppercase;letter-spacing:.8px}
.sh .hd button{background:0 0;border:none;color:var(--gold);font-size:12px;cursor:pointer;padding:6px 10px;border-radius:6px;font-weight:600}
.sh .hd button:active{background:var(--gold3)}
.sh .bd{padding:14px 16px calc(14px + env(safe-area-inset-bottom,0))}

.grp{margin-bottom:14px}
.gl{font-size:9px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.7px;font-weight:600}
.r{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.r .lb{font-size:10px;color:var(--text2);min-width:28px}
.r input,.r select{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:5px;font-size:12px;outline:0;flex:1;min-height:36px}
.r input:focus,.r select:focus{border-color:var(--gold)}
.r input[type=color]{width:38px;flex:none;padding:2px;height:34px;border-radius:5px}
.r input[type=range]{flex:1;padding:0;height:24px;-webkit-appearance:none;appearance:none;background:0 0}
.r input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--gold);border-radius:50%;cursor:pointer;margin-top:-7px}
.r input[type=range]::-webkit-slider-runnable-track{height:4px;background:var(--border);border-radius:2px}
.r .vl{font-size:10px;color:var(--text2);min-width:22px;text-align:right}

.ch{display:flex;gap:4px;flex-wrap:wrap}
.ch .c{background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:6px 12px;font-size:11px;cursor:pointer;color:var(--text);transition:all .1s}
.ch .c:active{background:var(--gold3);border-color:var(--gold)}
.ch .c.act{background:var(--gold3);border-color:var(--gold);color:var(--gold)}
.cprim{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0d0a07;border:none;border-radius:6px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;width:100%;text-align:center;transition:all .15s}
.cprim:active{transform:scale(.97)}

/* LAYER LIST */
.ly{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:5px;cursor:pointer;font-size:12px;background:0 0;margin-bottom:2px;transition:all .1s;border:1px solid transparent}
.ly:active{background:var(--gold3)}
.ly.act{background:var(--gold3);border-color:var(--gold);color:var(--gold)}
.ly .le{font-size:12px;width:22px;text-align:center;cursor:pointer}
.ly .ln{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.empty{text-align:center;padding:48px 20px;color:var(--text2);font-size:12px;line-height:1.7}
.empty .bi{font-size:40px;margin-bottom:10px;opacity:.5}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">✦ PX</span>
  <span id="zoomLbl">100%</span>
  <div class="sp"></div>
  <button class="tb hm" onclick="undo()" title="Annuler">↩</button>
  <button class="tb hm" onclick="redo()" title="Rétablir">↪</button>
  <button class="tb" onclick="fit()" title="Ajuster">⊡</button>
  <button class="ebtn" onclick="showExport()">Exporter</button>
</div>

<div class="cw" id="cw">
  <canvas id="c"></canvas>
  <div id="zBadge"></div>
</div>

<div class="br" id="bar">
  <button class="bb act" data-t="sel"><span>➤</span><span class="l">Sélection</span></button>
  <button class="bb" data-t="bg"><span>🖼</span><span class="l">Fond</span></button>
  <button class="bb" data-t="img"><span>🏞</span><span class="l">Image</span></button>
  <button class="bb" data-t="txt"><span>T</span><span class="l">Texte</span></button>
  <button class="bb" data-t="shp"><span>◇</span><span class="l">Forme</span></button>
  <div class="bs"></div>
  <button class="bb" data-t="lyr"><span>☰</span><span class="l">Calques</span></button>
  <button class="bb" data-t="pan"><span>✋</span><span class="l">Main</span></button>
</div>

<input type="file" id="bgInp" accept="image/*" style="display:none">
<input type="file" id="imgInp" accept="image/*" style="display:none">

<!-- TEXT SHEET -->
<div class="sh" id="txtSh">
  <div class="hd">Texte <button onclick="clSh('txtSh')">✓</button></div>
  <div class="bd">
    <div class="grp">
      <div class="gl">Contenu</div>
      <div class="r"><textarea id="sTxt" style="flex:1;min-height:60px;resize:none;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:5px;font-size:14px;outline:0;font-family:inherit">Texte</textarea></div>
    </div>
    <div class="grp">
      <div class="gl">Police</div>
      <div class="r">
        <select id="sFnt" style="flex:1">
          <option>Arial</option><option>Georgia</option><option>Times New Roman</option>
          <option>Courier New</option><option>Verdana</option><option>Trebuchet MS</option>
          <option>Impact</option><option>Palatino Linotype</option>
        </select>
      </div>
      <div class="r">
        <span class="lb">Taille</span>
        <input type="range" id="sSz" min="8" max="200" value="36">
        <span class="vl" id="sSzV">36</span>
      </div>
    </div>
    <div class="grp">
      <div class="gl">Style</div>
      <div class="r">
        <input type="color" id="sCol" value="#e8e0d0" style="flex:none">
        <button class="c" id="sB" style="font-weight:800;width:36px">B</button>
        <button class="c" id="sI" style="font-style:italic;width:36px">I</button>
        <span class="lb" style="margin-left:4px">Ombre</span>
        <input type="color" id="sSh" value="#000000" style="flex:none">
      </div>
    </div>
    <button class="cprim" onclick="addText()">+ Ajouter le texte</button>
  </div>
</div>

<!-- SHAPE SHEET -->
<div class="sh" id="shpSh">
  <div class="hd">Forme <button onclick="clSh('shpSh')">✓</button></div>
  <div class="bd">
    <div class="grp">
      <div class="gl">Type</div>
      <div class="ch" id="shpCh">
        <button class="c act" data-sh="rect">▬ Rectangle</button>
        <button class="c" data-sh="circle">⬤ Cercle</button>
        <button class="c" data-sh="triangle">△ Triangle</button>
        <button class="c" data-sh="star">★ Étoile</button>
        <button class="c" data-sh="line">╱ Ligne</button>
      </div>
    </div>
    <div class="grp">
      <div class="gl">Apparence</div>
      <div class="r"><span class="lb">Remplir</span><input type="color" id="sFl" value="#c9a84c"></div>
      <div class="r"><span class="lb">Contour</span><input type="color" id="sSk" value="#e8e0d0"></div>
      <div class="r"><span class="lb">Épaisseur</span><input type="range" id="sLw" min="0" max="16" value="2"><span class="vl" id="sLwV">2</span></div>
    </div>
    <button class="cprim" onclick="addShape()">+ Ajouter la forme</button>
  </div>
</div>

<!-- LAYER / PROPERTIES SHEET -->
<div class="sh" id="lyrSh">
  <div class="hd">Calques <button onclick="clSh('lyrSh')">✓</button></div>
  <div class="bd">
    <div id="lyList"></div>
    <div style="display:flex;gap:6px;margin:8px 0 14px">
      <button class="c" onclick="addLayer()" style="flex:1;text-align:center">+ Nouveau</button>
      <button class="c" onclick="delLayer()" style="flex:1;text-align:center;color:var(--danger);border-color:var(--danger)">✕ Suppr</button>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:12px">
      <div class="gl">Propriétés</div>
      <div id="selPr"></div>
    </div>
  </div>
</div>

<!-- EXPORT SHEET -->
<div class="sh" id="expSh" style="z-index:60">
  <div class="hd">Exporter <button onclick="clSh('expSh')">✕</button></div>
  <div class="bd">
    <div class="r"><span class="lb">Format</span>
      <select id="eFmt" style="flex:1">
        <option value="png">PNG</option>
        <option value="jpeg">JPEG</option>
        <option value="webp">WebP</option>
      </select>
    </div>
    <div class="r"><span class="lb">Qualité</span><input type="range" id="eQ" min="10" max="100" value="95"><span class="vl" id="eQV">95%</span></div>
    <button class="cprim" onclick="doExp()" style="margin-top:8px">⬇ Télécharger</button>
  </div>
</div>

<script>
// ======================== STATE ========================
const c=document.getElementById('c'), cx=c.getContext('2d');
let W=360, H=480, zoom=1, px=0, py=0;
let ly=[], ai=-1, drag=!1, pan=!1, dragOff={x:0,y:0};
let undoSt=[], redoSt=[];
const FONTS=['Arial','Georgia','Times New Roman','Courier New','Verdana','Trebuchet MS','Impact','Palatino Linotype'];

// ======================== LAYER ========================
class L{
  constructor(t,o={}){
    this.id=Date.now()+Math.random(); this.t=t;
    this.n=o.n||t; this.x=o.x||0; this.y=o.y||0; this.w=o.w||80; this.h=o.h||80;
    this.r=o.r||0; this.op=o.op??1; this.v=!0;
    // shape
    this.sh=o.sh||'rect'; this.fl=o.fl||'#c9a84c'; this.sk=o.sk||'transparent'; this.lw=o.lw||0;
    // text
    this.tx=o.tx||'Texte'; this.fs=o.fs||36; this.ff=o.ff||'Arial';
    this.b=o.b||!1; this.i=o.i||!1; this.tc=o.tc||'#e8e0d0'; this.sd=o.sd||'#000000';
    // image / bg
    this.im=o.im||null;
  }
  get cx(){return this.x+this.w/2}
  get cy(){return this.y+this.h/2}
  hit(x,y){
    if(!this.v) return!1;
    const c=this.cx,cy=this.cy, cs=Math.cos(-this.r*Math.PI/180), sn=Math.sin(-this.r*Math.PI/180);
    const rx=(x-c)*cs-(y-cy)*sn+c, ry=(x-c)*sn+(y-cy)*cs+cy;
    return rx>=this.x-8&&rx<=this.x+this.w+8&&ry>=this.y-8&&ry<=this.y+this.h+8;
  }
  dr(ctx){
    if(!this.v) return;
    ctx.save(); ctx.globalAlpha=this.op;
    if(this.t!=='bg'){ctx.translate(this.cx,this.cy);ctx.rotate(this.r*Math.PI/180);ctx.translate(-this.cx,-this.cy)}
    if((this.t==='bg'||this.t==='image')&&this.im) ctx.drawImage(this.im,this.x,this.y,this.w,this.h);
    else if(this.t==='text'){
      ctx.font=(this.b?'bold ':'')+(this.i?'italic ':'')+Math.round(this.fs)+'px '+this.ff;
      ctx.fillStyle=this.tc; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor=this.sd; ctx.shadowBlur=3; ctx.shadowOffsetX=1; ctx.shadowOffsetY=1;
      const l=this.tx.split('\n'); l.forEach((t,i)=>ctx.fillText(t,this.cx,this.y+this.fs/2+i*this.fs*1.3));
      ctx.shadowColor='transparent';
    } else if(this.t==='shape'){
      ctx.fillStyle=this.fl; ctx.strokeStyle=this.sk; ctx.lineWidth=this.lw;
      const s=this.sh;
      if(s==='rect'){ctx.fillRect(this.x,this.y,this.w,this.h);if(this.lw)ctx.strokeRect(this.x,this.y,this.w,this.h)}
      else if(s==='circle'){ctx.beginPath();ctx.ellipse(this.cx,this.cy,Math.abs(this.w/2),Math.abs(this.h/2),0,0,Math.PI*2);ctx.fill();if(this.lw)ctx.stroke()}
      else if(s==='triangle'){ctx.beginPath();ctx.moveTo(this.cx,this.y);ctx.lineTo(this.x+this.w,this.y+this.h);ctx.lineTo(this.x,this.y+this.h);ctx.closePath();ctx.fill();if(this.lw)ctx.stroke()}
      else if(s==='star'){ctx.beginPath();for(let i=0;i<10;i++){const r=i%2?Math.min(this.w,this.h)/4:Math.min(this.w,this.h)/2,a=Math.PI*i/5-Math.PI/2;ctx[i?'lineTo':'moveTo'](this.cx+r*Math.cos(a),this.cy+r*Math.sin(a))}ctx.closePath();ctx.fill();if(this.lw)ctx.stroke()}
      else if(s==='line'){ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(this.x+this.w,this.y+this.h);ctx.strokeStyle=this.fl;ctx.lineWidth=Math.max(1,this.lw);ctx.stroke()}
    }
    ctx.restore();
  }
}

// ======================== CANVAS ========================
function resize(){
  const wr=document.getElementById('cw');
  W=Math.min(800,wr.clientWidth-16); H=Math.min(600,wr.clientHeight-16);
  document.getElementById('zBadge').textContent=W+'×'+H;
  fit(); render();
}
function render(){
  c.width=W; c.height=H;
  cx.fillStyle='#1a1410'; cx.fillRect(0,0,W,H);
  if(!ly.some(l=>l.t==='bg'&&l.im)){
    cx.fillStyle='#221a14'; for(let y=0;y<H;y+=20){for(let x=0;x<W;x+=20){if((x/20+y/20)%2)cx.fillRect(x,y,20,20)}}
  }
  cx.save(); cx.translate(px,py); cx.scale(zoom,zoom);
  ly.forEach(l=>l.dr(cx));
  cx.restore();
  if(ai>=0&&ly[ai]) drawSel(ly[ai]);
  upLy();
}
function drawSel(l){
  cx.save(); cx.translate(px,py); cx.scale(zoom,zoom);
  cx.strokeStyle='#c9a84c'; cx.lineWidth=1.5/zoom; cx.setLineDash([5/zoom,4/zoom]);
  cx.strokeRect(l.x,l.y,l.w,l.h); cx.setLineDash([]);
  const hs=l.t==='bg'?[]:[
    {x:l.x,y:l.y},{x:l.cx,y:l.y},{x:l.x+l.w,y:l.y},
    {x:l.x+l.w,y:l.cy},{x:l.x+l.w,y:l.y+l.h},{x:l.cx,y:l.y+l.h},{x:l.x,y:l.y+l.h},{x:l.x,y:l.cy}
  ];
  hs.forEach(h=>{cx.beginPath();cx.arc(h.x,h.y,5/zoom,0,Math.PI*2);cx.fillStyle='#c9a84c';cx.fill();cx.strokeStyle='#0d0a07';cx.lineWidth=1/zoom;cx.stroke()});
  cx.beginPath(); cx.arc(l.cx,l.y-18/zoom,5/zoom,0,Math.PI*2); cx.fillStyle='#d4451a'; cx.fill();
  cx.beginPath(); cx.moveTo(l.cx,l.y); cx.lineTo(l.cx,l.y-14/zoom); cx.strokeStyle='#c9a84c'; cx.lineWidth=1.5/zoom; cx.stroke();
  cx.restore();
}
// ======================== INPUT ========================
function wPos(e){
  const r=c.getBoundingClientRect();
  const x=e.touches?e.touches[0].clientX:e.clientX, y=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(x-r.left-px)/zoom,y:(y-r.top-py)/zoom};
}
function getHandles(l){
  if(l.t==='bg')return[];const s=6/zoom;
  return[{x:l.x-s,y:l.y-s,h:0},{x:l.cx,y:l.y-s,h:1},{x:l.x+l.w+s,y:l.y-s,h:2},{x:l.x+l.w+s,y:l.cy,h:3},{x:l.x+l.w+s,y:l.y+l.h+s,h:4},{x:l.cx,y:l.y+l.h+s,h:5},{x:l.x-s,y:l.y+l.h+s,h:6},{x:l.x-s,y:l.cy,h:7}];
}
let resizing=!1,rotating=!1,rsHdl=-1;
function onDown(e){
  e.preventDefault();const wp=wPos(e);
  if(curT==='pan'){pan=!0;const t=e.touches?e.touches[0]:e;dragOff={x:t.clientX-px,y:t.clientY-py};return}
  // check resize/rotate handles on selected layer
  if(ai>=0&&ly[ai]&&ly[ai].t!=='bg'){
    const r=c.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
    const l=ly[ai];
    // rotation handle
    const rhx=l.cx*zoom+px+r.left,rhy=(l.y-18/zoom)*zoom+py+r.top;
    if(Math.hypot(cx-rhx,cy-rhy)<20){rotating=!0;saveUndo();return}
    // resize handles
    const hs=getHandles(l);
    for(const h of hs){
      const sx=h.x*zoom+px+r.left,sy=h.y*zoom+py+r.top;
      if(Math.hypot(cx-sx,cy-sy)<16){resizing=!0;rsHdl=h.h;saveUndo();return}
    }
  }
  // layer hit test (skip bg)
  ai=-1;
  for(let i=ly.length-1;i>=0;i--){if(ly[i].t!=='bg'&&ly[i].hit(wp.x,wp.y)&&ly[i].v){ai=i;break}}
  if(ai>=0){drag=!0;dragOff={x:wp.x-ly[ai].x,y:wp.y-ly[ai].y};saveUndo();upPr();render();return}
  pan=!0;const t=e.touches?e.touches[0]:e;dragOff={x:t.clientX-px,y:t.clientY-py};
}
function onMove(e){
  e.preventDefault();const wp=wPos(e);
  if(resizing&&ai>=0&&ly[ai]){
    const l=ly[ai];
    if(rsHdl===0){l.w+=l.x-wp.x;l.h+=l.y-wp.y;l.x=wp.x;l.y=wp.y}
    else if(rsHdl===2){l.w=wp.x-l.x;l.h+=l.y-wp.y;l.y=wp.y}
    else if(rsHdl===4){l.w=wp.x-l.x;l.h=wp.y-l.y}
    else if(rsHdl===6){l.w+=l.x-wp.x;l.h=wp.y-l.y;l.x=wp.x}
    else if(rsHdl===1){l.h+=l.y-wp.y;l.y=wp.y}
    else if(rsHdl===3){l.w=wp.x-l.x}
    else if(rsHdl===5){l.h=wp.y-l.y}
    else if(rsHdl===7){l.w+=l.x-wp.x;l.x=wp.x}
    if(l.w<5){l.w=5}if(l.h<5){l.h=5}
    upPr();render();return;
  }
  if(rotating&&ai>=0&&ly[ai]){
    const l=ly[ai],r=c.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;
    l.r=Math.round(Math.atan2(cy-(l.cy*zoom+py+r.top),cx-(l.cx*zoom+px+r.left))*180/Math.PI+90)%360;
    if(l.r<0)l.r+=360;
    upPr();render();return;
  }
  if(drag&&ai>=0){ly[ai].x=wp.x-dragOff.x;ly[ai].y=wp.y-dragOff.y;upPr();render();return}
  if(pan){const t=e.touches?e.touches[0]:e;px=t.clientX-dragOff.x;py=t.clientY-dragOff.y;document.getElementById('zoomLbl').textContent=Math.round(zoom*100)+'%';render()}
}
function onUp(e){e.preventDefault();drag=!1;pan=!1;resizing=!1;rotating=!1;rsHdl=-1}

c.addEventListener('mousedown',onDown); c.addEventListener('mousemove',onMove);
c.addEventListener('mouseup',onUp); c.addEventListener('mouseleave',onUp);
c.addEventListener('touchstart',onDown,{passive:!1}); c.addEventListener('touchmove',onMove,{passive:!1});
c.addEventListener('touchend',onUp,{passive:!1}); c.addEventListener('touchcancel',onUp,{passive:!1});

// ZOOM (scroll + pinch)
c.addEventListener('wheel',e=>{
  e.preventDefault();const r=c.getBoundingClientRect();
  const wx=(e.clientX-r.left-px)/zoom,wy=(e.clientY-r.top-py)/zoom;
  zoom=Math.max(.1,Math.min(10,zoom*(e.deltaY>0?.88:1.12)));
  px=e.clientX-r.left-wx*zoom;py=e.clientY-r.top-wy*zoom;
  document.getElementById('zoomLbl').textContent=Math.round(zoom*100)+'%';render();
},{passive:!1});

let pd=0;
c.addEventListener('touchstart',e=>{if(e.touches.length===2){pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);pan=!1;drag=!1}},{passive:!0});
c.addEventListener('touchmove',e=>{
  if(e.touches.length===2){e.preventDefault();const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  if(pd>0){const cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2,r=c.getBoundingClientRect();
  const wx=(cx-r.left-px)/zoom,wy=(cy-r.top-py)/zoom;zoom=Math.max(.1,Math.min(10,zoom*nd/pd));px=cx-r.left-wx*zoom;py=cy-r.top-wy*zoom;
  document.getElementById('zoomLbl').textContent=Math.round(zoom*100)+'%';render()}pd=nd}
},{passive:!1});

function fit(){
  const wr=document.getElementById('cw');
  zoom=Math.min((wr.clientWidth-16)/W,(wr.clientHeight-16)/H)*.95;
  px=(wr.clientWidth-W*zoom)/2;py=(wr.clientHeight-H*zoom)/2;
  document.getElementById('zoomLbl').textContent=Math.round(zoom*100)+'%';render();
}

// ======================== TOOLS ========================
let curT='sel';
document.querySelectorAll('.bb[data-t]').forEach(b=>{
  b.addEventListener('click',()=>{
    const t=b.dataset.t;
    if(t==='bg'){document.getElementById('bgInp').click();return}
    if(t==='img'){document.getElementById('imgInp').click();return}
    if(t==='txt'){if(ai>=0&&ly[ai]?.t==='text')fillTextSheet(ly[ai]);opSh('txtSh');return}
    if(t==='shp'){opSh('shpSh');return}
    if(t==='lyr'){opSh('lyrSh');upLy();upPr();return}
    curT=t;
    document.querySelectorAll('.bb').forEach(x=>x.classList.toggle('act',x.dataset.t===t));
    if(t==='sel'){ai=-1;upPr();render()}
  });
});

// ======================== SHEETS ========================
function opSh(id){document.getElementById(id).classList.add('open')}
function clSh(id){document.getElementById(id).classList.remove('open')}

// ======================== TEXT ========================
document.getElementById('sTxt').addEventListener('input',function(){if(ai>=0&&ly[ai]?.t==='text'){saveUndo();ly[ai].tx=this.value;render()}});
document.getElementById('sFnt').addEventListener('change',function(){if(ai>=0&&ly[ai]?.t==='text'){saveUndo();ly[ai].ff=this.value;render()}});
document.getElementById('sSz').addEventListener('input',function(){const v=+this.value;document.getElementById('sSzV').textContent=v;if(ai>=0&&ly[ai]?.t==='text'){saveUndo();ly[ai].fs=v;render()}});
document.getElementById('sCol').addEventListener('input',function(){if(ai>=0&&ly[ai]?.t==='text'){saveUndo();ly[ai].tc=this.value;render()}});
document.getElementById('sSh').addEventListener('input',function(){if(ai>=0&&ly[ai]?.t==='text'){saveUndo();ly[ai].sd=this.value;render()}});
document.getElementById('sB').addEventListener('click',function(){if(ai<0||ly[ai]?.t!=='text')return;saveUndo();ly[ai].b=!ly[ai].b;this.classList.toggle('act');render()});
document.getElementById('sI').addEventListener('click',function(){if(ai<0||ly[ai]?.t!=='text')return;saveUndo();ly[ai].i=!ly[ai].i;this.classList.toggle('act');render()});

function fillTextSheet(l){
  document.getElementById('sTxt').value=l.tx;
  document.getElementById('sFnt').value=l.ff;
  document.getElementById('sSz').value=l.fs; document.getElementById('sSzV').textContent=l.fs;
  document.getElementById('sCol').value=l.tc;
  document.getElementById('sSh').value=l.sd;
  document.getElementById('sB').classList.toggle('act',l.b);
  document.getElementById('sI').classList.toggle('act',l.i);
}
function addText(){
  saveUndo();
  const txt=document.getElementById('sTxt').value||'Texte';
  const l=new L('text',{tx:txt,fs:36,ff:document.getElementById('sFnt').value,tc:document.getElementById('sCol').value,sd:document.getElementById('sSh').value,x:W/2-80,y:H/2-24,w:160,h:48});
  ly.push(l);ai=ly.length-1;
  clSh('txtSh');curT='sel';document.querySelectorAll('.bb').forEach(x=>x.classList.toggle('act',x.dataset.t==='sel'));
  upPr();render();
}

// ======================== SHAPE ========================
document.querySelectorAll('#shpCh .c').forEach(b=>{
  b.addEventListener('click',function(){document.querySelectorAll('#shpCh .c').forEach(x=>x.classList.remove('act'));this.classList.add('act')});
});
document.getElementById('sLw').addEventListener('input',function(){document.getElementById('sLwV').textContent=this.value});
function addShape(){
  saveUndo();
  const sh=document.querySelector('#shpCh .act')?.dataset.sh||'rect';
  const l=new L('shape',{sh,x:W/2-60,y:H/2-60,w:120,h:120,fl:document.getElementById('sFl').value,sk:document.getElementById('sSk').value,lw:+document.getElementById('sLw').value});
  ly.push(l);ai=ly.length-1;
  clSh('shpSh');curT='sel';document.querySelectorAll('.bb').forEach(x=>x.classList.toggle('act',x.dataset.t==='sel'));
  ly.push(l);ai=ly.length-1;
  clSh('shpSh');curT='sel';document.querySelectorAll('.bb').forEach(x=>x.classList.toggle('act',x.dataset.t==='sel'));
  upPr();render();
}

// ======================== IMAGE / BG ========================
document.getElementById('bgInp').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const im=new Image();
  im.onload=()=>{
    for(let i=ly.length-1;i>=0;i--){if(ly[i].t==='bg')ly.splice(i,1)}
    saveUndo();
    const l=new L('bg',{im,x:0,y:0,w:W,h:H});
    const r=Math.min(W/im.width,H/im.height);
    l.w=im.width*r;l.h=im.height*r;l.x=(W-l.w)/2;l.y=(H-l.h)/2;
    l.n='Fond';ly.unshift(l);ai=-1;
    curT='sel';document.querySelectorAll('.bb').forEach(x=>x.classList.toggle('act',x.dataset.t==='sel'));
    render();
  };
  im.src=URL.createObjectURL(f);e.target.value='';
};
document.getElementById('imgInp').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const im=new Image();
  im.onload=()=>{
    saveUndo();
    const r=Math.min(W*0.6/im.width,H*0.6/im.height);
    const l=new L('image',{im,x:(W-im.width*r)/2,y:(H-im.height*r)/2,w:im.width*r,h:im.height*r});
    l.n=f.name.substring(0,20);ly.push(l);ai=ly.length-1;
    curT='sel';document.querySelectorAll('.bb').forEach(x=>x.classList.toggle('act',x.dataset.t==='sel'));
    upPr();render();
  };
  im.src=URL.createObjectURL(f);e.target.value='';
};

// ======================== LAYERS ========================
function upLy(){
  const el=document.getElementById('lyList');el.innerHTML='';
  if(!ly.length){el.innerHTML='<div class="empty"><div class="bi">🎨</div>Aucun calque<br>Ajoute une image, du texte ou une forme</div>';return}
  [...ly].reverse().forEach((l,i)=>{
    const ri=ly.length-1-i;
    const d=document.createElement('div');
    d.className='ly'+(ri===ai?' act':'');d.innerHTML='<span class="le">'+(l.v?'👁':'🚫')+'</span><span class="ln">'+l.n+'</span>';
    d.querySelector('.le').onclick=e=>{e.stopPropagation();l.v=!l.v;render()};
    d.onclick=()=>{ai=ri;upPr();render();upLy();if(l.t==='text')fillTextSheet(l)};
    el.appendChild(d);
  });
}
function addLayer(){
  saveUndo();
  const l=new L('shape',{n:'Calque',sh:'rect',fl:'#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0'),x:W/2-40,y:H/2-40,w:80,h:80});
  ly.push(l);ai=ly.length-1;upPr();render();upLy();
}
function delLayer(){
  if(ai<0)return;saveUndo();ly.splice(ai,1);ai=Math.min(ai,ly.length-1);upPr();render();upLy();
}

// ======================== PROPERTIES ========================
function upPr(){
  const el=document.getElementById('selPr');
  if(ai<0||!ly[ai]){el.innerHTML='<span style="color:var(--text3);font-size:11px">Sélectionne un calque</span>';return}
  const l=ly[ai];
  if(l.t==='bg'){el.innerHTML='<span style="color:var(--text2);font-size:11px">Calque de fond — utilisation limitée</span>';return}
  let h='<div class="r"><span class="lb">X</span><input type="number" id="pX" value="'+Math.round(l.x)+'" style="flex:1"><span class="lb">Y</span><input type="number" id="pY" value="'+Math.round(l.y)+'" style="flex:1"></div>';
  h+='<div class="r"><span class="lb">L</span><input type="number" id="pW" value="'+Math.round(l.w)+'" style="flex:1"><span class="lb">H</span><input type="number" id="pH" value="'+Math.round(l.h)+'" style="flex:1"></div>';
  h+='<div class="r"><span class="lb">Rotation</span><input type="range" id="pR" min="0" max="360" value="'+l.r+'"><span class="vl">'+l.r+'°</span></div>';
  h+='<div class="r"><span class="lb">Opacité</span><input type="range" id="pO" min="0" max="100" value="'+Math.round(l.op*100)+'"><span class="vl">'+Math.round(l.op*100)+'%</span></div>';
  el.innerHTML=h;
  el.querySelector('#pX')?.addEventListener('input',function(){saveUndo();l.x=+this.value;render()});
  el.querySelector('#pY')?.addEventListener('input',function(){saveUndo();l.y=+this.value;render()});
  el.querySelector('#pW')?.addEventListener('input',function(){saveUndo();l.w=+this.value;render()});
  el.querySelector('#pH')?.addEventListener('input',function(){saveUndo();l.h=+this.value;render()});
  el.querySelector('#pR')?.addEventListener('input',function(){l.r=+this.value;this.nextElementSibling.textContent=l.r+'°';render()});
  el.querySelector('#pO')?.addEventListener('input',function(){l.op=+this.value/100;this.nextElementSibling.textContent=this.value+'%';render()});
}

// ======================== UNDO ========================
function saveUndo(){undoSt.push(JSON.parse(JSON.stringify(ly)));if(undoSt.length>40)undoSt.shift();redoSt=[]}
function undo(){if(undoSt.length){redoSt.push(JSON.parse(JSON.stringify(ly)));ly=undoSt.pop();render();upLy();upPr()}}
function redo(){if(redoSt.length){undoSt.push(JSON.parse(JSON.stringify(ly)));ly=redoSt.pop();render();upLy();upPr()}}

// ======================== EXPORT ========================
function showExport(){document.getElementById('expSh').classList.add('open')}
document.getElementById('eQ').addEventListener('input',function(){document.getElementById('eQV').textContent=this.value+'%'});
function doExp(){
  const fmt=document.getElementById('eFmt').value,q=+document.getElementById('eQ').value/100;
  const ec=document.createElement('canvas');ec.width=W;ec.height=H;
  const ecx=ec.getContext('2d');
  ecx.fillStyle='#1a1410';ecx.fillRect(0,0,W,H);
  ly.forEach(l=>{if(l.v)l.dr(ecx)});
  const a=document.createElement('a');a.download='pixellapp.'+fmt;
  a.href=ec.toDataURL('image/'+fmt,q);a.click();
  clSh('expSh');
}

// ======================== KEYBOARD ========================
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo()}
  if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo()}
  if(e.key==='Delete'&&ai>=0)delLayer();
  if(e.key==='Escape'){ai=-1;upPr();render()}
});

// ======================== INIT ========================
window.addEventListener('resize',resize);
setTimeout(resize,50);
render();
</script>
</body>
</html>
