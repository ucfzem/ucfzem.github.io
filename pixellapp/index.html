<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>PixellApp</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
    :root{
      --bg:#0d0a07; --panel:rgba(20,16,12,.98); --panel2:#1e1814;
      --gold:#c9a84c; --gold2:#f0c866; --gold3:rgba(201,168,76,.18);
      --text:#e8e0d0; --text2:#8a7a5a; --text3:#5a4e38;
      --border:#2a2218; --danger:#d4451a; --radius:8px;
      --bar-h:52px; --top-h:44px;
    }
    body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;overflow:hidden;height:100dvh;display:flex;flex-direction:column}
    ::selection{background:var(--gold3);color:var(--gold)}
    .topbar{height:var(--top-h);background:var(--panel);display:flex;align-items:center;padding:0 8px;gap:4px;border-bottom:1px solid var(--border);z-index:10;flex-shrink:0;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    .topbar .logo{font-weight:800;font-size:14px;color:var(--gold);letter-spacing:1.2px;margin-right:6px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .tb{width:32px;height:32px;border:none;background:0 0;color:var(--text2);border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .12s}
    .tb:active{background:var(--gold3);color:var(--gold);transform:scale(.9)}
    .topbar .sp{flex:1}
    .ebtn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0d0a07;border:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .12s}
    .ebtn:active{transform:scale(.94)}
    #zoomLbl{font-size:10px;color:var(--text2);min-width:36px;text-align:center}
    .cw{flex:1;position:relative;overflow:hidden;background:#13100c;touch-action:none}
    canvas#c{display:block;margin:auto;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 4px 30px rgba(0,0,0,.55);border-radius:2px;touch-action:none}
    #zBadge{position:absolute;bottom:calc(var(--bar-h) + 10px);left:8px;font-size:9px;color:var(--text3);background:rgba(0,0,0,.55);padding:3px 8px;border-radius:4px;pointer-events:none;backdrop-filter:blur(4px)}
    .br{position:fixed;z-index:40;display:flex;background:var(--panel);border-top:1px solid var(--border);padding:2px 4px;gap:2px;overflow-x:auto;overflow-y:hidden;height:var(--bar-h);align-items:center;-webkit-overflow-scrolling:touch;backdrop-filter:blur(12px);transition:top .2s,left .2s,right .2s,bottom .2s,width .2s}
    .br.v{flex-direction:column;width:var(--bar-h);height:auto;padding:4px 2px;overflow-x:hidden;overflow-y:auto}
    .br.v .l{display:none}
    .br.v .sep{width:26px;height:1px;margin:4px 0}
    .br.v .bb.act::after{bottom:auto;left:3px;top:25%;right:auto;width:2px;height:50%}
    .br::-webkit-scrollbar{display:none}
    .br .grip{flex-shrink:0;width:20px;text-align:center;color:var(--text3);font-size:10px;cursor:grab;opacity:.5;transition:opacity .15s;line-height:1;user-select:none;touch-action:none}
    .br .grip:active{cursor:grabbing;opacity:1}
    .br.dragging .grip{cursor:grabbing;opacity:1}
    .bb{min-width:44px;height:44px;border:none;background:0 0;color:var(--text2);font-size:16px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;padding:0 6px;position:relative;transition:all .12s}
    .bb:active{background:var(--gold3);transform:scale(.92)}
    .bb.act{color:var(--gold)}
    .bb.act::after{content:'';position:absolute;bottom:3px;left:25%;right:25%;height:2px;background:var(--gold);border-radius:2px}
    .bb .l{font-size:7px;color:var(--text3);margin-top:1px;letter-spacing:.4px;text-transform:uppercase;font-weight:600}
    .sep{width:1px;height:26px;background:var(--border);flex-shrink:0;margin:0 4px;border-radius:1px}
    .sh{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--panel);border-top:1px solid var(--border);transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);max-height:40dvh;overflow-y:auto;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:16px 16px 0 0}
    .sh.open{transform:translateY(0)}
    .sh .hd{padding:10px 14px 8px;font-size:11px;font-weight:700;color:var(--text2);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:2;text-transform:uppercase;letter-spacing:.8px}
    .sh .hd button{background:0 0;border:none;color:var(--gold);font-size:12px;cursor:pointer;padding:4px 10px;border-radius:5px;font-weight:600}
    .sh .hd button:active{background:var(--gold3)}
    .sh .bd{padding:10px 14px calc(10px + env(safe-area-inset-bottom,0))}
    .grp{margin-bottom:8px}
    .gl{font-size:9px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.7px;font-weight:600}
    .r{display:flex;gap:5px;align-items:center;margin-bottom:5px;flex-wrap:wrap}
    .r .lb{font-size:10px;color:var(--text2);min-width:32px}
    .r input,.r select,.r textarea{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:5px 7px;border-radius:5px;font-size:11px;outline:0;flex:1;min-height:30px;font-family:inherit}
    .r input:focus,.r select:focus,.r textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold3)}
    .r input[type=color]{width:32px;flex:none;padding:1px;height:26px;border-radius:4px;cursor:pointer}
    .r input[type=range]{flex:1;padding:0;height:24px;-webkit-appearance:none;appearance:none;background:0 0}
    .r input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--gold);border-radius:50%;cursor:pointer;margin-top:-5px;border:2px solid #0d0a07}
    .r input[type=range]::-webkit-slider-runnable-track{height:4px;background:var(--border);border-radius:2px}
    .r .vl{font-size:10px;color:var(--text2);min-width:26px;text-align:right}
    .ch{display:flex;gap:5px;flex-wrap:wrap}
    .ch .c{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:7px 13px;font-size:11px;cursor:pointer;color:var(--text);transition:all .12s}
    .ch .c:active{background:var(--gold3);border-color:var(--gold)}
    .ch .c.act{background:var(--gold3);border-color:var(--gold);color:var(--gold);font-weight:600}
    .cprim{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0d0a07;border:none;border-radius:6px;padding:11px;font-size:12px;font-weight:700;cursor:pointer;width:100%;text-align:center;transition:all .12s}
    .cprim:active{transform:scale(.96)}
    .csec{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:8px 14px;font-size:11px;cursor:pointer;color:var(--text);transition:all .12s;text-align:center}
    .csec:active{background:var(--gold3);border-color:var(--gold)}
    .ly{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:12px;background:0 0;margin-bottom:2px;transition:all .12s;border:1px solid transparent}
    .ly:active{background:var(--gold3)}
    .ly.act{background:var(--gold3);border-color:var(--gold);color:var(--gold)}
    .ly .le{font-size:13px;width:22px;text-align:center;flex-shrink:0}
    .ly .ln{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ly .lup,.ly .ldn{font-size:10px;width:20px;text-align:center;cursor:pointer;flex-shrink:0;color:var(--text2);padding:2px;border-radius:4px}
    .ly .lup:active,.ly .ldn:active{color:var(--gold);background:var(--gold3)}
    .empty{text-align:center;padding:48px 20px;color:var(--text2);font-size:12px}
    .empty .bi{font-size:40px;margin-bottom:10px;opacity:.5}
    .ovl{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:45;opacity:0;pointer-events:none;transition:opacity .2s}
    .ovl.on{opacity:1;pointer-events:auto}
  </style>
</head>
<body>
<div class="topbar">
  <span class="logo">✦ PX</span>
  <span id="zoomLbl">100%</span>
  <div class="sp"></div>
  <button class="tb" data-cmd="undo" title="Annuler">↩</button>
  <button class="tb" data-cmd="redo" title="Rétablir">↪</button>
  <button class="tb" data-cmd="fit" title="Ajuster">⊡</button>
  <button class="ebtn" data-cmd="showExport">Exporter</button>
</div>

<div class="cw" id="cw">
  <canvas id="c"></canvas>
  <div id="zBadge"></div>
</div>

<div class="br" id="bar">
  <span class="grip">⠿</span>
  <button class="bb act" data-t="sel"><span>➤</span><span class="l">Sélect</span></button>
  <button class="bb" data-t="bg"><span>🖼</span><span class="l">Fond</span></button>
  <button class="bb" data-t="img"><span>🏞</span><span class="l">Image</span></button>
  <button class="bb" data-t="txt"><span>T</span><span class="l">Texte</span></button>
  <button class="bb" data-t="shp"><span>◇</span><span class="l">Forme</span></button>
  <span class="sep"></span>
  <button class="bb" data-t="lyr"><span>☰</span><span class="l">Calques</span></button>
  <button class="bb" data-t="dup"><span>⧉</span><span class="l">Dupliq.</span></button>
  <button class="bb" data-t="del"><span>🗑</span><span class="l">Suppr</span></button>
  <span class="sep"></span>
  <button class="bb" data-t="pan"><span>✋</span><span class="l">Main</span></button>
</div>

<div class="ovl" id="ovl" onclick="closeAllSheets()"></div>

<input type="file" id="bgInp" accept="image/*" style="display:none">
<input type="file" id="imgInp" accept="image/*" style="display:none">

<div class="sh" id="txtSh">
  <div class="hd">Texte <button onclick="commitText()">✓</button></div>
  <div class="bd">
    <div class="grp"><div class="gl">Contenu</div><div class="r"><textarea id="sTxt" style="flex:1;min-height:40px;resize:none;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:5px 7px;border-radius:5px;font-size:13px;outline:0" placeholder="Ton texte...">Texte</textarea></div></div>
    <div class="grp"><div class="gl">Police</div><div class="r"><select id="sFnt" style="flex:1"><option>Arial</option><option>Georgia</option><option>Times New Roman</option><option>Courier New</option><option>Verdana</option><option>Trebuchet MS</option><option>Impact</option><option>Palatino Linotype</option></select></div><div class="r"><span class="lb">Taille</span><input type="range" id="sSz" min="8" max="200" value="36"><span class="vl" id="sSzV">36</span></div></div>
    <div class="grp"><div class="gl">Style</div><div class="r"><input type="color" id="sCol" value="#e8e0d0" style="flex:none"><button class="c" id="sB" style="font-weight:800;width:34px">B</button><button class="c" id="sI" style="font-style:italic;width:34px">I</button><select id="sAl" style="flex:1;min-height:34px"><option value="center">Centre</option><option value="left">Gauche</option><option value="right">Droite</option></select></div></div>
    <div class="grp"><div class="gl">Contour</div><div class="r"><input type="color" id="sSo" value="#000000" style="flex:none"><span class="lb">Ép.</span><input type="range" id="sSw" min="0" max="12" value="0"><span class="vl" id="sSwV">0</span></div></div>
    <div class="grp"><div class="gl">Ombre</div><div class="r"><input type="color" id="sSh" value="#000000" style="flex:none"><span class="lb">Flou</span><input type="range" id="sBl" min="0" max="20" value="3"><span class="vl" id="sBlV">3</span></div></div>
    <button class="cprim" id="txtBtn">+ Ajouter le texte</button>
    <button class="csec" style="width:100%;margin-top:6px;display:none" id="txtCancelBtn" onclick="cancelTextEdit()">Annuler édition</button>
  </div>
</div>

<div class="sh" id="shpSh">
  <div class="hd">Forme <button onclick="commitShape()">✓</button></div>
  <div class="bd">
    <div class="grp"><div class="gl">Type</div><div class="ch" id="shpCh"><button class="c act" data-sh="rect">▬ Rect</button><button class="c" data-sh="circle">⬤ Cercle</button><button class="c" data-sh="triangle">△ Tri.</button><button class="c" data-sh="star">★ Étoile</button><button class="c" data-sh="line">╱ Ligne</button></div></div>
    <div class="grp"><div class="gl">Apparence</div><div class="r"><span class="lb">Remplir</span><input type="color" id="sFl" value="#c9a84c"></div><div class="r"><span class="lb">Contour</span><input type="color" id="sSk" value="#e8e0d0"></div><div class="r"><span class="lb">Épaisseur</span><input type="range" id="sLw" min="0" max="20" value="2"><span class="vl" id="sLwV">2</span></div></div>
    <button class="cprim" id="shpBtn">+ Ajouter la forme</button>
  </div>
</div>

<div class="sh" id="lyrSh">
  <div class="hd">Calques <button onclick="clSh('lyrSh')">✓</button></div>
  <div class="bd">
    <div id="lyList"></div>
    <div style="display:flex;gap:6px;margin:8px 0 14px"><button class="csec" onclick="addLayer()">+ Nouveau</button><button class="csec" onclick="dupLayer()">⧉ Dupliquer</button><button class="csec" onclick="delLayer()" style="color:var(--danger);border-color:var(--danger)">✕ Suppr</button></div>
    <div style="border-top:1px solid var(--border);padding-top:12px"><div class="gl">Propriétés</div><div id="selPr"></div></div>
  </div>
</div>

<div class="sh" id="expSh" style="z-index:60">
  <div class="hd">Exporter <button onclick="clSh('expSh')">✕</button></div>
  <div class="bd">
    <div class="r"><span class="lb">Format</span><select id="eFmt" style="flex:1"><option value="png">PNG</option><option value="jpeg">JPEG</option><option value="webp">WebP</option></select></div>
    <div class="r"><span class="lb">Qualité</span><input type="range" id="eQ" min="10" max="100" value="95"><span class="vl" id="eQV">95%</span></div>
    <div class="r" style="font-size:10px;color:var(--text3)">Taille: <span id="eDim">360×480</span></div>
    <button class="cprim" onclick="doExp()" style="margin-top:8px">⬇ Télécharger</button>
  </div>
</div>

<script>
const c = document.getElementById('c'), cx = c.getContext('2d');
let W = 360, H = 480, zoom = 1, px = 0, py = 0;
let ly = [], ai = -1, drag = false, pan = false, dragOff = {x:0,y:0};
let undoSt = [], redoSt = [];
let _editingTextLayer = null, _editingShapeLayer = null;
const FONTS = ['Arial','Georgia','Times New Roman','Courier New','Verdana','Trebuchet MS','Impact','Palatino Linotype'];

class L {
  constructor(t,o={}){
    this.id = Date.now()+Math.random(); this.t = t; this.n = o.n || t;
    this.x = o.x||0; this.y = o.y||0; this.w = o.w||80; this.h = o.h||80;
    this.r = o.r||0; this.op = o.op??1; this.v = o.v??true;
    this.sh = o.sh||'rect'; this.fl = o.fl||'#c9a84c'; this.sk = o.sk||'transparent'; this.lw = o.lw||0;
    this.tx = o.tx||'Texte'; this.fs = o.fs||36; this.ff = o.ff||'Arial';
    this.b = o.b||false; this.i = o.i||false; this.tc = o.tc||'#e8e0d0';
    this.sd = o.sd||'#000000'; this.sb = o.sb??0; this.so = o.so||'#000000'; this.sw = o.sw||0;
    this.al = o.al||'center'; this.im = o.im||null; this.imSrc = o.imSrc||null;
  }
  get cx(){return this.x+this.w/2}
  get cy(){return this.y+this.h/2}
  hit(x,y){
    if(!this.v) return false;
    const cs=Math.cos(-this.r*Math.PI/180), sn=Math.sin(-this.r*Math.PI/180);
    const rx=(x-this.cx)*cs-(y-this.cy)*sn+this.cx, ry=(x-this.cx)*sn+(y-this.cy)*cs+this.cy;
    return rx>=this.x-8 && rx<=this.x+this.w+8 && ry>=this.y-8 && ry<=this.y+this.h+8;
  }
  dr(ctx){
    if(!this.v) return;
    ctx.save(); ctx.globalAlpha = this.op;
    if(this.t!=='bg'){ ctx.translate(this.cx,this.cy); ctx.rotate(this.r*Math.PI/180); ctx.translate(-this.cx,-this.cy); }
    if((this.t==='bg'||this.t==='image')&&this.im){
      if(this.sb>0&&this.sd!=='transparent'){ ctx.shadowColor=this.sd; ctx.shadowBlur=this.sb; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0; }
      ctx.drawImage(this.im, this.x, this.y, this.w, this.h);
    } else if(this.t==='text'){
      const fs = Math.round(this.fs);
      ctx.font = (this.b?'bold ':'')+(this.i?'italic ':'')+fs+'px '+this.ff;
      ctx.textAlign = this.al; ctx.textBaseline = 'top';
      const lines = this.tx.split('\n'), lineH = fs*1.3, totalH = lines.length*lineH;
      let startY = this.y + (this.h - totalH)/2;
      lines.forEach((t,i)=>{
        const lx = this.al==='center'?this.cx:this.al==='right'?this.x+this.w:this.x;
        ctx.save();
        if(this.sb>0&&this.sd!=='transparent'){ ctx.shadowColor=this.sd; ctx.shadowBlur=this.sb; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0; }
        if(this.sw>0){ ctx.strokeStyle=this.so; ctx.lineWidth=this.sw; ctx.lineJoin='round'; ctx.strokeText(t,lx,startY+i*lineH); }
        ctx.fillStyle=this.tc; ctx.fillText(t,lx,startY+i*lineH);
        ctx.restore();
      });
    } else if(this.t==='shape'){
      ctx.fillStyle=this.fl; ctx.strokeStyle=this.sk; ctx.lineWidth=this.lw;
      if(this.sh==='rect'){ if(this.fl!=='transparent')ctx.fillRect(this.x,this.y,this.w,this.h); if(this.lw&&this.sk!=='transparent')ctx.strokeRect(this.x,this.y,this.w,this.h); }
      else if(this.sh==='circle'){ ctx.beginPath(); ctx.ellipse(this.cx,this.cy,Math.abs(this.w/2),Math.abs(this.h/2),0,0,Math.PI*2); if(this.fl!=='transparent')ctx.fill(); if(this.lw&&this.sk!=='transparent')ctx.stroke(); }
      else if(this.sh==='triangle'){ ctx.beginPath(); ctx.moveTo(this.cx,this.y); ctx.lineTo(this.x+this.w,this.y+this.h); ctx.lineTo(this.x,this.y+this.h); ctx.closePath(); if(this.fl!=='transparent')ctx.fill(); if(this.lw&&this.sk!=='transparent')ctx.stroke(); }
      else if(this.sh==='star'){ ctx.beginPath(); const outer=Math.min(this.w,this.h)/2, inner=outer*0.4; for(let i=0;i<10;i++){ const r=i%2===0?outer:inner, a=Math.PI*i/5-Math.PI/2; ctx[i===0?'moveTo':'lineTo'](this.cx+r*Math.cos(a),this.cy+r*Math.sin(a)); } ctx.closePath(); if(this.fl!=='transparent')ctx.fill(); if(this.lw&&this.sk!=='transparent')ctx.stroke(); }
      else if(this.sh==='line'){ ctx.beginPath(); ctx.moveTo(this.x,this.y); ctx.lineTo(this.x+this.w,this.y+this.h); ctx.strokeStyle=this.fl; ctx.lineWidth=Math.max(1,this.lw); ctx.stroke(); }
    }
    ctx.restore();
  }
}

function deepCloneLayers(arr){
  return arr.map(l=>{
    const plain = {...l, im:null};
    if(l.im && l.imSrc) plain.imSrc = l.imSrc;
    else if(l.im && !l.imSrc){
      try{ const tmp=document.createElement('canvas'); tmp.width=l.im.width||100; tmp.height=l.im.height||100; const tcx=tmp.getContext('2d'); tcx.drawImage(l.im,0,0); plain.imSrc=tmp.toDataURL('image/png'); }catch(e){plain.imSrc=null;}
    }
    return plain;
  });
}
function reviveLayer(o){
  const l = new L(o.t, o);
  Object.assign(l, o);
  if(o.imSrc){ const img=new Image(); img.src=o.imSrc; l.im=img; img.onload=()=>render(); }
  return l;
}

function resize(){
  const wr = document.getElementById('cw');
  W = Math.min(800, wr.clientWidth-20); H = Math.min(700, wr.clientHeight-20);
  if(W<100) W=100; if(H<100) H=100;
  fit(); render();
}
function render(){
  c.width=W; c.height=H;
  cx.fillStyle='#1a1410'; cx.fillRect(0,0,W,H);
  const sz=16; for(let y=0;y<H;y+=sz) for(let x=0;x<W;x+=sz){(x/sz+y/sz)%2?cx.fillStyle='#1f1812':cx.fillStyle='#17120e';cx.fillRect(x,y,sz,sz)}
  cx.save(); cx.translate(px,py); cx.scale(zoom,zoom);
  ly.forEach(l=>l.dr(cx));
  cx.restore();
  if(ai>=0&&ly[ai]) drawSel(ly[ai]);
  updateBadges();
}
function drawSel(l){
  cx.save(); cx.translate(px,py); cx.scale(zoom,zoom);
  cx.strokeStyle='#c9a84c'; cx.lineWidth=2/zoom; cx.setLineDash([5/zoom,3/zoom]);
  cx.strokeRect(l.x-2/zoom,l.y-2/zoom,l.w+4/zoom,l.h+4/zoom); cx.setLineDash([]);
  if(l.t!=='bg'){
    const hs=[{x:l.x,y:l.y},{x:l.cx,y:l.y},{x:l.x+l.w,y:l.y},{x:l.x+l.w,y:l.cy},{x:l.x+l.w,y:l.y+l.h},{x:l.cx,y:l.y+l.h},{x:l.x,y:l.y+l.h},{x:l.x,y:l.cy}];
    hs.forEach(h=>{cx.beginPath();cx.arc(h.x,h.y,5/zoom,0,Math.PI*2);cx.fillStyle='#c9a84c';cx.fill();cx.strokeStyle='#0d0a07';cx.lineWidth=1.2/zoom;cx.stroke();});
    cx.beginPath(); cx.moveTo(l.cx,l.y); cx.lineTo(l.cx,l.y-18/zoom); cx.strokeStyle='#c9a84c'; cx.lineWidth=2/zoom; cx.stroke();
    cx.beginPath(); cx.arc(l.cx,l.y-22/zoom,6/zoom,0,Math.PI*2); cx.fillStyle='#d4451a'; cx.fill(); cx.strokeStyle='#0d0a07'; cx.lineWidth=1.2/zoom; cx.stroke();
  }
  cx.restore();
}

function wPos(e){
  const r=c.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
  return {x:(cx-r.left-px)/zoom, y:(cy-r.top-py)/zoom};
}
let resizing=false, rotating=false, rsHdl=-1, shiftKey=false, resizeInitW=0, resizeInitH=0, resizeInitFs=0;
document.addEventListener('keydown',e=>{shiftKey=e.shiftKey});
document.addEventListener('keyup',e=>{shiftKey=e.shiftKey});

function onDown(e){
  if(e.cancelable) e.preventDefault(); const wp=wPos(e);
  if(curT==='pan'){ pan=true; const t=e.touches?e.touches[0]:e; dragOff={x:t.clientX-px,y:t.clientY-py}; return; }
  if(ai>=0&&ly[ai]&&ly[ai].t!=='bg'){
    const r=c.getBoundingClientRect(); const l=ly[ai];
    const rhx=l.cx*zoom+px+r.left, rhy=(l.y-22/zoom)*zoom+py+r.top;
    if(Math.hypot((e.touches?e.touches[0].clientX:e.clientX)-rhx,(e.touches?e.touches[0].clientY:e.clientY)-rhy)<22){ rotating=true; saveUndo(); return; }
    const hs=[{x:l.x-6/zoom,y:l.y-6/zoom,h:0},{x:l.cx,y:l.y-6/zoom,h:1},{x:l.x+l.w+6/zoom,y:l.y-6/zoom,h:2},{x:l.x+l.w+6/zoom,y:l.cy,h:3},{x:l.x+l.w+6/zoom,y:l.y+l.h+6/zoom,h:4},{x:l.cx,y:l.y+l.h+6/zoom,h:5},{x:l.x-6/zoom,y:l.y+l.h+6/zoom,h:6},{x:l.x-6/zoom,y:l.cy,h:7}];
    for(const h of hs){
      if(Math.hypot(wp.x-h.x,wp.y-h.y)<10/zoom){ resizing=true; rsHdl=h.h; saveUndo(); resizeInitW=l.w; resizeInitH=l.h; resizeInitFs=l.fs; return; }
    }
  }
  ai=-1; for(let i=ly.length-1;i>=0;i--){ if(ly[i].v&&ly[i].hit(wp.x,wp.y)){ ai=i; break; } }
  if(ai>=0&&ly[ai].t!=='bg'){ drag=true; dragOff={x:wp.x-ly[ai].x,y:wp.y-ly[ai].y}; saveUndo(); onLayerSelected(ai); render(); }
  else{ pan=true; const t=e.touches?e.touches[0]:e; dragOff={x:t.clientX-px,y:t.clientY-py}; }
}
function onMove(e){
  if(e.cancelable) e.preventDefault(); const wp=wPos(e);
  if(resizing&&ai>=0&&ly[ai]){
    const l=ly[ai]; const prevW=l.w, prevH=l.h, prevX=l.x, prevY=l.y;
    if(rsHdl===0){l.w+=l.x-wp.x;l.h+=l.y-wp.y;l.x=wp.x;l.y=wp.y;}
    else if(rsHdl===2){l.w=wp.x-l.x;l.h+=l.y-wp.y;l.y=wp.y;}
    else if(rsHdl===4){l.w=wp.x-l.x;l.h=wp.y-l.y;}
    else if(rsHdl===6){l.w+=l.x-wp.x;l.h=wp.y-l.y;l.x=wp.x;}
    else if(rsHdl===1){l.h+=l.y-wp.y;l.y=wp.y;}
    else if(rsHdl===3){l.w=wp.x-l.x;}
    else if(rsHdl===5){l.h=wp.y-l.y;}
    else if(rsHdl===7){l.w+=l.x-wp.x;l.x=wp.x;}
    if((l.t==='image'||l.t==='bg')&&!shiftKey){ const ratio=prevW/prevH; if(rsHdl===0||rsHdl===2||rsHdl===4||rsHdl===6){ if(Math.abs(l.w-prevW)>Math.abs(l.h-prevH)) l.h=l.w/ratio; else l.w=l.h*ratio; } }
    if(l.w<5){l.w=5; l.x=prevX+(prevW>0?prevW-5:0);} if(l.h<5){l.h=5; l.y=prevY+(prevH>0?prevH-5:0);}
    if(l.t==='text'&&resizeInitFs){ const sc=Math.abs(l.w-resizeInitW)>Math.abs(l.h-resizeInitH)?l.w/resizeInitW:l.h/resizeInitH; l.fs=Math.max(8,Math.round(resizeInitFs*sc)); }
    upPr(); render(); return;
  }
  if(rotating&&ai>=0&&ly[ai]){
    const l=ly[ai], r=c.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
    l.r=Math.round(Math.atan2(cy-(l.cy*zoom+py+r.top),cx-(l.cx*zoom+px+r.left))*180/Math.PI+90)%360;
    if(l.r<0)l.r+=360; upPr(); render(); return;
  }
  if(drag&&ai>=0){ ly[ai].x=wp.x-dragOff.x; ly[ai].y=wp.y-dragOff.y; upPr(); render(); return; }
  if(pan){ const t=e.touches?e.touches[0]:e; px=t.clientX-dragOff.x; py=t.clientY-dragOff.y; render(); }
}
function onUp(e){ if(e.cancelable) e.preventDefault(); drag=pan=resizing=rotating=false; rsHdl=-1; resizeInitFs=0; if(ai>=0&&ly[ai])saveProject(); }

c.addEventListener('wheel',e=>{e.preventDefault();const r=c.getBoundingClientRect();const wx=(e.clientX-r.left-px)/zoom,wy=(e.clientY-r.top-py)/zoom;zoom=Math.max(.08,Math.min(10,zoom*(e.deltaY>0?.88:1.12)));px=e.clientX-r.left-wx*zoom;py=e.clientY-r.top-wy*zoom;render();},{passive:false});

let pd=0;
c.addEventListener('touchstart',e=>{if(e.touches.length===2){pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}},{passive:true});
c.addEventListener('touchmove',e=>{if(e.touches.length===2){e.preventDefault();const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(pd>10){const r=c.getBoundingClientRect();const cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2;const wx=(cx-r.left-px)/zoom,wy=(cy-r.top-py)/zoom;zoom=Math.max(.08,Math.min(10,zoom*nd/pd));px=cx-r.left-wx*zoom;py=cy-r.top-wy*zoom;render();}pd=nd;}},{passive:false});

function addOrUpdateText(){

  } catch(e){ console.error('addOrUpdateText ERROR:',e); }
}

function upLy(){
  const el=document.getElementById('lyList'); el.innerHTML='';
  if(!ly.length){el.innerHTML='<div class="empty"><div class="bi">🎨</div>Aucun calque</div>';return;}
  [...ly].reverse().forEach((l,i)=>{
    const ri=ly.length-1-i; const d=document.createElement('div'); d.className='ly'+(ri===ai?' act':'');
    d.innerHTML=`<span class="le">${l.v?'👁':'🚫'}</span><span style="width:18px;text-align:center">${l.t==='text'?'T':l.t==='shape'?'◇':l.t==='image'?'🏞':'🖼'}</span><span class="ln">${l.n||l.t}</span><span class="lup">▲</span><span class="ldn">▼</span>`;
    d.querySelector('.le').onclick=e=>{e.stopPropagation();l.v=!l.v;render();upLy();saveProject();};
    d.querySelector('.lup').onclick=e=>{e.stopPropagation();if(ri<ly.length-1){saveUndo();[ly[ri],ly[ri+1]]=[ly[ri+1],ly[ri]];ai=ri+1;render();upLy();upPr();saveProject();}};
    d.querySelector('.ldn').onclick=e=>{e.stopPropagation();if(ri>0){saveUndo();[ly[ri],ly[ri-1]]=[ly[ri-1],ly[ri]];ai=ri-1;render();upLy();upPr();saveProject();}};
    d.onclick=()=>{ai=ri;onLayerSelected(ri);upLy();render();};
    el.appendChild(d);
  });

  else if(ly[idx].t==='shape'){fillShapeSheet(ly[idx]);_editingShapeLayer=idx;updateShapeBtn();opSh('shpSh');}

function upPr(){

  h+=`<div class="r"><span class="lb">Ombre</span><input type="color" id="pSd" value="${l.sd||'#000000'}" style="flex:none"><span class="lb">Flou</span><input type="range" id="pSb" min="0" max="30" value="${l.sb||0}"><span class="vl" id="pSbV">${l.sb||0}</span></div>`;

  document.getElementById('pH').oninput=function(){l.h=Math.max(5,+this.value);render();};
  document.getElementById('pR').oninput=function(){l.r=+this.value;this.nextElementSibling.textContent=l.r+'°';render();};
  document.getElementById('pO').oninput=function(){l.op=+this.value/100;this.nextElementSibling.textContent=this.value+'%';render();};
  document.getElementById('pSd').oninput=function(){l.sd=this.value;render();};
  document.getElementById('pSb').oninput=function(){l.sb=+this.value;document.getElementById('pSbV').textContent=this.value;render();};
}

function saveUndo(){undoSt.push(deepCloneLayers(ly));if(undoSt.length>40)undoSt.shift();redoSt=[];}
function undo(){if(undoSt.length){redoSt.push(deepCloneLayers(ly));ly=undoSt.pop().map(reviveLayer);if(ai>=ly.length)ai=ly.length-1;render();upLy();upPr();saveProject();}}
function redo(){if(redoSt.length){undoSt.push(deepCloneLayers(ly));ly=redoSt.pop().map(reviveLayer);if(ai>=ly.length)ai=ly.length-1;render();upLy();upPr();saveProject();}}
const STORAGE_KEY='pixellapp_project';
function saveProject(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({layers:deepCloneLayers(ly),W,H,ai}))}catch(e){}
}
function loadProject(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    if(d.layers&&d.layers.length){ly=d.layers.map(reviveLayer);W=d.W||W;H=d.H||H;ai=d.ai>=0&&d.ai<ly.length?d.ai:-1;return true;}
  }catch(e){}
  return false;
}

function showExport(){document.getElementById('eDim').textContent=W+'×'+H;opSh('expSh');}
document.getElementById('eQ').addEventListener('input',function(){document.getElementById('eQV').textContent=this.value+'%';});
function doExp(){
  const fmt=document.getElementById('eFmt').value,q=+document.getElementById('eQ').value/100;
  const ec=document.createElement('canvas');ec.width=W;ec.height=H;const ecx=ec.getContext('2d');
  if(fmt==='png'||fmt==='webp')ecx.clearRect(0,0,W,H);else{ecx.fillStyle='#1a1410';ecx.fillRect(0,0,W,H);}
  ly.forEach(l=>{if(l.v)l.dr(ecx);});
  const a=document.createElement('a');a.download='pixellapp.'+fmt;a.href=ec.toDataURL('image/'+fmt,q);a.click();clSh('expSh');
}

document.addEventListener('keydown',e=>{
  if(e.target.closest('input,textarea,select'))return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&e.key==='y'){e.preventDefault();redo();}
  if(e.key==='Delete'||e.key==='Backspace'){if(ai>=0&&ly[ai]&&ly[ai].t!=='bg')delLayer();e.preventDefault();}
  if(e.key==='Escape'){ai=-1;upPr();render();closeAllSheets();}
});

let barPos='bottom', barDrag=false, barOff={x:0,y:0};
const grip=document.querySelector('.br .grip');
function setBarPos(pos){
  barPos=pos; const bar=document.getElementById('bar'), zb=document.getElementById('zBadge');
  bar.style.top=''; bar.style.bottom=''; bar.style.left=''; bar.style.right=''; bar.style.width=''; bar.style.flexDirection=''; bar.classList.toggle('v',pos==='left'||pos==='right');
  document.getElementById('cw').style.paddingTop=''; document.getElementById('cw').style.paddingBottom=''; document.getElementById('cw').style.paddingLeft=''; document.getElementById('cw').style.paddingRight='';
  zb.style.bottom='';
  if(pos==='bottom'){bar.style.bottom='0';bar.style.left='0';bar.style.right='0';document.getElementById('cw').style.paddingBottom='var(--bar-h)';zb.style.bottom='calc(var(--bar-h) + 10px)';}
  else if(pos==='top'){bar.style.top='var(--top-h)';bar.style.left='0';bar.style.right='0';document.getElementById('cw').style.paddingTop='var(--bar-h)';zb.style.bottom='10px';}
  else if(pos==='left'){bar.style.top='var(--top-h)';bar.style.left='0';bar.style.bottom='0';bar.style.width='var(--bar-h)';document.getElementById('cw').style.paddingLeft='var(--bar-h)';zb.style.bottom='10px';}
  else if(pos==='right'){bar.style.top='var(--top-h)';bar.style.right='0';bar.style.bottom='0';bar.style.width='var(--bar-h)';document.getElementById('cw').style.paddingRight='var(--bar-h)';zb.style.bottom='10px';}
}
grip.addEventListener('mousedown',e=>{e.stopPropagation();barDrag=true;barOff={x:e.clientX,y:e.clientY};document.getElementById('bar').classList.add('dragging');});
grip.addEventListener('touchstart',e=>{if(e.touches.length===1){e.stopPropagation();barDrag=true;barOff={x:e.touches[0].clientX,y:e.touches[0].clientY};document.getElementById('bar').classList.add('dragging');}},{passive:true});
document.addEventListener('mousemove',e=>{if(!barDrag)return;barOff={x:e.clientX,y:e.clientY};});
document.addEventListener('touchmove',e=>{if(!barDrag||e.touches.length!==1)return;barOff={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
document.addEventListener('mouseup',()=>{if(!barDrag)return;barDrag=false;document.getElementById('bar').classList.remove('dragging');const vh=window.innerHeight,vw=window.innerWidth,ry=barOff.y/vh,rx=barOff.x/vw;setBarPos(ry<.25?'top':ry>.7?'bottom':rx<.33?'left':rx>.66?'right':'bottom');});
document.addEventListener('touchend',()=>{if(!barDrag)return;barDrag=false;document.getElementById('bar').classList.remove('dragging');const vh=window.innerHeight,vw=window.innerWidth,ry=barOff.y/vh,rx=barOff.x/vw;setBarPos(ry<.25?'top':ry>.7?'bottom':rx<.33?'left':rx>.66?'right':'bottom');});

window.addEventListener('resize',()=>{resize();saveProject()});
if(!loadProject()) setTimeout(resize,60);
render();
</script>
</body>
</html>
