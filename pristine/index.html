<!DOCTYPE html><html lang="en">
<head>

<link rel="manifest" href='data:application/json,{"name":"Pristine","short_name":"Pristine","start_url":".","display":"standalone","background_color":"#0a0a0f","theme_color":"#0a0a0f","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ccircle cx=%2750%27 cy=%2750%27 r=%2745%27 fill=%27%237c6aff%27/%3E%3Ctext x=%2750%27 y=%2768%27 font-size=%2750%27 text-anchor=%27middle%27 fill=%27white%27%3EP%3C/text%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"}]}'>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--border:#2a2a3a;--accent:#7c6aff;--accent2:#ff6a9b;--text:#f0eff8;--muted:#7a7a9a;--gold:#ffcc55;--radius:16px;--radius-sm:10px;--green:#44d46a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60%50% at 20%20%,rgba(124,106,255,0.1)0%,transparent 70%),radial-gradient(ellipse 50%60% at 80%80%,rgba(255,106,155,0.08)0%,transparent 70%)}
header{position:relative;z-index:10;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.badge{font-size:.6rem;font-weight:700;background:var(--surface2);color:var(--muted);padding:3px 10px;border-radius:20px;border:1px solid var(--border)}
.container{position:relative;z-index:10;max-width:800px;margin:0 auto;padding:0 16px 32px}
.tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--surface);border-radius:var(--radius);padding:3px;border:1px solid var(--border)}
.tab{flex:1;text-align:center;padding:7px 2px;border-radius:var(--radius-sm);font-size:.75rem;font-weight:500;cursor:pointer;color:var(--muted);transition:all .2s}
.tab .ti{display:block;font-size:1.1rem;margin-bottom:1px}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:36px 16px;text-align:center;cursor:pointer;background:var(--surface);transition:all .3s}
.upload-zone.dragover,.upload-zone:hover{border-color:var(--accent);background:rgba(124,106,255,.04)}
.upload-zone .ic{font-size:2.2rem;margin-bottom:8px}
.upload-zone p{color:var(--muted);font-size:.85rem}
.upload-zone .btn{display:inline-block;margin-top:8px;padding:8px 22px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:40px;color:#fff;font-weight:600;font-size:.85rem;cursor:pointer}
.upload-zone input[type=file]{display:none}
.editor{display:none}
.canvas-wrap{position:relative;width:100%;background:#000;border-radius:var(--radius);overflow:hidden;min-height:240px}
.canvas-wrap canvas{display:block;width:100%;max-height:55vh;touch-action:none;background:#111}
.toolbar{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);margin-bottom:10px}
.toolbar .g{display:flex;align-items:center;gap:4px}
.toolbar label{font-size:.7rem;color:var(--muted);white-space:nowrap}
.toolbar input[type=range]{width:64px;accent-color:var(--accent);height:4px}
.tool-btn{padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:.72rem;cursor:pointer;white-space:nowrap;transition:all .15s}
.tool-btn:hover{border-color:var(--accent)}
.tool-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff}
.tool-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;font-weight:700}
.tool-btn.primary:disabled{opacity:.4;cursor:default}
.tool-btn.green{background:var(--green);border-color:transparent;color:#000;font-weight:600}
.spr{width:1px;height:18px;background:var(--border);margin:0 3px}
.result-area{display:none;margin-top:10px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.result-area img{display:block;width:100%;max-height:60vh;object-fit:contain;background:repeating-conic-gradient(#1a1a2e 0%25%,#13131a 0%50%) 0 0/20px 20px}
.result-actions{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--border)}
.result-actions .tool-btn{flex:1;text-align:center}
.loading{display:none;position:absolute;inset:0;z-index:20;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);border-radius:var(--radius)}
.loading.show{display:flex}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading p{margin-top:10px;font-size:.8rem;color:var(--text)}
.loading .h{font-size:.65rem;color:var(--muted);margin-top:4px}
.enhance-sliders{display:none;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm)}
.enhance-sliders .row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.enhance-sliders .row:last-child{margin-bottom:0}
.enhance-sliders label{font-size:.75rem;color:var(--muted);min-width:70px}
.enhance-sliders input{flex:1;accent-color:var(--accent);height:4px}
.enhance-sliders .val{font-size:.7rem;color:var(--text);min-width:28px;text-align:right}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);padding:8px 18px;border-radius:var(--radius-sm);font-size:.8rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center}
.toast.show{opacity:1}
.error{color:var(--accent2);font-size:.8rem;margin:6px 0;display:none;text-align:center}
.bg-picker{display:none;text-align:center;padding:8px;font-size:.8rem;color:var(--muted)}
.bg-picker canvas{display:inline-block;width:100%;max-height:200px;border-radius:var(--radius-sm);cursor:crosshair;margin-top:6px}
@media(max-width:500px){
  .tabs .tab{font-size:.65rem;padding:5px 0}
  .tabs .tab .ti{font-size:1rem}
}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<header>
  <div class="logo">Pristine ✦</div>
  <span class="badge" id="badge">No account needed</span>
</header>
<div class="container">
  <div class="tabs" id="tabs">
    <div class="tab active" data-t="remove"><span class="ti">🧹</span>Remove</div>
    <div class="tab" data-t="bg"><span class="ti">🖼️</span>BG</div>
    <div class="tab" data-t="enhance"><span class="ti">✨</span>Enhance</div>
  </div>

  <div class="upload-zone" id="uz">
    <div class="ic" id="uzIcon">📸</div>
    <p id="uzText">Tap to choose a photo or drag & drop</p>
    <button class="btn" id="uzBtn">Choose Photo</button>
    <input type="file" id="uzFile" accept="image/*">
  </div>

  <div class="editor" id="editor">
    <div class="canvas-wrap" id="cw">
      <canvas id="c"></canvas>
      <div class="loading" id="loading">
        <div class="spin"></div>
        <p id="lt">Processing...</p>
        <p class="h" id="lh"></p>
      </div>
    </div>
    <div id="tbRemove" class="toolbar">
      <div class="g">
        <button class="tool-btn active" id="dMode">✏️</button>
        <button class="tool-btn" id="eMode">🧹</button>
      </div>
      <div class="spr"></div>
      <div class="g">
        <label>Size</label>
        <input type="range" id="bSize" min="5" max="80" value="25">
      </div>
      <div class="spr"></div>
      <div class="g">
        <button class="tool-btn" id="uBtn">↩</button>
        <button class="tool-btn" id="rBtn">✕</button>
      </div>
      <button class="tool-btn primary" id="pBtn">🧹 Remove</button>
    </div>
    <div id="tbBg" class="toolbar" style="display:none">
      <button class="tool-btn green" id="bgBtn">🖼️ Auto Remove BG</button>
      <span style="font-size:.65rem;color:var(--muted);margin-left:4px">Tap background to refine</span>
    </div>
    <div id="tbEnhance" class="toolbar" style="display:none">
      <button class="tool-btn primary" id="enhBtn">✨ Apply</button>
      <span style="font-size:.65rem;color:var(--muted);margin-left:4px">Adjust sliders → Apply</span>
    </div>
    <div class="error" id="err"></div>
  </div>

  <div class="enhance-sliders" id="enhSliders">
    <div class="row"><label>Brightness</label><input type="range" id="bright" min="-50" max="50" value="0"><span class="val" id="brightV">0</span></div>
    <div class="row"><label>Contrast</label><input type="range" id="contrast" min="-50" max="50" value="0"><span class="val" id="contrastV">0</span></div>
    <div class="row"><label>Saturation</label><input type="range" id="saturate" min="-50" max="50" value="0"><span class="val" id="saturateV">0</span></div>
    <div class="row"><label>Sharpen</label><input type="range" id="sharpen" min="0" max="100" value="0"><span class="val" id="sharpenV">0</span></div>
  </div>

  <div class="result-area" id="res">
    <img id="resImg" alt="Result">
    <div class="result-actions">
      <button class="tool-btn" id="dlBtn">⬇ Download</button>
      <button class="tool-btn" id="retryBtn">↻ Retry</button>
      <button class="tool-btn" id="newBtn">🖼 New</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
// === State ===
const $=i=>document.getElementById(i),S=(s,...a)=>document.querySelector(s,...a),A=(s,l)=>document.querySelectorAll(s).forEach(l)
let img=null,imgD=null,mC=null,mCtx=null,isD=false,hist=[],cStep=-1,bMode='draw',processing=false
let origPixels=null,brightV=0,contrastV=0,saturateV=0,sharpenV=0

// === DOM ===
const uz=$('uz'),uzF=$('uzFile'),uzB=$('uzBtn')
const ed=$('editor'),cv=$('c'),cx=cv.getContext('2d')
const ld=$('loading'),lt=$('lt'),lh=$('lh')
const re=$('res'),ri=$('resImg')
const pB=$('pBtn'),bgB=$('bgBtn'),enhB=$('enhBtn')
const dM=$('dMode'),eM=$('eMode'),bS=$('bSize')
const uB=$('uBtn'),rB=$('rBtn')
const dlB=$('dlBtn'),rtB=$('retryBtn'),nB=$('newBtn')
const err=$('err'),ts=$('toast')
const tR=$('tbRemove'),tB=$('tbBg'),tE=$('tbEnhance')
const eS=$('enhSliders')

function st(m){ts.textContent=m;ts.classList.add('show');setTimeout(()=>ts.classList.remove('show'),2500)}
function se(m){err.textContent=m;err.style.display='block'}
function he(){err.style.display='none'}

A('.tab',t=>t.onclick=()=>{
  A('.tab',x=>x.classList.remove('active'))
  t.classList.add('active')
  const tab=t.dataset.t
  tR.style.display=tab==='remove'?'flex':'none'
  tB.style.display=tab==='bg'?'flex':'none'
  tE.style.display=tab==='enhance'?'flex':'none'
  eS.style.display=tab==='enhance'?'block':'none'
  re.style.display='none';he()
})

// === Upload ===
uzB.onclick=()=>uzF.click()
uz.onclick=()=>uzF.click()
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('dragover')})
uz.addEventListener('dragleave',()=>uz.classList.remove('dragover'))
uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('dragover');if(e.dataTransfer.files.length)loadI(e.dataTransfer.files[0])})
uzF.onchange=()=>{if(uzF.files.length)loadI(uzF.files[0])}

function loadI(f){
  if(!f.type.startsWith('image/')){se('Not an image');return}
  he()
  const r=new FileReader()
  r.onload=e=>{
    const i=new Image()
    i.onload=()=>{
      img=i;const mW=1024;let w=i.width,h=i.height
      if(w>mW){h=h*mW/w;w=mW}
      cv.width=w;cv.height=h
      cx.drawImage(i,0,0,w,h)
      imgD=cx.getImageData(0,0,w,h)
      origPixels=new Uint8ClampedArray(imgD.data)
      brightV=0;contrastV=0;saturateV=0;sharpenV=0
      S('#bright').value=0;S('#contrast').value=0;S('#saturate').value=0;S('#sharpen').value=0
      S('#brightV').textContent='0';S('#contrastV').textContent='0';S('#saturateV').textContent='0';S('#sharpenV').textContent='0'
      initM()
      rC()
      uz.style.display='none'
      ed.style.display='block'
      processing=false
    }
    i.src=e.target.result
  }
  r.readAsDataURL(f)
}

// === Mask ===
function initM(){
  mC=document.createElement('canvas');mC.width=cv.width;mC.height=cv.height
  mCtx=mC.getContext('2d');mCtx.fillStyle='#000';mCtx.fillRect(0,0,mC.width,mC.height)
  hist=[];cStep=-1;sv()}
function sv(){
  const d=mCtx.getImageData(0,0,mC.width,mC.height)
  cStep++;hist[cStep]=d;hist.length=cStep+1}
function un(){if(cStep<=0)return;cStep--;mCtx.putImageData(hist[cStep],0,0);rC()}
function clM(){if(!mCtx)return;mCtx.fillStyle='#000';mCtx.fillRect(0,0,mC.width,mC.height);sv();rC()}
function rC(){
  if(!imgD||!mC)return
  const id=new ImageData(new Uint8ClampedArray(imgD.data),imgD.width,imgD.height),d=id.data
  const md=mCtx.getImageData(0,0,mC.width,mC.height).data
  for(let i=0;i<d.length;i+=4){
    if(md[i]>128){d[i]=d[i]*.3+255*.7;d[i+1]=d[i+1]*.3+100*.7;d[i+2]=d[i+2]*.3+100*.7}}
  const tc=document.createElement('canvas');tc.width=cv.width;tc.height=cv.height
  tc.getContext('2d').putImageData(id,0,0);cx.drawImage(tc,0,0)}
function cp(e){
  const r=cv.getBoundingClientRect(),sx=cv.width/r.width,sy=cv.height/r.height
  const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy}}
function sD(e){e.preventDefault();if(!mCtx||processing)return;isD=true
  const p=cp(e);mCtx.beginPath();mCtx.moveTo(p.x,p.y)
  mCtx.lineCap='round';mCtx.lineJoin='round'
  const s=parseInt(bS.value)
  mCtx.strokeStyle=bMode==='draw'?'#fff':'#000'
  mCtx.fillStyle=bMode==='draw'?'#fff':'#000'
  mCtx.lineWidth=s;mCtx.arc(p.x,p.y,s/2,0,Math.PI*2);mCtx.fill()}
function mD(e){e.preventDefault();if(!isD||!mCtx||processing)return
  const p=cp(e);mCtx.lineWidth=parseInt(bS.value)
  mCtx.lineTo(p.x,p.y);mCtx.stroke();rC()}
function eD(e){e.preventDefault();if(!isD)return;isD=false;sv()}

cv.addEventListener('mousedown',sD);cv.addEventListener('mousemove',mD)
cv.addEventListener('mouseup',eD);cv.addEventListener('mouseleave',eD)
cv.addEventListener('touchstart',sD,{passive:false});cv.addEventListener('touchmove',mD,{passive:false})
cv.addEventListener('touchend',eD,{passive:false})
dM.onclick=()=>{bMode='draw';dM.classList.add('active');eM.classList.remove('active')}
eM.onclick=()=>{bMode='erase';eM.classList.add('active');dM.classList.remove('active')}
uB.onclick=un;rB.onclick=clM

// === Object Removal (improved Telea) ===
pB.onclick=()=>{
  he()
  const md=mCtx?.getImageData(0,0,mC.width,mC.height)
  if(!md||!md.data.some((v,i)=>!(i%4)&&v>128)){se('Draw on the object first');return}
  processing=true;pB.disabled=true
  ld.classList.add('show');lt.textContent='Removing...';lh.textContent=''
  const w=cv.width,h=cv.height,d=new Uint8ClampedArray(imgD.data)
  const fill=new Uint8Array(w*h);for(let i=0;i<w*h;i++)fill[i]=md.data[i*4]>128?1:0
  const total=fill.reduce((s,v)=>s+v,0)
  let prevRemaining=total

  function pass(){
    let changed=false
    for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
      const i=y*w+x
      if(!fill[i])continue
      let border=false
      for(let dy=-1;dy<=1&&!border;dy++)for(let dx=-1;dx<=1&&!border;dx++)
        if(dx||dy)if(!fill[(y+dy)*w+(x+dx)])border=true
      if(!border)continue
      let tr=0,tg=0,tb=0,n=0
      for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++){
        if(!dx&&!dy)continue
        const ni=(y+dy)*w+(x+dx)
        if(ni<0||ni>=w*h||fill[ni])continue
        const wt=1/(Math.sqrt(dx*dx+dy*dy)+.3),pi=ni*4
        tr+=d[pi]*wt;tg+=d[pi+1]*wt;tb+=d[pi+2]*wt;n+=wt}
      if(n>0){const pi=i*4;d[pi]=tr/n;d[pi+1]=tg/n;d[pi+2]=tb/n;fill[i]=0;changed=true}
    }
    const remaining=fill.reduce((s,v)=>s+v,0)
    const pct=total>0?Math.round((1-remaining/total)*100):100
    lt.textContent='Removing... '+pct+'%'
    if(remaining&&changed&&remaining!==prevRemaining){prevRemaining=remaining;requestAnimationFrame(pass)}
    else{
      const o=new ImageData(d,w,h);const tc=document.createElement('canvas')
      tc.width=w;tc.height=h;tc.getContext('2d').putImageData(o,0,0)
      ri.src=tc.toDataURL();re.style.display='block'
      ld.classList.remove('show');processing=false;pB.disabled=false
      st('✅ Object removed')}
  }
  requestAnimationFrame(pass)
}

// === Background Removal (simple click-based) ===
bgB.onclick=()=>{
  he();processing=true;bgB.disabled=true
  ld.classList.add('show');lt.textContent='Click/ tap on background...'
  lh.textContent='Tap the background area in the image'
  // Show image without mask for selection
  cx.putImageData(imgD,0,0)
  const tempCvs=document.createElement('canvas')
  tempCvs.width=cv.width;tempCvs.height=cv.height
  const tCtx=tempCvs.getContext('2d')
  tCtx.drawImage(cv,0,0)
  const handleClick=async(e)=>{
    const r=cv.getBoundingClientRect(),sx=cv.width/r.width,sy=cv.height/r.height
    const t=e.touches?e.touches[0]:e
    const px=Math.round((t.clientX-r.left)*sx),py=Math.round((t.clientY-r.top)*sy)
    if(px<0||px>=cv.width||py<0||py>=cv.height)return
    cv.removeEventListener('click',handleClick);cv.removeEventListener('touchstart',handleTouch)
    ld.classList.add('show');lt.textContent='Removing background...';lh.textContent=''
    await new Promise(r=>setTimeout(r,50))
    const sd=tCtx.getImageData(0,0,cv.width,cv.height)
    const pd=sd.data,ow=cv.width
    const tx=px,ty=py,ti=(ty*ow+tx)*4
    const tr=pd[ti],tg=pd[ti+1],tb=pd[ti+2]
    const thr=40
    const vis=new Uint8Array(cv.width*cv.height)
    const stack=[[tx,ty]]
    while(stack.length){
      const [cx2,cy2]=stack.pop()
      const idx2=cy2*ow+cx2
      if(vis[idx2])continue;vis[idx2]=1
      for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
        if(!dx&&!dy)continue
        const nx=cx2+dx,ny=cy2+dy
        if(nx<0||nx>=ow||ny<0||ny>=cv.height)continue
        const ni=(ny*ow+nx)*4
        const dr=Math.abs(pd[ni]-tr),dg=Math.abs(pd[ni+1]-tg),db=Math.abs(pd[ni+2]-tb)
        if(dr+dg+db<thr*3&&!vis[ny*ow+nx])stack.push([nx,ny])}
    }
    // Make selected area transparent
    const outD=tCtx.getImageData(0,0,cv.width,cv.height)
    for(let i=0;i<cv.width*cv.height;i++)if(vis[i])outD.data[i*4+3]=0
    const tc=document.createElement('canvas');tc.width=cv.width;tc.height=cv.height
    tc.getContext('2d').putImageData(outD,0,0)
    ri.src=tc.toDataURL()
    re.style.display='block'
    ld.classList.remove('show');processing=false;bgB.disabled=false
    cv.removeEventListener('click',handleClick);cv.removeEventListener('touchstart',handleTouch)
    st('✅ Background removed')
  }
  const handleTouch=e=>{e.preventDefault();handleClick(e)}
  setTimeout(()=>{
    cv.addEventListener('click',handleClick)
    cv.addEventListener('touchstart',handleTouch,{passive:false})
    ld.classList.remove('show')
    st('👆 Tap on the background area')
  },100)
}

// === Enhance ===
S('#bright').oninput=function(){brightV=+this.value;S('#brightV').textContent=this.value}
S('#contrast').oninput=function(){contrastV=+this.value;S('#contrastV').textContent=this.value}
S('#saturate').oninput=function(){saturateV=+this.value;S('#saturateV').textContent=this.value}

enhB.onclick=()=>{
  he();if(!origPixels){se('No image loaded');return}
  processing=true;enhB.disabled=true
  ld.classList.add('show');lt.textContent='Enhancing...'
  setTimeout(()=>{
    const w=cv.width,h=cv.height,d=new Uint8ClampedArray(origPixels)
    const out=new ImageData(new Uint8ClampedArray(origPixels),w,h)
    const od=out.data
    // Brightness
    if(brightV){const b=brightV/100*255;for(let i=0;i<od.length;i+=4){od[i]=Math.max(0,Math.min(255,od[i]+b));od[i+1]=Math.max(0,Math.min(255,od[i+1]+b));od[i+2]=Math.max(0,Math.min(255,od[i+2]+b))}}
    // Contrast
    if(contrastV){const f=(259*(contrastV*2.55+255))/(255*(259-contrastV*2.55));for(let i=0;i<od.length;i+=4){od[i]=Math.max(0,Math.min(255,f*(od[i]-128)+128));od[i+1]=Math.max(0,Math.min(255,f*(od[i+1]-128)+128));od[i+2]=Math.max(0,Math.min(255,f*(od[i+2]-128)+128))}}
    // Saturation
    if(saturateV){const s=saturateV/100;for(let i=0;i<od.length;i+=4){const gs=.299*od[i]+.587*od[i+1]+.114*od[i+2];od[i]=Math.max(0,Math.min(255,gs+(od[i]-gs)*s));od[i+1]=Math.max(0,Math.min(255,gs+(od[i+1]-gs)*s));od[i+2]=Math.max(0,Math.min(255,gs+(od[i+2]-gs)*s))}}
    // Sharpen (kernel)
    if(sharpenV>5){
      const src=new Uint8ClampedArray(origPixels)
      const amt=sharpenV/100
      const k=[0,-1,0,-1,5+1/amt,-1,0,-1,0]
      for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
        let r=0,g=0,b2=0
        for(let ky=-1;ky<=1;ky++)for(let kx=-1;kx<=1;kx++){
          const pi=((y+ky)*w+(x+kx))*4
          r+=src[pi]*k[(ky+1)*3+(kx+1)];g+=src[pi+1]*k[(ky+1)*3+(kx+1)];b2+=src[pi+2]*k[(ky+1)*3+(kx+1)]}
        const pi=(y*w+x)*4
        od[pi]=Math.max(0,Math.min(255,r));od[pi+1]=Math.max(0,Math.min(255,g));od[pi+2]=Math.max(0,Math.min(255,b2))}
    }
    const tc=document.createElement('canvas');tc.width=w;tc.height=h
    tc.getContext('2d').putImageData(out,0,0)
    ri.src=tc.toDataURL()
    re.style.display='block'
    ld.classList.remove('show');processing=false;enhB.disabled=false
    st('✅ Enhanced')
  },50)
}
