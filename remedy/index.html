<!DOCTYPE html><html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Remèdes de Grand-Mère — Herboristerie Maison</title>
    <style>
        :root {
            --bg: #fcfbf7;
            --white: #ffffff;
            --sage: #708238;
            --sage-light: #8a9a86;
            --sage-pale: #e8efe4;
            --sage-bg: #f4f7f1;
            --text: #3e3e3b;
            --text-light: #6b6b66;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 8px 28px rgba(0, 0, 0, 0.10);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-heading: 'Georgia', 'Times New Roman', serif;
            --font-body: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }


        /* Header */
        .header {
            background: linear-gradient(170deg, #e8efe4 0%, #f4f7f1 40%, #fcfbf7 100%);
            text-align: center;
            padding: 3rem 1.5rem 2.5rem;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -60px;
            left: -60px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(112, 130, 56, 0.10) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: -40px;
            right: -40px;
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(138, 154, 134, 0.10) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .header-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.5rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        .header h1 {
            font-family: var(--font-heading);
            font-size: 2.4rem;
            color: #4a5732;
            margin-bottom: 0.4rem;
            letter-spacing: -0.3px;
            position: relative;
            z-index: 1;
        }
        .header .subtitle {
            font-size: 1.05rem;
            color: var(--text-light);
            font-style: italic;
            position: relative;
            z-index: 1;
        }
        .header .leaf-decor {
            display: inline-block;
            font-size: 1.3rem;
            margin: 0 6px;
            opacity: 0.6;
        }


        /* Conteneur principal */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }


        /* Barre de recherche */
        .search-wrapper {
            display: flex;
            justify-content: center;
            margin: -1.2rem auto 1.8rem;
            position: relative;
            z-index: 10;
            max-width: 600px;
        }
        .search-input {
            width: 100%;
            padding: 1rem 1.4rem 1rem 3rem;
            border: 2px solid #e0dcd2;
            border-radius: 50px;
            font-size: 1rem;
            font-family: var(--font-body);
            background: var(--white);
            color: var(--text);
            box-shadow: var(--shadow);
            transition: var(--transition);
            outline: none;
        }
        .search-input:focus {
            border-color: var(--sage);
            box-shadow: 0 0 0 4px rgba(112, 130, 56, 0.08), var(--shadow);
        }
        .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            pointer-events: none;
            opacity: 0.5;
        }
        .search-clear {
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            opacity: 0.5;
            transition: var(--transition);
            padding: 4px 8px;
            border-radius: 50%;
            display: none;
        }
        .search-clear:hover {
            opacity: 1;
            background: #f0ece2;
        }
        .search-clear.visible {
            display: block;
        }


        /* Filtres catégories */
        .categories {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.55rem;
            margin-bottom: 2.2rem;
        }
        .cat-btn {
            padding: 0.55rem 1rem;
            border-radius: 50px;
            border: 1.5px solid #dcd7c9;
            background: var(--white);
            cursor: pointer;
            font-size: 0.85rem;
            font-family: var(--font-body);
            color: var(--text-light);
            transition: var(--transition);
            white-space: nowrap;
            letter-spacing: 0.2px;
            font-weight: 500;
        }
        .cat-btn:hover {
            border-color: var(--sage-light);
            color: var(--sage);
            background: #fafff6;
        }
        .cat-btn.active {
            background: var(--sage);
            color: #fff;
            border-color: var(--sage);
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(112, 130, 56, 0.25);
        }
        .cat-btn .cat-emoji {
            margin-right: 4px;
        }


        /* Compteur */
        .counter {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 1.5rem;
            font-style: italic;
        }
        .counter strong {
            color: var(--sage);
            font-weight: 700;
        }


        /* Grille */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
        }
        @media (max-width: 700px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 0.9rem;
            }
            .header h1 {
                font-size: 1.7rem;
            }
            .header {
                padding: 2rem 1rem 1.8rem;
            }
            .cat-btn {
                font-size: 0.78rem;
                padding: 0.45rem 0.8rem;
            }
        }


        /* Carte */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 1.5rem 1.3rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            border: 1.5px solid transparent;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .card:hover {
            box-shadow: var(--shadow-hover);
            border-color: #dce8d3;
            transform: translateY(-3px);
        }
        .card .card-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--sage);
            background: var(--sage-pale);
            padding: 3px 10px;
            border-radius: 50px;
            width: fit-content;
        }
        .card .card-title {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            color: #3e4632;
            margin: 0;
            line-height: 1.3;
        }
        .card .card-remede {
            font-size: 0.9rem;
            color: var(--sage-light);
            font-weight: 600;
        }
        .card .card-ingredients {
            font-size: 0.82rem;
            color: var(--text-light);
            line-height: 1.5;
        }
        .card .card-ingredients span {
            background: #faf8f2;
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
            margin: 2px 3px 2px 0;
            font-size: 0.78rem;
            border: 1px solid #efe9d9;
        }
        .card .card-arrow {
            position: absolute;
            bottom: 12px;
            right: 16px;
            font-size: 1.2rem;
            opacity: 0.35;
            transition: var(--transition);
        }
        .card:hover .card-arrow {
            opacity: 0.7;
            right: 12px;
        }


        /* Modale */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 28, 22, 0.55);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 1rem;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal {
            background: var(--white);
            border-radius: var(--radius);
            padding: 2rem 1.8rem;
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: #f5f2e9;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5a5a55;
            z-index: 5;
        }
        .modal-close:hover {
            background: #e8e0d0;
            color: #2a2a25;
        }
        .modal .modal-badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--sage);
            background: var(--sage-pale);
            padding: 4px 12px;
            border-radius: 50px;
            margin-bottom: 0.6rem;
        }
        .modal h2 {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            color: #3e4632;
            margin-bottom: 0.3rem;
        }
        .modal .modal-remede-name {
            font-size: 1.1rem;
            color: var(--sage-light);
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .modal h4 {
            font-family: var(--font-heading);
            font-size: 1rem;
            color: #4a5732;
            margin: 1.2rem 0 0.4rem;
            border-bottom: 1.5px dotted #e0dcd2;
            padding-bottom: 0.3rem;
        }
        .modal ul {
            list-style: none;
            padding-left: 0;
        }
        .modal ul li {
            padding: 0.35rem 0;
            font-size: 0.92rem;
            color: var(--text);
            position: relative;
            padding-left: 1.4rem;
        }
        .modal ul li::before {
            content: '🌱';
            position: absolute;
            left: 0;
            top: 0.35rem;
            font-size: 0.75rem;
        }
        .modal .warning-box {
            background: #fffdf5;
            border-left: 4px solid #e0c36a;
            padding: 0.8rem 1rem;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            margin-top: 1.2rem;
            font-size: 0.85rem;
            color: #7a6e40;
            font-style: italic;
        }
        .modal .contre-indications {
            background: #fef5f5;
            border-left: 4px solid #c97a7a;
            padding: 0.7rem 1rem;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            margin-top: 0.7rem;
            font-size: 0.84rem;
            color: #6b3a3a;
        }


        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 1rem;
            font-size: 0.8rem;
            color: #b0aca0;
            border-top: 1px solid #e8e4d8;
            margin-top: 2rem;
        }
        .footer span {
            color: var(--sage-light);
        }


        /* Aucun résultat */
        .no-result {
            text-align: center;
            padding: 3rem 1rem;
            color: #b0aca0;
            grid-column: 1 / -1;
        }
        .no-result .no-result-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.8rem;
        }
    </style>
</head>
<body>


    <!-- Header -->
    <header class="header">
        <span class="header-icon">🌿</span>
        <h1>Remèdes de Grand-Mère</h1>
        <p class="subtitle">
            <span class="leaf-decor">🍃</span> 90 recettes maison, naturelles & transmises <span class="leaf-decor">🍃</span>
        </p>
    </header>


    <!-- Conteneur -->
    <div class="container">
        <!-- Recherche -->
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Rechercher un mal, un ingrédient... (ex: toux, miel, gingembre)" autocomplete="off">
            <button class="search-clear" id="searchClear" title="Effacer">✕</button>
        </div>


        <!-- Catégories -->
        <div class="categories" id="categoriesContainer">
            <button class="cat-btn active" data-cat="all"><span class="cat-emoji">📋</span>Tous</button>
            <button class="cat-btn" data-cat="ORL & Respiratoire"><span class="cat-emoji">🫁</span>ORL</button>
            <button class="cat-btn" data-cat="Digestion & Transit"><span class="cat-emoji">🍽️</span>Digestion</button>
            <button class="cat-btn" data-cat="Système nerveux & Sommeil"><span class="cat-emoji">😴</span>Sommeil</button>
            <button class="cat-btn" data-cat="Peau & Cheveux"><span class="cat-emoji">✨</span>Peau</button>
            <button class="cat-btn" data-cat="Douleurs & Articulations"><span class="cat-emoji">🦴</span>Douleurs</button>
            <button class="cat-btn" data-cat="Circulatoire & Jambes"><span class="cat-emoji">🦵</span>Circulatoire</button>
            <button class="cat-btn" data-cat="Urinaire & Gynécologique"><span class="cat-emoji">🌸</span>Gynéco</button>
            <button class="cat-btn" data-cat="Bouche & Yeux"><span class="cat-emoji">👄</span>Bouche</button>
            <button class="cat-btn" data-cat="Coups de fatigue & Immunité"><span class="cat-emoji">⚡</span>Immunité</button>
        </div>


        <!-- Compteur -->
        <p class="counter" id="counter">Affichage de <strong>90</strong> remèdes</p>


        <!-- Grille -->
        <div class="grid" id="gridContainer"></div>
    </div>


    <!-- Modale -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent">
            <button class="modal-close" id="modalClose">✕</button>
            <div id="modalInner"></div>
        </div>
    </div>


    <!-- Footer -->
    <footer class="footer">
        <p>🌾 Ces remèdes sont issus de traditions populaires et <span>ne remplacent pas un avis médical</span>. En cas de doute, consultez un professionnel de santé. 🌾</p>
    </footer>

            const remedes = [

            const searchInput = document.getElementById('searchInput');

            const gridContainer = document.getElementById('gridContainer');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalInner = document.getElementById('modalInner');
            const modalClose = document.getElementById('modalClose');
            const counterEl = document.getElementById('counter');
            const catButtons = document.querySelectorAll('.cat-btn');


            let categorieActive = 'all';
            let searchTerm = '';


            function filtrer() {
                let liste = remedes;
                if (categorieActive !== 'all') {
                    liste = liste.filter(r => r.categorie === categorieActive);
                }
                if (searchTerm.trim() !== '') {
                    const terme = searchTerm.trim().toLowerCase();
                    liste = liste.filter(r =>
                        r.maladie.toLowerCase().includes(terme) ||
                        r.remede.toLowerCase().includes(terme) ||
                        r.ingredients.some(ing => ing.toLowerCase().includes(terme)) ||
                        r.categorie.toLowerCase().includes(terme)
                    );
                }
                return liste;
            }


            function afficher() {
                const liste = filtrer();
                gridContainer.innerHTML = '';
                counterEl.innerHTML = 'Affichage de <strong>' + liste.length + '</strong> remède' + (liste.length !== 1 ?
                    's' : '');


                if (liste.length === 0) {
                    gridContainer.innerHTML =
                        '<div class="no-result"><span class="no-result-icon">🍂</span><p>Aucun remède trouvé. Essayez un autre mot-clé.</p></div>';
                    return;
                }


                liste.forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <span class="card-badge">${r.categorie}</span>

                        <p class="card-remede">🌿 ${r.remede}</p>
                        <p class="card-ingredients">
                            ${r.ingredients.slice(0, 2).map(ing => '<span>' + ing.split('(')[0].trim() + '</span>').join(' ')}
                            ${r.ingredients.length > 2 ? '<span>+...</span>' : ''}
                        </p>
                        <span class="card-arrow">→</span>
                    `;
                    card.addEventListener('click', () => ouvrirModale(r));
                    gridContainer.appendChild(card);
                });


                // Mise à jour visibilité bouton clear
                if (searchInput.value.trim() !== '') {
                    searchClear.classList.add('visible');
                } else {
                    searchClear.classList.remove('visible');
                }
            }


            function ouvrirModale(r) {
                modalInner.innerHTML = `
                    <span class="modal-badge">${r.categorie}</span>
                    <h2>${r.maladie}</h2>
                    <p class="modal-remede-name">🌿 ${r.remede}</p>
                    <h4>🥄 Ingrédients</h4>
                    <ul>${r.ingredients.map(ing => '<li>' + ing + '</li>').join('')}</ul>
                    <h4>📝 Préparation</h4>
                    <ul>${r.preparation.map(step => '<li>' + step + '</li>').join('')}</ul>
                    <h4>⏱️ Posologie</h4>
                    <p>${r.posologie}</p>
                    <div class="contre-indications"><strong>⚠️ Contre-indications :</strong> ${r.contreIndications}</div>
                    <div class="warning-box">💡 ${r.warning}</div>
                `;
                modalOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }


            function fermerModale() {
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }


            // Événements
            searchInput.addEventListener('input', function() {
                searchTerm = this.value;
                afficher();
            });


            searchClear.addEventListener('click', function() {
                searchInput.value = '';
                searchTerm = '';
                afficher();
                searchInput.focus();
            });


            modalClose.addEventListener('click', fermerModale);
            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) fermerModale();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modalOverlay.classList.contains('active')) fermerModale();
            });


            catButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    catButtons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    categorieActive = this.getAttribute('data-cat');
                    afficher();
                });
            });


            // Initialisation
            afficher();
        })();
    </script>
</body>
</html>
