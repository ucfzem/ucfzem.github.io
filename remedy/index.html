            --font-body: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            font-family: var(--font-body);
            line-height: 1.6;
            min-height: 100vh;

        }
        [dir="rtl"] { --font-body: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }

            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -60px;
            inset-inline-start: -60px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(112, 130, 56, 0.10) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: -40px;
            inset-inline-end: -40px;
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(138, 154, 134, 0.10) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .header-icon { font-size: 2.5rem; display: block; margin-bottom: 0.4rem; animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .header h1 {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            color: #4a5732;
            margin-bottom: 0.3rem;
            letter-spacing: -0.3px;
            position: relative;
            z-index: 1;
        }
        .subtitle {
            font-size: 1rem;
            color: var(--text-light);
            font-style: italic;
            position: relative;
            z-index: 1;
        }
        .leaf-decor { display: inline-block; font-size: 1.2rem; margin: 0 5px; opacity: 0.6; }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 1.5rem 3rem; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: -1rem auto 1.5rem;
            position: relative;
            z-index: 10;
            max-width: 1300px;
        }
        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 220px;
            max-width: 500px;
        }
        .search-input {
            width: 100%;
            padding: 0.85rem 2.8rem 0.85rem 2.8rem;
            border: 2px solid #e0dcd2;
            border-radius: 50px;
            font-size: 0.95rem;
            font-family: var(--font-body);
            background: var(--white);
            color: var(--text);
            box-shadow: var(--shadow);
            transition: var(--transition);
            outline: none;
        }
        .search-input:focus {
            border-color: var(--sage);
            box-shadow: 0 0 0 4px rgba(112, 130, 56, 0.08), var(--shadow);
        }
        .search-icon {
            position: absolute;
            inset-inline-start: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            pointer-events: none;
            opacity: 0.5;
        }
        .search-clear {
            position: absolute;
            inset-inline-end: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0.5;
            transition: var(--transition);
            padding: 4px 8px;
            border-radius: 50%;
            display: none;
        }
        .search-clear:hover { opacity: 1; background: #f0ece2; }
        .search-clear.visible { display: block; }

        .lang-selector {
            display: flex;
            gap: 0.4rem;
            flex-shrink: 0;
        }
        .lang-btn {

            background: var(--white);
            cursor: pointer;
            font-size: 0.82rem;
            font-family: var(--font-body);
            color: var(--text-light);
            transition: var(--transition);
            font-weight: 600;
        }
        .lang-btn:hover {
            border-color: var(--sage-light);
            color: var(--sage);
            background: #fafff6;
        }
        .lang-btn.active {
            background: var(--sage);
            color: #fff;
            border-color: var(--sage);
            box-shadow: 0 2px 8px rgba(112, 130, 56, 0.25);
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .cat-btn {
            padding: 0.5rem 0.9rem;
            border-radius: 50px;
            border: 1.5px solid #dcd7c9;
            background: var(--white);
            cursor: pointer;
            font-size: 0.82rem;
            font-family: var(--font-body);
            color: var(--text-light);
            transition: var(--transition);
            white-space: nowrap;
            letter-spacing: 0.2px;
            font-weight: 500;
        }
        .cat-btn:hover {
            border-color: var(--sage-light);
            color: var(--sage);
            background: #fafff6;
        }
        .cat-btn.active {
            background: var(--sage);
            color: #fff;
            border-color: var(--sage);
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(112, 130, 56, 0.25);
        }
        .cat-emoji { margin-inline-end: 4px; }

        .counter {
            text-align: center;
            font-size: 0.88rem;
            color: var(--text-light);
            margin-bottom: 1.4rem;
            font-style: italic;
        }
        .counter strong { color: var(--sage); font-weight: 700; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.1rem;
        }
        @media (max-width: 700px) {
            .grid { grid-template-columns: 1fr; gap: 0.8rem; }
            .header h1 { font-size: 1.5rem; }
            .header { padding: 1.8rem 1rem 1.5rem; }
            .cat-btn { font-size: 0.75rem; padding: 0.4rem 0.7rem; }
            .top-bar { flex-direction: column; align-items: stretch; }
            .search-wrapper { max-width: 100%; }
            .lang-selector { justify-content: center; }
        }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 1.3rem 1.2rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            border: 1.5px solid transparent;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;

            border-color: #dce8d3;
            transform: translateY(-3px);
        }

            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--sage);
            background: var(--sage-pale);
            padding: 3px 10px;
            border-radius: 50px;
            width: fit-content;
        }
        .card-title {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            color: #3e4632;
            margin: 0;
            line-height: 1.3;

            border: 1px solid #efe9d9;

            inset-inline-end: 14px;
            font-size: 1.1rem;
            opacity: 0.35;
            transition: var(--transition);

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 28, 22, 0.55);
            z-index: 100;

            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 1rem;

            justify-content: center;
            color: #5a5a55;
            z-index: 5;

            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--sage);
            background: var(--sage-pale);
            padding: 4px 12px;
            border-radius: 50px;
            margin-bottom: 0.5rem;

        .modal h2 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: #3e4632;
            margin-bottom: 0.2rem;

            padding-bottom: 0.3rem;

            padding: 0.3rem 0;
            font-size: 0.9rem;
            color: var(--text);
            position: relative;
            padding-inline-start: 1.4rem;
        }
        .modal ul li::before {
            content: '🌱';
            position: absolute;
            inset-inline-start: 0;
            top: 0.3rem;
            font-size: 0.7rem;

            font-size: 0.83rem;
            color: #7a6e40;

        .contre-indications {

            padding: 0.6rem 1rem;

            font-size: 0.82rem;
            color: #6b3a3a;
        }
        [dir="rtl"] .contre-indications { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }

            text-align: center;

            color: #b0aca0;
            border-top: 1px solid #e8e4d8;
            margin-top: 2rem;

            padding: 3rem 1rem;
            color: #b0aca0;
            grid-column: 1 / -1;
        }
        .no-result-icon { font-size: 2.5rem; display: block; margin-bottom: 0.6rem; }
    </style>
</head>

];
remedyData = remedyData.concat(EXTRA5);
console.log('Loaded ' + remedyData.length + ' remedies with full i18n');

var lang='fr';
var catActive='all';
var searchTerm='';

function t(s){return s[lang]||s.fr||'';}

function renderCats(){
  var c=document.getElementById('categoriesContainer');
  c.innerHTML='';
  CATS_CFG.forEach(function(cat){
    var b=document.createElement('button');
    b.className='cat-btn'+(cat.key===catActive?' active':'');
    b.innerHTML='<span class="cat-emoji">'+cat.emoji+'</span>'+cat.label[lang];
    b.dataset.cat=cat.key;
    b.addEventListener('click',function(){
      catActive=this.dataset.cat;
      renderCats();
      renderGrid();
    });
    c.appendChild(b);
  });
}

function renderGrid(){
  var list=remedyData;
  if(catActive!=='all') list=list.filter(function(r){return r.cat===catActive;});
  if(searchTerm.trim()){
    var st=searchTerm.trim().toLowerCase();
    list=list.filter(function(r){
      return t(r.maladie).toLowerCase().includes(st)||
             t(r.remede).toLowerCase().includes(st)||
             (r.ingredients[lang]||[]).some(function(i){return i.toLowerCase().includes(st);})||
             CATS_CFG.find(function(c){return c.key===r.cat;}).label[lang].toLowerCase().includes(st);
    });
  }
  var grid=document.getElementById('gridContainer');
  grid.innerHTML='';
  var cnt=document.getElementById('counter');
  cnt.innerHTML=UI[lang].showing+' <strong>'+list.length+'</strong> '+(list.length>1?UI[lang].remedies:UI[lang].remedy);
  if(!list.length){
    grid.innerHTML='<div class="no-result"><span class="no-result-icon">🍂</span><p>'+UI[lang].noResult+'</p></div>';
    return;
  }
  list.forEach(function(r){
    var card=document.createElement('div');
    card.className='card';
    var catLabel=CATS_CFG.find(function(c){return c.key===r.cat;}).label[lang];
    var ings=r.ingredients[lang]||r.ingredients.fr;
    card.innerHTML='<span class="card-badge">'+catLabel+'</span><h3 class="card-title">'+t(r.maladie)+'</h3><p class="card-remede">🌿 '+t(r.remede)+'</p><p class="card-ingredients">'+ings.slice(0,2).map(function(i){return '<span>'+i.split('(')[0].trim()+'</span>';}).join(' ')+(ings.length>2?'<span>+...</span>':'')+'</p><span class="card-arrow">→</span>';
    card.addEventListener('click',function(){openModal(r);});
    grid.appendChild(card);
  });
  var sc=document.getElementById('searchClear');
  if(searchInput.value.trim()) sc.classList.add('visible'); else sc.classList.remove('visible');
}

function openModal(r){
  var inner=document.getElementById('modalInner');
  var ings=r.ingredients[lang]||r.ingredients.fr;
  var prep=r.preparation[lang]||r.preparation.fr;
  var avert=r.avert?t(r.avert):UI[lang].warning;
  inner.innerHTML='<span class="modal-badge">'+CATS_CFG.find(function(c){return c.key===r.cat;}).label[lang]+'</span><h2>'+t(r.maladie)+'</h2><p class="modal-remede-name">🌿 '+t(r.remede)+'</p><h4>'+UI[lang].ingredients+'</h4><ul>'+ings.map(function(i){return '<li>'+i+'</li>';}).join('')+'</ul><h4>'+UI[lang].preparation+'</h4><ul>'+prep.map(function(s){return '<li>'+s+'</li>';}).join('')+'</ul><h4>'+UI[lang].posology+'</h4><p>'+(r.posologie[lang]||r.posologie.fr)+'</p><div class="contre-indications"><strong>'+UI[lang].contraindications+'</strong> '+(r.contreIndications[lang]||r.contreIndications.fr)+'</div><div class="warning-box">'+avert+'</div>';
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow='hidden';
}

function setLang(l){
  lang=l;
  var html=document.documentElement;
  html.lang=l;
  html.dir=l==='ar'?'rtl':'ltr';
  document.getElementById('mainTitle').textContent=UI[l].title;
  document.getElementById('subtitleText').textContent=UI[l].subtitle;
  document.getElementById('footerText').innerHTML=UI[l].footer;
  document.getElementById('searchInput').placeholder=UI[l].searchPlaceholder;
  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.lang===l);
  });
  renderCats();
  renderGrid();
}

// DOM refs
var searchInput=document.getElementById('searchInput');
searchInput.addEventListener('input',function(){searchTerm=this.value;renderGrid();});
document.getElementById('searchClear').addEventListener('click',function(){
  searchInput.value='';searchTerm='';renderGrid();searchInput.focus();
});
document.getElementById('modalClose').addEventListener('click',function(){
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow='';
});
document.getElementById('modalOverlay').addEventListener('click',function(e){
  if(e.target===this){this.classList.remove('active');document.body.style.overflow='';}
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'&&document.getElementById('modalOverlay').classList.contains('active')){
    document.getElementById('modalOverlay').classList.remove('active');
    document.body.style.overflow='';
  }
});
document.querySelectorAll('.lang-btn').forEach(function(b){
  b.addEventListener('click',function(){setLang(this.dataset.lang);});
});

setLang('fr');
})();
</script>
</body>
</html>
