      cursor:pointer;transition:transform 0.2s,background 0.2s,border-color 0.2s;
      line-height:1;min-width:var(--touch-target);min-height:var(--touch-target);
      display:flex;align-items:center;justify-content:center;
      will-change:transform

    }

      text-transform:uppercase;letter-spacing:clamp(1px,0.2vw + 0.3px,3px);

      display:flex;align-items:center;gap:var(--space-sm)
    }
    body.rtl .section-title{letter-spacing:0}

      color:#d4ebd4;padding:var(--space-sm) var(--space-md);
      border-radius:var(--radius-lg);

      cursor:pointer;transition:transform 0.2s,background 0.2s,border-color 0.2s,box-shadow 0.2s,opacity 0.2s;
      -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
      display:flex;align-items:center;gap:var(--space-xs);
      min-height:var(--touch-target);flex:1 1 auto;
      will-change:transform

    .sound-btn:hover,.sound-btn:focus-visible{background:#2c4f3b;border-color:#7aa382}
    .sound-btn:active{transform:scale(0.95)}

    @keyframes pulse{50%{opacity:0.3}}
    .sound-btn.active-loop{background:#3c6e52;border-color:#8fc9a3;color:white;box-shadow:0 0 clamp(0.25rem,0.3vw + 0.1rem,0.75rem) rgba(130,200,130,0.5)}

    }

    }

    }

    }

      .lang-btn{font-size:clamp(1.4rem,1vw + 0.5rem,2rem)}
      .sound-btn{font-size:clamp(1rem,0.8vw + 0.4rem,1.4rem);flex:0 1 calc(20% - var(--space-sm))}
      .stop-all-btn{font-size:clamp(1rem,0.8vw + 0.4rem,1.4rem);padding:var(--space-md) var(--space-xl)}
      footer{font-size:clamp(0.85rem,0.6vw + 0.3rem,1.1rem)}
    }
    @media(min-width:2560px){
      body{--touch-target:4rem;--brand-size:8rem;--overscan:4rem}
      .sound-section{max-width:70vw}
      .sound-btn{flex:0 1 calc(16.66% - var(--space-sm));padding:var(--space-md) var(--space-lg)}
      .lang-btn{min-width:4rem;min-height:4rem}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}
    }
    @media(pointer:coarse){
      .sound-btn,.lang-btn,.stop-all-btn{touch-action:manipulation}
    }

    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    [aria-pressed]{user-select:none;-webkit-user-select:none}
  </style>
</head>

      section: '🎵 الأجواء والأصوات',
      stop: '⏹️ إيقاف الكل',
      footer: 'أصوات الطبيعة — اضغط للتشغيل، اضغط مرة أخرى للإيقاف',
      back: '← العودة إلى المشاريع',
      sounds: {
        waves: '🌊 أمواج', birds: '🐦 طيور', storm: '⛈️ مطر ورعد',
        rain: '🌧️ مطر ناعم', rain2: '🌧️ مطر مستمر', river: '🏞️ نهر',
        river2: '🏞️ نهر قوي', jungle: '🌴 غابة', drops: '💧 قطرات ماء',
        cicada: '🦗 زيز', cicada2: '🦗 زيز 2', birds2: '🐦 طيور 2',
        children: '🧒 أطفال يلعبون', rooster: '🐔 ديك', rooster2: '🐔 ديك 2', frog: '🐸 ضفدع'
      }
    }
  };

  const playing = {};
  let currentLang = 'fr';
  let sounds = [];
  let focusedIndex = -1;
  let soundButtons = [];
  let isSpatialNav = false;

  function applyLang(lang) {
    currentLang = lang;
    const t = LANG[lang];
    const isRtl = lang === 'ar';
    document.documentElement.lang = isRtl ? 'ar' : lang.substring(0,2);
    document.body.classList.toggle('rtl', isRtl);
    document.getElementById('mainTitle').textContent = t.title;
    document.getElementById('subtitle').textContent = t.subtitle;
    document.getElementById('sectionTitle').innerHTML = t.section;
    document.getElementById('stopAllBtn').textContent = t.stop;
    document.getElementById('footerText').textContent = t.footer;
    document.querySelector('footer a').textContent = t.back;
    document.querySelectorAll('.lang-btn').forEach(b => {
      const isActive = b.dataset.lang === lang;
      b.classList.toggle('active-lang', isActive);
      b.setAttribute('aria-pressed', isActive ? 'true' : 'false');
    });
    sounds.forEach(s => {
      const btn = document.getElementById('sound-' + s.id);
      if (btn) {
        const label = t.sounds[s.id] || s.label;
        btn.dataset.label = label;
        btn.textContent = (btn.classList.contains('loading') ? '⏳ ' : '') + label;
        btn.setAttribute('aria-label', label);
      }
    });
  }

  function setupSounds() {
    const soundsData = [
      { id:'waves',   file:'freesound_community-waves-53479.mp3' },
      { id:'birds',   file:'freesound_community-birds-19624.mp3' },
      { id:'storm',   file:'jci-21-rain-and-thunder-sfx-12820.mp3' },
      { id:'rain',    file:'liecio-calming-rain-257596.mp3' },
      { id:'rain2',   file:'dinamakan-rain-sound-272604.mp3' },
      { id:'river',   file:'oxidvideos-river-307903.mp3' },
      { id:'river2',  file:'soundreality-big-river-392040.mp3' },
      { id:'jungle',  file:'placidplace-nature-soundstropicaljunglebirds-108380.mp3' },
      { id:'drops',   file:'freesound_community-water-drops-26638.mp3' },
      { id:'cicada',  file:'blendertimer-cicada-419563.mp3' },
      { id:'cicada2', file:'herkesicinbisikletpodcast-cicada-126650.mp3' },
      { id:'birds2',  file:'wr-sound-library-bird-soundchirping-light-no-copyright-550314.mp3' },
      { id:'children',file:'freesound_community-children-entering-school-23756.mp3' },
      { id:'rooster', file:'dragon-studio-rooster-crowing-364473.mp3' },
      { id:'rooster2',file:'nematoki-rooster-cry-chicken-rooster-305576.mp3' },
      { id:'frog',    file:'dragon-studio-frog-croaking-sound-effect-322956.mp3' }
    ];
    sounds = soundsData;
    const grid = document.getElementById('ambienceGrid');
    soundsData.forEach((s, idx) => {
      const btn = document.createElement('button');
      btn.className = 'sound-btn focus-ring';
      btn.id = 'sound-' + s.id;
      btn.dataset.id = s.id;
      btn.dataset.index = idx;
      btn.setAttribute('role', 'listitem');
      const label = LANG.fr.sounds[s.id];
      btn.dataset.label = label;
      btn.textContent = label;
      btn.setAttribute('aria-label', label);
      btn.addEventListener('click', () => {
        if (playing[s.id]) {
          playing[s.id].pause(); playing[s.id].currentTime = 0;
          playing[s.id] = null; btn.classList.remove('active-loop', 'loading');
          btn.setAttribute('aria-pressed', 'false');
        } else {
          const audio = new Audio('/sounds-of-nature/assets/' + s.file);
          audio.loop = true;
          playing[s.id] = audio;
          btn.classList.add('loading');
          btn.textContent = '⏳ ' + btn.dataset.label;
          audio.play().then(() => {
            btn.textContent = btn.dataset.label;
            btn.classList.remove('loading');
            btn.classList.add('active-loop');
            btn.setAttribute('aria-pressed', 'true');
          }).catch(e => {
            playing[s.id] = null;
            btn.classList.remove('loading');
            console.error('Playback failed:', e);
            btn.textContent = '❌ ' + btn.dataset.label;
            setTimeout(() => btn.textContent = btn.dataset.label, 2000);
          });
        }
      });
      grid.appendChild(btn);
    });
    soundButtons = Array.from(grid.querySelectorAll('.sound-btn'));
  }

  function stopAll() {
    Object.keys(playing).forEach(id => {
      if (playing[id]) { playing[id].pause(); playing[id].currentTime = 0; playing[id] = null; }
    });
    document.querySelectorAll('.sound-btn').forEach(b => {
      b.classList.remove('active-loop');
      b.setAttribute('aria-pressed', 'false');
    });
  }

  function focusNextElement(dir) {
    const focusable = document.querySelectorAll(
      '.lang-btn, .sound-btn, .stop-all-btn, footer a'
    );
    if (!focusable.length) return;
    const current = document.activeElement;
    let currentIdx = -1;
    focusable.forEach((el, i) => { if (el === current) currentIdx = i; });
    let next;
    if (dir === 'ArrowRight') {
      next = focusable[(currentIdx + 1) % focusable.length];
    } else if (dir === 'ArrowLeft') {
      next = focusable[(currentIdx - 1 + focusable.length) % focusable.length];
    } else if (dir === 'ArrowDown' || dir === 'ArrowUp') {
      const rect = current ? current.getBoundingClientRect() : { left:0, top:0, right:0, bottom:0 };
      const cx = (rect.left + rect.right) / 2;
      const cy = (rect.top + rect.bottom) / 2;
      let best = null, bestDist = Infinity;
      focusable.forEach(el => {
        if (el === current || el.disabled) return;
        const r = el.getBoundingClientRect();
        const ecx = (r.left + r.right) / 2;
        const ecy = (r.top + r.bottom) / 2;
        const dx = ecx - cx;
        const dy = ecy - cy;
        if (dir === 'ArrowDown' && dy <= 0) return;
        if (dir === 'ArrowUp' && dy >= 0) return;
        const dist = dx * dx + dy * dy;
        const angle = Math.abs(Math.atan2(dy, dx));
        const isVertical = Math.abs(dy) > Math.abs(dx);
        if (dist < bestDist && isVertical) {
          bestDist = dist;
          best = el;
        }
      });
      if (!best) {
        const wrap = dir === 'ArrowDown'
          ? document.querySelector('.lang-btn')
          : document.querySelector('.stop-all-btn, footer a');
        next = wrap;
      } else {
        next = best;
      }
    }
    if (next) { next.focus(); }
  }

  document.addEventListener('DOMContentLoaded', () => {
    setupSounds();
    applyLang('fr');
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => applyLang(btn.dataset.lang));
    });
    document.getElementById('stopAllBtn').addEventListener('click', stopAll);

    document.addEventListener('keydown', e => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
        focusNextElement(e.key);
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Tab') {
        isSpatialNav = false;
      }
    });
  });
</script>
</body>
</html>
