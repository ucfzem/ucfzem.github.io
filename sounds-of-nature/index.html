  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      --font-base:clamp(0.875rem,1vw + 0.5rem,1.25rem);
      --space-xs:clamp(0.25rem,0.3vw + 0.2rem,0.75rem);
      --space-sm:clamp(0.5rem,0.5vw + 0.3rem,1rem);
      --space-md:clamp(0.75rem,0.8vw + 0.4rem,1.5rem);
      --space-lg:clamp(1.25rem,1.2vw + 0.6rem,2.5rem);
      --space-xl:clamp(2rem,2vw + 1rem,4rem);
      --radius-sm:clamp(0.5rem,0.5vw + 0.3rem,1rem);
      --radius-md:clamp(1rem,0.8vw + 0.5rem,1.5rem);
      --radius-lg:clamp(1.5rem,1.2vw + 0.8rem,2.5rem);
      --touch-target:clamp(2.75rem,2.5vw + 1rem,3.5rem);
      --brand-size:clamp(5rem,6vw + 2rem,9rem);
      --ring-color:#8fc9a3;
      --ring-width:clamp(2px,0.15vw + 1px,4px);
      --overscan:clamp(0.75rem,5vw,3rem);
      background:#0a1a1c;color:#cfdfcf;
      font-family:'Plus Jakarta Sans',system-ui,sans-serif;
      min-height:100vh;
      padding:var(--overscan);
      background-image:radial-gradient(ellipse at 20% 20%,#1e3a34,#0a1a1c 80%);
      display:flex;flex-direction:column;align-items:center;
      font-size:var(--font-base);
      gap:var(--space-md);
      -webkit-tap-highlight-color:transparent
    }
    body.rtl{font-family:'Cairo','Plus Jakarta Sans',system-ui,sans-serif;direction:rtl}

    a,button{font:inherit;color:inherit}

    :focus-visible{outline:var(--ring-width) solid var(--ring-color);outline-offset:2px;border-radius:var(--radius-sm)}
    .focus-ring:focus-visible{box-shadow:0 0 0 var(--ring-width) var(--ring-color),0 0 clamp(0.5rem,0.5vw + 0.25rem,1.5rem) var(--ring-color)}

    h1{
      font-family:'Playfair Display',Georgia,serif;
      font-weight:500;
      font-size:clamp(1.8rem,3vw + 0.8rem,3.5rem);
      letter-spacing:0.5px;
      margin-bottom:clamp(0.05rem,0.1vw + 0.05rem,0.25rem);
      color:#e2f0e8
    }
    body.rtl h1{font-family:'Cairo',serif;letter-spacing:0}
    .subtitle{
      font-family:'Cinzel',serif;
      color:#C7EFCF;
      letter-spacing:clamp(1px,0.2vw + 0.5px,4px);
      text-transform:uppercase;
      font-size:clamp(0.75rem,1vw + 0.3rem,1.3rem)
    }
    body.rtl .subtitle{font-family:'Cairo',serif;letter-spacing:0}

    .lang-switcher{display:flex;gap:var(--space-sm);flex-wrap:wrap;justify-content:center}
    .lang-btn{
      background:transparent;border:1px solid #4c7359;color:#cfdfcf;
      padding:var(--space-xs) var(--space-sm);border-radius:var(--radius-lg);
      font-size:clamp(1rem,1.2vw + 0.3rem,1.6rem);
      cursor:pointer;transition:transform 0.2s,background 0.2s,border-color 0.2s;
      line-height:1;min-width:var(--touch-target);min-height:var(--touch-target);
      display:flex;align-items:center;justify-content:center;
      will-change:transform
    }
    .lang-btn:hover,.lang-btn:focus-visible{background:#2c4f3b;border-color:#7aa382}
    .lang-btn.active-lang{background:#2c4f3b;border-color:#8fc9a3;box-shadow:0 0 clamp(0.25rem,0.3vw + 0.1rem,0.75rem) rgba(130,200,130,0.3)}
    .lang-btn:active{transform:scale(0.93)}

    .sound-section{
      width:100%;max-width:clamp(20rem,80vw,80rem);
      background:rgba(20,35,30,0.55);backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border-radius:var(--radius-lg);padding:var(--space-md);
      border:1px solid rgba(130,180,130,0.2)
    }
    .section-title{
      font-size:clamp(0.8rem,0.9vw + 0.3rem,1.2rem);
      text-transform:uppercase;letter-spacing:clamp(1px,0.2vw + 0.3px,3px);
      margin-bottom:var(--space-md);color:#a3c9b6;
      display:flex;align-items:center;gap:var(--space-sm)
    }
    body.rtl .section-title{letter-spacing:0}

    .button-grid{container-type:inline-size;display:flex;flex-wrap:wrap;gap:var(--space-sm)}
    .sound-btn{
      background:rgba(30,50,40,0.7);border:1px solid #4c7359;
      color:#d4ebd4;padding:var(--space-sm) var(--space-md);
      border-radius:var(--radius-lg);
      font-size:clamp(0.8rem,0.9vw + 0.2rem,1.1rem);
      cursor:pointer;transition:transform 0.2s,background 0.2s,border-color 0.2s,box-shadow 0.2s,opacity 0.2s;
      -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
      display:flex;align-items:center;gap:var(--space-xs);
      min-height:var(--touch-target);flex:1 1 auto;
      will-change:transform
    }
    .sound-btn:hover,.sound-btn:focus-visible{background:#2c4f3b;border-color:#7aa382}
    .sound-btn:active{transform:scale(0.95)}
    .sound-btn.loading{opacity:0.6;animation:pulse 1s infinite}
    @keyframes pulse{50%{opacity:0.3}}
    .sound-btn.active-loop{background:#3c6e52;border-color:#8fc9a3;color:white;box-shadow:0 0 clamp(0.25rem,0.3vw + 0.1rem,0.75rem) rgba(130,200,130,0.5)}
    @container (min-width:480px){
      .sound-btn{flex:0 1 calc(50% - var(--space-sm))}
    }
    @container (min-width:768px){
      .sound-btn{flex:0 1 calc(33.33% - var(--space-sm))}
    }
    @container (min-width:1024px){
      .sound-btn{flex:0 1 calc(25% - var(--space-sm))}
    }

    .stop-all-btn{
      background:transparent;border:1px solid #957e69;color:#ddc9b8;
      padding:var(--space-sm) var(--space-lg);border-radius:var(--radius-lg);
      font-size:clamp(0.85rem,0.9vw + 0.2rem,1.15rem);
      letter-spacing:clamp(0.5px,0.1vw + 0.2px,2px);cursor:pointer;
      transition:transform 0.2s,background 0.2s,border-color 0.2s;
      min-height:var(--touch-target);
      will-change:transform
    }
    .stop-all-btn:hover,.stop-all-btn:focus-visible{background:rgba(200,150,120,0.2);border-color:#c9aa8a}
    .stop-all-btn:active{transform:scale(0.95)}

    footer{color:#4b6355;font-size:clamp(0.7rem,0.7vw + 0.2rem,0.95rem);text-align:center;max-width:min(90vw,40rem)}
    footer a{color:#7aa382}

    @media(max-width:480px){
      body{padding:var(--overscan);gap:var(--space-sm)}
      .sound-section{padding:var(--space-sm)}
      .button-grid{gap:var(--space-xs)}
      .sound-btn{padding:var(--space-sm) var(--space-md);flex:1 1 100%}
    }
    @media(min-width:481px)and(max-width:767px){
      .sound-btn{flex:0 1 calc(50% - var(--space-sm))}
    }
    @media(min-width:768px)and(max-width:1024px){
      .sound-btn{flex:0 1 calc(33.33% - var(--space-sm))}
    }
    @media(min-width:1025px)and(max-width:1919px){
      .sound-btn{flex:0 1 calc(25% - var(--space-sm))}
    }
    @media(min-width:1920px){
      body{--touch-target:clamp(3rem,2vw + 1.5rem,4rem);--brand-size:clamp(6rem,4vw + 2rem,8rem);padding:var(--overscan)}
      .lang-btn{font-size:clamp(1.4rem,1vw + 0.5rem,2rem)}
      .sound-btn{font-size:clamp(1rem,0.8vw + 0.4rem,1.4rem);flex:0 1 calc(20% - var(--space-sm))}
      .stop-all-btn{font-size:clamp(1rem,0.8vw + 0.4rem,1.4rem);padding:var(--space-md) var(--space-xl)}
      footer{font-size:clamp(0.85rem,0.6vw + 0.3rem,1.1rem)}
    }
    @media(min-width:2560px){
      body{--touch-target:4rem;--brand-size:8rem;--overscan:4rem}
      .sound-section{max-width:70vw}
      .sound-btn{flex:0 1 calc(16.66% - var(--space-sm));padding:var(--space-md) var(--space-lg)}
      .lang-btn{min-width:4rem;min-height:4rem}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}
    }
    @media(pointer:coarse){
      .sound-btn,.lang-btn,.stop-all-btn{touch-action:manipulation}
    }

    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    [aria-pressed]{user-select:none;-webkit-user-select:none}
  </style>
</head>

  const playing = {};
  let currentLang = 'fr';
  let sounds = [];
  let focusedIndex = -1;
  let soundButtons = [];
  let isSpatialNav = false;

  function applyLang(lang) {
    currentLang = lang;
    localStorage.setItem('sn-lang', lang);
    const t = LANG[lang];
    const isRtl = lang === 'ar';
    document.documentElement.lang = isRtl ? 'ar' : lang.substring(0,2);
    document.body.classList.toggle('rtl', isRtl);
    document.getElementById('mainTitle').textContent = t.title;
    document.getElementById('subtitle').textContent = t.subtitle;
    document.getElementById('sectionTitle').innerHTML = t.section;
    document.getElementById('stopAllBtn').textContent = t.stop;
    document.getElementById('footerText').textContent = t.footer;
    document.querySelector('footer a').textContent = t.back;
    document.querySelectorAll('.lang-btn').forEach(b => {
      const isActive = b.dataset.lang === lang;
      b.classList.toggle('active-lang', isActive);
      b.setAttribute('aria-pressed', isActive ? 'true' : 'false');
    });
    sounds.forEach(s => {
      const btn = document.getElementById('sound-' + s.id);
      if (btn) {
        const label = t.sounds[s.id] || s.label;
        btn.dataset.label = label;
        btn.textContent = (btn.classList.contains('loading') ? '⏳ ' : '') + label;
        btn.setAttribute('aria-label', label);
      }
    });
  }

    soundsData.forEach((s, idx) => {
      const btn = document.createElement('button');
      btn.className = 'sound-btn focus-ring';
      btn.id = 'sound-' + s.id;
      btn.dataset.id = s.id;
      btn.dataset.index = idx;
      btn.setAttribute('role', 'listitem');
      const label = LANG.fr.sounds[s.id];
      btn.dataset.label = label;
      btn.textContent = label;
      btn.setAttribute('aria-label', label);
      btn.addEventListener('click', () => {
        if (playing[s.id]) {
          playing[s.id].pause(); playing[s.id].currentTime = 0;
          playing[s.id] = null; btn.classList.remove('active-loop', 'loading');
          btn.setAttribute('aria-pressed', 'false');
        } else {
          const audio = new Audio('/sounds-of-nature/assets/' + s.file);
          audio.loop = true;
          playing[s.id] = audio;
          btn.classList.add('loading');
          btn.textContent = '⏳ ' + btn.dataset.label;
          audio.play().then(() => {
            btn.textContent = btn.dataset.label;
            btn.classList.remove('loading');
            btn.classList.add('active-loop');
            btn.setAttribute('aria-pressed', 'true');
          }).catch(e => {
            playing[s.id] = null;
            btn.classList.remove('loading');
            console.error('Playback failed:', e);
            btn.textContent = '❌ ' + btn.dataset.label;
            setTimeout(() => btn.textContent = btn.dataset.label, 2000);
          });
        }
      });
      grid.appendChild(btn);
    });
    soundButtons = Array.from(grid.querySelectorAll('.sound-btn'));
  }

  function stopAll() {
    Object.keys(playing).forEach(id => {
      if (playing[id]) { playing[id].pause(); playing[id].currentTime = 0; playing[id] = null; }
    });
    document.querySelectorAll('.sound-btn').forEach(b => {
      b.classList.remove('active-loop');
      b.setAttribute('aria-pressed', 'false');
    });
  }

  function focusNextElement(dir) {
    const focusable = document.querySelectorAll(
      '.lang-btn, .sound-btn, .stop-all-btn, footer a'
    );
    if (!focusable.length) return;
    const current = document.activeElement;
    let currentIdx = -1;
    focusable.forEach((el, i) => { if (el === current) currentIdx = i; });
    let next;
    if (dir === 'ArrowRight') {
      next = focusable[(currentIdx + 1) % focusable.length];
    } else if (dir === 'ArrowLeft') {
      next = focusable[(currentIdx - 1 + focusable.length) % focusable.length];
    } else if (dir === 'ArrowDown' || dir === 'ArrowUp') {
      const rect = current ? current.getBoundingClientRect() : { left:0, top:0, right:0, bottom:0 };
      const cx = (rect.left + rect.right) / 2;
      const cy = (rect.top + rect.bottom) / 2;
      let best = null, bestDist = Infinity;
      focusable.forEach(el => {
        if (el === current || el.disabled) return;
        const r = el.getBoundingClientRect();
        const ecx = (r.left + r.right) / 2;
        const ecy = (r.top + r.bottom) / 2;
        const dx = ecx - cx;
        const dy = ecy - cy;
        if (dir === 'ArrowDown' && dy <= 0) return;
        if (dir === 'ArrowUp' && dy >= 0) return;
        const dist = dx * dx + dy * dy;
        const angle = Math.abs(Math.atan2(dy, dx));
        const isVertical = Math.abs(dy) > Math.abs(dx);
        if (dist < bestDist && isVertical) {
          bestDist = dist;
          best = el;
        }
      });
      if (!best) {
        const wrap = dir === 'ArrowDown'
          ? document.querySelector('.lang-btn')
          : document.querySelector('.stop-all-btn, footer a');
        next = wrap;
      } else {
        next = best;
      }
    }
    if (next) { next.focus(); }
  }

  document.addEventListener('DOMContentLoaded', () => {
    setupSounds();
    applyLang(localStorage.getItem('sn-lang') || 'fr');
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => applyLang(btn.dataset.lang));
    });
    document.getElementById('stopAllBtn').addEventListener('click', stopAll);

    document.addEventListener('keydown', e => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
        focusNextElement(e.key);
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Tab') {
        isSpatialNav = false;
      }
    });
  });
