<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sounds of Nature — Ambiance sonore</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#0a1a1c;color:#cfdfcf;
      font-family:'Segoe UI',system-ui,sans-serif;
      min-height:100vh;padding:2rem 1rem;
      background-image:radial-gradient(ellipse at 20% 20%,#1e3a34,#0a1a1c 80%);
      display:flex;flex-direction:column;align-items:center
    }
    h1{font-weight:300;font-size:2.2rem;letter-spacing:3px;margin-bottom:0.2rem;color:#b3d9c3}
    .subtitle{color:#6b8b7a;margin-bottom:2rem;font-style:italic;font-size:0.95rem}
    .sound-section{
      width:100%;max-width:900px;margin-bottom:2rem;
      background:rgba(20,35,30,0.55);backdrop-filter:blur(14px);
      border-radius:2rem;padding:1.5rem 1.2rem;
      border:1px solid rgba(130,180,130,0.2)
    }
    .section-title{
      font-size:1.2rem;text-transform:uppercase;letter-spacing:2px;
      margin-bottom:1rem;color:#a3c9b6;display:flex;align-items:center;gap:0.5rem
    }
    .button-grid{display:flex;flex-wrap:wrap;gap:0.7rem}
    .sound-btn{
      background:rgba(30,50,40,0.7);border:1px solid #4c7359;
      color:#d4ebd4;padding:0.7rem 1.3rem;border-radius:2.5rem;
      font-size:0.9rem;cursor:pointer;transition:0.2s;backdrop-filter:blur(6px);
      display:flex;align-items:center;gap:0.4rem
    }
    .sound-btn:hover{background:#2c4f3b;border-color:#7aa382}
    .sound-btn.active-loop{background:#3c6e52;border-color:#8fc9a3;color:white;box-shadow:0 0 12px rgba(130,200,130,0.5)}
    .stop-all-btn{
      background:transparent;border:1px solid #957e69;color:#ddc9b8;
      margin-top:0.5rem;padding:0.6rem 2rem;border-radius:2rem;
      font-size:0.9rem;letter-spacing:1px;cursor:pointer
    }
    .stop-all-btn:hover{background:rgba(200,150,120,0.2);border-color:#c9aa8a}
    footer{margin-top:2rem;color:#4b6355;font-size:0.8rem;text-align:center;max-width:600px}
    footer a{color:#7aa382}
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<h1>🌿 Sounds of Nature</h1>
<p class="subtitle">Ambiances naturelles · sons authentiques</p>

<div class="sound-section">
  <div class="section-title"><i class="fas fa-leaf"></i> Ambiances (boucle infinie)</div>
  <div class="button-grid" id="ambienceGrid"></div>
</div>

<div class="sound-section">
  <div class="section-title"><i class="fas fa-bolt"></i> Événements &amp; Animaux</div>
  <div class="button-grid" id="triggerGrid"></div>
</div>

<button class="stop-all-btn" onclick="stopAll()"><i class="fas fa-stop-circle"></i> Stop tout</button>

<footer>
  Sons naturels — lecture en boucle pour les ambiances, déclenchement unique pour les événements
</footer>

<script>
  const ambiences = [
    { id:'waves',   label:'Vagues',         icon:'fa-water',      file:'freesound_community-waves-53479.mp3' },
    { id:'birds',   label:'Oiseaux',        icon:'fa-dove',       file:'freesound_community-birds-19624.mp3' },
    { id:'storm',   label:'Pluie & Orage',  icon:'fa-cloud-rain', file:'jci-21-rain-and-thunder-sfx-12820.mp3' },
    { id:'rain',    label:'Pluie douce',    icon:'fa-tint',       file:'liecio-calming-rain-257596.mp3' },
    { id:'river',   label:'Rivière',        icon:'fa-water',      file:'oxidvideos-river-307903.mp3' },
    { id:'jungle',  label:'Jungle',         icon:'fa-tree',       file:'placidplace-nature-soundstropicaljunglebirds-108380.mp3' },
    { id:'drops',   label:'Gouttes d\'eau', icon:'fa-tint',       file:'freesound_community-water-drops-26638.mp3' },
    { id:'cicada',  label:'Cigales',        icon:'fa-bug',        file:'blendertimer-cicada-419563.mp3' }
  ];

  const triggers = [
    { id:'children', label:'Enfants cour',  icon:'fa-child',         file:'freesound_community-children-entering-school-23756.mp3' },
    { id:'rooster',  label:'Coq',           icon:'fa-drumstick-bite',file:'dragon-studio-rooster-crowing-364473.mp3' },
    { id:'frog',     label:'Grenouille',    icon:'fa-frog',          file:'dragon-studio-frog-croaking-sound-effect-322956.mp3' }
  ];

  const loopAudios = {};

  function createButton(sound, type) {
    const btn = document.createElement('button');
    btn.className = 'sound-btn';
    btn.innerHTML = `<i class="fas ${sound.icon}"></i> ${sound.label}`;
    btn.dataset.id = sound.id;
    btn.dataset.type = type;

    if (type === 'ambience') {
      const audio = new Audio('assets/' + sound.file);
      audio.loop = true;
      audio.preload = 'auto';
      loopAudios[sound.id] = audio;
      btn.addEventListener('click', () => toggleAmbient(sound.id, btn));
    } else {
      btn.addEventListener('click', () => playOneShot('assets/' + sound.file, btn));
    }
    return btn;
  }

  function toggleAmbient(id, btn) {
    const audio = loopAudios[id];
    if (!audio) return;
    if (audio.paused) {
      audio.play().then(() => btn.classList.add('active-loop')).catch(() => {});
    } else {
      audio.pause();
      audio.currentTime = 0;
      btn.classList.remove('active-loop');
    }
  }

  function playOneShot(url, btn) {
    const audio = new Audio(url);
    audio.play().catch(() => {});
    btn.style.transform = 'scale(0.94)';
    setTimeout(() => btn.style.transform = '', 120);
  }

  function stopAll() {
    Object.values(loopAudios).forEach(a => { a.pause(); a.currentTime = 0; });
    document.querySelectorAll('.sound-btn[data-type="ambience"]').forEach(b => b.classList.remove('active-loop'));
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('ambienceGrid').append(...ambiences.map(s => createButton(s, 'ambience')));
    document.getElementById('triggerGrid').append(...triggers.map(s => createButton(s, 'trigger')));
  });
</script>
</body>
</html>
