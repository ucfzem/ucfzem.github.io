<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Redirection — Tanger d'Antan</title>
<script src="tracker.js"></script>
<style>
:root{--bg:#2C1B18;--card:#3E2723;--border:#5D4037;--gold:#D4AF37;--text:#FDFBF7;--muted:#A1887F}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;max-width:400px;width:100%}
h1{color:var(--gold);font-size:1.5em;margin-bottom:10px}
p{color:var(--muted);line-height:1.6;font-size:.95em;margin-bottom:20px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.count{font-size:2.5em;font-weight:800;color:var(--gold)}
.label{color:var(--muted);font-size:.85em}
.btn{display:inline-block;background:var(--gold);color:var(--bg);padding:12px 24px;border-radius:50px;font-weight:700;text-decoration:none;font-size:.9em;transition:.2s}
.btn:hover{box-shadow:0 4px 20px rgba(212,175,55,.3)}
</style>
</head>
<body>

<div class="card">
  <div class="count" id="hitCount">-</div>
  <div class="label">visites enregistrées</div>
  <div class="spinner"></div>
  <h1>🕵️ Lien traqué</h1>
  <p>Vous allez être redirigé vers Tanger d'Antan dans quelques instants.<br>Votre visite a été enregistrée.</p>
  <a href="/tantantan/" class="btn" data-track="spy:clic_manuel">Aller directement</a>
</div>

<script>
setTimeout(function(){ window.location.href = '/tantantan/'; }, 3000);
setTimeout(function(){
  if(window.__tracker){
    const s = window.__tracker.stats();
    document.getElementById('hitCount').textContent = s.totalVisits;
  }
}, 500);
</script>

</body>
</html>
