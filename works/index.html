    --locked-bg: rgba(255,255,255,0.03);

    --text: #1a1a1a;
    --text-sec: #8a7a5a;

  .theme-toggle {

    cursor: pointer;
    color: var(--text-sec);

  .theme-toggle:hover {

  .avatar {

  }
  .avatar-fallback {

    margin: 0 auto 16px;
    border: 2px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    color: var(--gold);
    background: var(--card-bg);

  .title {

    font-size: 2rem;
    color: var(--gold);
    margin-bottom: 6px;
    font-weight: 700;
  }
  .subtitle {

    color: var(--text-sec);
    font-weight: 400;
  }


  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    color: var(--gold);
    margin-bottom: 16px;
    font-weight: 600;
  }


  .card {

    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--card-border);
    background: var(--card-bg);
    margin-bottom: 10px;
    transition: all 0.3s ease;
    cursor: pointer;
    text-decoration: none;
    color: inherit;

  .card:hover {

  }
  .card-num {

    font-size: 0.85rem;
    color: var(--text-sec);
    min-width: 24px;
    text-align: center;

  .card-emoji {
    font-size: 1.3rem;
    min-width: 28px;
    text-align: center;
  }
  .card-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    object-fit: cover;
    min-width: 28px;
  }
  .card-info {

    display: flex;
    flex-direction: column;
  }
  .card-name {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
  }
  .card-tag {
    font-size: 0.7rem;
    color: var(--text-sec);
    background: rgba(201,168,76,0.1);
    padding: 3px 10px;
    border-radius: 8px;
    font-weight: 500;
    white-space: nowrap;
  }


  .locked .card {
    background: var(--locked-bg);
    border-color: rgba(255,255,255,0.06);
    pointer-events: none;
    opacity: 0.5;
    filter: grayscale(60%);
    transition: opacity 0.6s ease, filter 0.6s ease;
  }
  .locked .card-num {
    font-size: 0.9rem;
    color: var(--locked-text);
  }
  .locked .card-name {
    color: rgba(255,255,255,0.4);
  }
  .locked .card-tag {

  }

  [data-theme="light"] .locked .card-tag { color: rgba(0,0,0,0.35); background: rgba(0,0,0,0.06); }


  .unlocked .card {
    opacity: 1;
    filter: grayscale(0%);
    pointer-events: auto;

  .unlocked .card-name { color: var(--text); }
  .unlocked .card-num { color: var(--text-sec); }

  .unlock-block {

    background: var(--card-bg);

    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }

  const VALIDATOR_URL = "https://works-validator.azer-tyu199p.workers.dev";


  function renderPublic() {
    const container = document.getElementById('publicProjects');
    container.innerHTML = publicProjects.map(p => `
      <a href="${p.url || '#'}" class="card">
        <span class="card-num">${p.num}</span>
        ${p.icon ? `<img src="${p.icon}" class="card-icon" alt="">` : `<span class="card-emoji">${p.emoji}</span>`}
        <div class="card-info">
          <span class="card-name">${p.name}</span>
        </div>
        <span class="card-tag">${p.tag}</span>
      </a>
    `).join('');
  }


  function renderLocked() {
    const container = document.getElementById('lockedProjects');
    container.innerHTML = lockedProjects.map((p, i) => `
      <a href="${p.url}" class="card" data-index="${i}" ${p.sameTab ? '' : 'target="_blank"'}>
        ${p.hideLock ? '' : '<span class="card-num">🔒</span>'}
        ${p.icon ? `<img src="${p.icon}" class="card-icon" alt="">` : `<span class="card-emoji">${p.emoji}</span>`}
        <div class="card-info">
          <span class="card-name">${p.name}</span>
        </div>
        ${p.tag ? `<span class="card-tag">${p.tag}</span>` : ''}
      </a>
    `).join('');
  }


  function showToast(message, type = 'info') {
    const toast = document.getElementById('toast');
    toast.className = 'toast ' + type;
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }


  const themeToggle = document.getElementById('themeToggle');
  themeToggle.addEventListener('click', () => {
    const current = document.body.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', next);
    themeToggle.textContent = next === 'dark' ? '🌙' : '☀️';
  });


  const togglePw = document.getElementById('togglePw');
  const passwordInput = document.getElementById('passwordInput');
  togglePw.addEventListener('click', () => {
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    togglePw.textContent = type === 'password' ? '👁' : '🙈';
  });


  const unlockBtn = document.getElementById('unlockBtn');
  const errorText = document.getElementById('errorText');
  const unlockForm = document.getElementById('unlockForm');
  const successMsg = document.getElementById('successMsg');
  const lockedContainer = document.getElementById('lockedProjects');


  const SS_KEY = 'works_unlocked';


  function saveUnlock() {
    try {
      sessionStorage.setItem(SS_KEY, 'true');
      return true;
    } catch(e) {
      return false;
    }
  }


  function applyUnlock(unlocked) {
    if (unlocked) {
      unlockForm.style.display = 'none';
      successMsg.classList.add('show');
      lockedContainer.classList.add('unlocked');
    } else {
      unlockForm.style.display = '';
      successMsg.classList.remove('show');
      lockedContainer.classList.remove('unlocked');
    }
  }


  if (sessionStorage.getItem(SS_KEY) === 'true') {
    applyUnlock(true);
  }


  passwordInput.addEventListener('input', () => {
    errorText.classList.remove('show');
  });


  renderPublic();
  renderLocked();


  document.getElementById('unlockBtn').addEventListener('click', async () => {
    const pw = document.getElementById('passwordInput').value.trim();
    if (!pw) {
      passwordInput.classList.add('shake');
      setTimeout(() => passwordInput.classList.remove('shake'), 400);
      showToast('❌ Veuillez entrer un mot de passe', 'error');
      return;
    }
    try {
      const r = await fetch(VALIDATOR_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const d = await r.json();
      if (d.success) {
        saveUnlock();
        applyUnlock(true);
        showToast('✅ Accès total déverrouillé !', 'success');
      } else {
        errorText.textContent = '❌ Mot de passe incorrect';
        passwordInput.classList.add('shake');
        setTimeout(() => passwordInput.classList.remove('shake'), 400);
        errorText.classList.add('show');
        showToast('❌ Mot de passe incorrect', 'error');
      }
    } catch(e) {
      showToast('❌ Erreur de validation', 'error');
    }
  });
</script>
